apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-router-config
  namespace: ai-stack
data:
  nginx.conf: |
    events {}
    http {
      # 5090 is primary (fast GDDR7), Spark is backup (always-on)
      upstream ollama_backends {
        server ollama-5090.ai-stack.svc.cluster.local:11434;
        server ollama.ai-stack.svc.cluster.local:11434 backup;
      }

      server {
        listen 11434;

        location / {
          proxy_pass         http://ollama_backends;
          proxy_next_upstream error timeout http_502 http_503 http_504;
          proxy_next_upstream_tries 2;
          proxy_connect_timeout  5s;
          proxy_read_timeout    300s;
          proxy_send_timeout    300s;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_buffering    off;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
        }
      }
    }
