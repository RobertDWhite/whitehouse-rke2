apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-5090
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-5090
  template:
    metadata:
      labels:
        app: ollama-5090
    spec:
      priorityClassName: high-priority
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: rke2-node-50
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: dedicated
          operator: Equal
          value: gpu
          effect: PreferNoSchedule
        - key: dedicated
          operator: Equal
          value: gpu
          effect: NoSchedule
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: OLLAMA_OPENAI_COMPAT
              value: "1"
            - name: OLLAMA_API_KEY
              value: "dummy"
            - name: OLLAMA_DEBUG
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_KEEP_ALIVE
              value: "2h"
            # 4k default -> 32k so this backend is a usable Hermes fallback (fits 5090 32GB, num_parallel=1)
            - name: OLLAMA_CONTEXT_LENGTH
              value: "32768"
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-5090-pvc
