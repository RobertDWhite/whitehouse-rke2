# Internal-only, bearer-token gated (MCP_TOKEN). Uses the shared wildcard *.internal.white.fm
# listener — no dedicated gateway listener/cert needed (same pattern as congress.internal.white.fm).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: congress-mcp-internal
  namespace: congress-mcp
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - congress-mcp.internal.white.fm
  rules:
    - backendRefs:
        - name: congress-mcp
          port: 8080
