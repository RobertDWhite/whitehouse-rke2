apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss-mcp
  namespace: freshrss-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: freshrss-mcp
  template:
    metadata:
      labels:
        app: freshrss-mcp
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: freshrss-mcp
          image: registry.internal.white.fm/freshrss-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # FreshRSS service in-cluster (ClusterIP, port 80).
            - name: FRESHRSS_URL
              value: "http://freshrss.freshrss.svc.cluster.local"
            - name: FRESHRSS_USER
              valueFrom:
                secretKeyRef:
                  name: freshrss-mcp-env
                  key: FRESHRSS_USER
            - name: FRESHRSS_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-mcp-env
                  key: FRESHRSS_API_PASSWORD
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: freshrss-mcp-env
                  key: MCP_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
