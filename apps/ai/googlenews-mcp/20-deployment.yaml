apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlenews-mcp
  namespace: googlenews-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: googlenews-mcp
  template:
    metadata:
      labels:
        app: googlenews-mcp
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: googlenews-mcp
          image: registry.internal.white.fm/googlenews-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GNEWS_LANGUAGE
              value: "en"
            - name: GNEWS_COUNTRY
              value: "US"
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: googlenews-mcp-env
                  key: MCP_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
