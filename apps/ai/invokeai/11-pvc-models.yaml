# Large model cache (FLUX/SDXL/Qwen checkpoints). Re-downloadable, so it lives
# on single-replica Longhorn and is excluded from Velero backups to avoid
# shipping hundreds of GB of weights to the backup target.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: invokeai-models
  namespace: invokeai
  labels:
    velero.io/exclude-from-backup: "true"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 300Gi
  storageClassName: longhorn-single
