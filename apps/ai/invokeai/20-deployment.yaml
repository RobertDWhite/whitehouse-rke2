apiVersion: apps/v1
kind: Deployment
metadata:
  name: invokeai
  namespace: invokeai
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: invokeai
  template:
    metadata:
      labels:
        app: invokeai
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: rke2-node-50
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: dedicated
          operator: Equal
          value: gpu
          effect: PreferNoSchedule
        - key: dedicated
          operator: Equal
          value: gpu
          effect: NoSchedule
      containers:
        - name: invokeai
          image: ghcr.io/invoke-ai/invokeai
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
          env:
            - name: INVOKEAI_ROOT
              value: /invokeai
            - name: INVOKEAI_HOST
              value: 0.0.0.0
            - name: INVOKEAI_PORT
              value: "9090"
          readinessProbe:
            httpGet:
              path: /api/v1/app/version
              port: 9090
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/app/version
              port: 9090
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "1"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "32Gi"
              nvidia.com/gpu: 1
          volumeMounts:
            - name: invokeai-root
              mountPath: /invokeai
            - name: invokeai-models
              mountPath: /invokeai/models
      volumes:
        - name: invokeai-root
          persistentVolumeClaim:
            claimName: invokeai-root
        - name: invokeai-models
          persistentVolumeClaim:
            claimName: invokeai-models
