# Egress for the invokeai namespace: default-deny egress, allowed ONLY to
# (1) cluster DNS and (2) the media VPN proxy (gluetun/PIA). All InvokeAI
# internet traffic — including model downloads from HuggingFace/CivitAI — is
# forced through the tunnel: the deployment sets HTTP(S)_PROXY to
# vpn-proxy.media:8888. There is no direct internet path; anything else fails
# closed at L3. Ingress is left open so the Envoy gateway can reach :9090.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress-except-vpn
  namespace: invokeai
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Cluster DNS (CoreDNS) — to resolve the vpn-proxy + upstream names.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # The only internet egress: the VPN proxy (HTTP 8888 / SOCKS5 1080) in media.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: media
          podSelector:
            matchLabels:
              app: vpn-proxy
      ports:
        - port: 8888
          protocol: TCP
        - port: 1080
          protocol: TCP
