apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: invokeai-internal
  namespace: invokeai
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - invokeai.internal.white.fm
  rules:
    - backendRefs:
        - name: invokeai
          port: 80
