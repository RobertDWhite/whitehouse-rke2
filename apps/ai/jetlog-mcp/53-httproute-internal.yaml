apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jetlog-mcp-internal
  namespace: jetlog-mcp
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-jetlog-mcp-internal
  hostnames:
    - jetlog-mcp.internal.white.fm
  rules:
    - backendRefs:
        - name: jetlog-mcp
          port: 8080
