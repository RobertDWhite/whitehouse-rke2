apiVersion: apps/v1
kind: Deployment
metadata:
  name: monica-mcp
  namespace: monica-mcp
  annotations:
    renovatebot/update-container-image: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monica-mcp
  template:
    metadata:
      labels:
        app: monica-mcp
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: monica-mcp
          image: registry.internal.white.fm/monica-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MONICA_BASE_URL
              value: "http://monica.monica.svc.cluster.local:80"
            - name: MONICA_EMAIL
              valueFrom:
                secretKeyRef:
                  name: monica-mcp-env
                  key: MONICA_EMAIL
            - name: MONICA_DAV_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monica-mcp-env
                  key: MONICA_DAV_TOKEN
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monica-mcp-env
                  key: MCP_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
