apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: monica-mcp-internal
  namespace: monica-mcp
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - monica-mcp.internal.white.fm
  rules:
    - backendRefs:
        - name: monica-mcp
          port: 8080
