apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: odysseus-internal
  namespace: odysseus
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - odysseus.internal.white.fm
  rules:
    - backendRefs:
        - name: odysseus
          port: 7000
