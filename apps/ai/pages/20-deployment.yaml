apiVersion: apps/v1
kind: Deployment
metadata:
  name: pages
  namespace: pages
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pages
  template:
    metadata:
      labels:
        app: pages
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pages
          image: registry.internal.white.fm/pages-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SITES_DIR
              value: "/data/sites"
            # Serve zone: each site is hosted at https://<name>.SERVE_HOST/.
            - name: SERVE_HOST
              value: "pages.internal.white.fm"
            - name: MCP_HOST
              value: "pages-mcp.internal.white.fm"
            - name: TMPDIR
              value: "/tmp"
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pages-env
                  key: MCP_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data/sites
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pages-data
        - name: tmp
          emptyDir: {}
