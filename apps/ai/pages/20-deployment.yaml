apiVersion: apps/v1
kind: Deployment
metadata:
  name: pages
  namespace: pages
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pages
  template:
    metadata:
      labels:
        app: pages
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pages
          image: registry.internal.white.fm/pages-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SITES_DIR
              value: "/data/sites"
            # Serve zone(s): each site is hosted at https://<name>.<serve-host>/.
            # Comma-separated: the internal host plus the public, Authentik-gated
            # host (<name>.pages.white.fm) whose outpost proxies here directly and
            # forwards the original Host. First value is canonical (display/apex).
            - name: SERVE_HOST
              value: "pages.internal.white.fm,pages.white.fm"
            - name: MCP_HOST
              value: "pages-mcp.internal.white.fm"
            - name: TMPDIR
              value: "/tmp"
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: pages-env
                  key: MCP_TOKEN
            - name: GIT_REMOTE
              value: "ssh://git@ssh.github.com:443/RobertDWhite/pages-sites.git"
            - name: GIT_SSH_KEY
              value: "/keys/id_ed25519"
            - name: GIT_AUTHOR_NAME
              value: "pages-mcp"
            - name: GIT_AUTHOR_EMAIL
              value: "pages-mcp@white.fm"
            - name: HOME
              value: "/tmp"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data/sites
            - name: tmp
              mountPath: /tmp
            - name: git-key
              mountPath: /keys
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pages-data
        - name: tmp
          emptyDir: {}
        - name: git-key
          secret:
            secretName: pages-git
