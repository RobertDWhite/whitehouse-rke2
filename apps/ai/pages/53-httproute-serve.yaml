# Open on the internal (tailnet-only) network: anyone who can resolve the host
# can view hosted sites. Two routes:
#   - apex pages.internal.white.fm  -> directory index (shared *.internal listener)
#   - *.pages.internal.white.fm     -> one subdomain per site (dedicated listener +
#                                       cert SAN; external-dns auto-creates the record)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pages-serve-internal
  namespace: pages
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - pages.internal.white.fm
  rules:
    - backendRefs:
        - name: pages
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pages-serve-wildcard
  namespace: pages
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-pages-internal
  hostnames:
    - "*.pages.internal.white.fm"
  rules:
    - backendRefs:
        - name: pages
          port: 8080
