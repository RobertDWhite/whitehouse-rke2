apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - 00-namespace.yaml
  - 10-pvc.yaml
  - 20-deployment.yaml
  - 30-service.yaml
  - 53-httproute-serve.yaml
  - 54-httproute-mcp.yaml
  - 60-networkpolicy.yaml
  - 61-pdb.yaml

generators:
  - ksops.yaml

images:
  # Built by github.com/RobertDWhite/pages-mcp CI -> ghcr.io on v* git tags;
  # Renovate bumps newTag when a new v* image is published.
  - name: registry.internal.white.fm/pages-mcp
    newName: ghcr.io/robertdwhite/pages-mcp
    newTag: v0.2.3
