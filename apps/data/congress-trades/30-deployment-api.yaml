apiVersion: apps/v1
kind: Deployment
metadata:
  name: congress-api
  namespace: congress-trades
spec:
  replicas: 1
  selector:
    matchLabels:
      app: congress-api
  template:
    metadata:
      labels:
        app: congress-api
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [rke2-node-13, rke2-node-14, rke2-node-50]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: congress-api
          image: registry.internal.white.fm/congress-app
          imagePullPolicy: IfNotPresent
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CONFIG_PATH
              value: /etc/congress/config.yaml
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: congress-secrets
                  key: database-url
          volumeMounts:
            - name: config
              mountPath: /etc/congress
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: congress-config
