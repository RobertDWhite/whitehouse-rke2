# Public route is gated by Authentik SSO: traffic for congress.white.fm is sent to the
# Authentik embedded outpost (authentik-server:80, cross-namespace), which authenticates by
# Host header and proxies to the upstream configured in its Proxy Provider
# (http://congress-ui.congress-trades.svc.cluster.local:80). Same pattern as adsb/fr24.
# Requires: the ReferenceGrant in authentik/ (congress-trades added) AND an Authentik
# Proxy Provider + Application for congress.white.fm assigned to the embedded outpost.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: congress-public
  namespace: congress-trades
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - congress.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
