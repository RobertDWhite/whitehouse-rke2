apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backoffice-internal
  namespace: backoffice
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - backoffice.internal.white.fm
  rules:
    - backendRefs:
        - name: backoffice-web
          port: 3000
