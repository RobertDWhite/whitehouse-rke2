                  <div>
                    {{ range .Array "health.#(subsystem=\"wan\").uptime_stats.WAN.monitors" }}
                    <div class="flex">
                      <div class="size-h5">{{ .String "target" }}</div>
                      <div class="value-separator"></div>
                      <div class="color-highlight text-very-compact"><span>{{ .Int "latency_average" }}</span> <span class="color-base size-h5">ms</span></div>
                    </div>
                    {{ end }}
                  </div>
                </div>
                <div class="size-h5">Latency</div>
                <div class="size-h3 color-highlight">{{ .Int "health.#(subsystem=\"wan\").uptime_stats.WAN.latency_average" }}<span class="color-base"> ms</span></div>
              </div>
              <div>
                <div class="size-h5">WAN IP</div>
                <div class="size-h3 color-highlight">{{ .String "health.#(subsystem=\"wan\").wan_ip" }}</div>
              </div>
              <div>
                <div class="size-h5">Gateway CPU</div>
                <div class="size-h3 color-highlight">{{ .String "health.#(subsystem=\"wan\").gw_system-stats.cpu" }}<span class="color-base"> %</span></div>
              </div>
              <div>
                <div class="size-h5">Gateway RAM</div>
                <div class="size-h3 color-highlight">{{ .String "health.#(subsystem=\"wan\").gw_system-stats.mem" }}<span class="color-base"> %</span></div>
              </div>
            </div>
          </div>
        {{ end }}
    - type: custom-api
      title: Uptime Kumas
      title-url: ${UPTIME_KUMA_URL}
      url: ${UPTIME_KUMA_URL}/api/status-page/${UPTIME_KUMA_STATUS_SLUG}
      subrequests:
        heartbeats:
          url: ${UPTIME_KUMA_URL}/api/status-page/heartbeat/${UPTIME_KUMA_STATUS_SLUG}
      cache: 10m
      template: |
        {{ $hb := .Subrequest "heartbeats" }}

        {{ if not (.JSON.Exists "publicGroupList") }}
        <p class="color-negative">Error reading response</p>
        {{ else if eq (len (.JSON.Array "publicGroupList")) 0 }}
        <p>No monitors found</p>
        {{ else }}

        <ul class="dynamic-columns list-gap-8">
          {{ range .JSON.Array "publicGroupList" }}
          {{ range .Array "monitorList" }}
          {{ $id := .String "id" }}
          {{ $hbArray := $hb.JSON.Array (print "heartbeatList." $id) }}
          <div class="flex items-center gap-12">
            <a class="size-title-dynamic color-highlight text-truncate block grow" href="${UPTIME_KUMA_URL}/dashboard/{{ $id }}"
              target="_blank" rel="noreferrer">
              {{ .String "name" }} </a>

            {{ if gt (len $hbArray) 0 }}
              {{ $latest := index $hbArray (sub (len $hbArray) 1) }}
              {{ if eq ($latest.Int "status") 1 }}
              <div>{{ $latest.Int "ping" }}ms</div>
              <div class="monitor-site-status-icon-compact" title="OK">
                <svg fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                  <path fill-rule="evenodd"
                    d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z"
                    clip-rule="evenodd"></path>
                </svg>
              </div>
              {{ else }}
              <div><span class="color-negative">DOWN</span></div>
              <div class="monitor-site-status-icon-compact" title="{{ if $latest.Exists "msg" }}{{ $latest.String "msg" }}{{ else
                }}Error{{ end }}">
                <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                  <path fill-rule="evenodd"
                    d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"
                    clip-rule="evenodd"></path>
                </svg>
              </div>
              {{ end }}
            {{ else }}
              <div><span class="color-negative">No data</span></div>
              <div class="monitor-site-status-icon-compact" title="No data available">
                <svg fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                  <path d="M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm0-2a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm-.75-8a.75.75 0 0 1 1.5 0v3a.75.75 0 0 1-1.5 0V8zm.75 5a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                </svg>
              </div>
            {{ end }}
          </div>
          {{ end }}
          {{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: Cloudflared Tunnels
      css-class: widget-type-cloudflared
      cache: 4h
      url: https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel/${CLOUDFLARE_TUNNEL_ID}/configurations
      headers:
        Authorization: Bearer ${CLOUDFLARE_API_KEY}
      template: |-
        {{ $domain_name := ".white.fm" }}  {{/* Set your domain name */}}

        <style>
          .widget-type-cloudflared li {
            margin-top: var(--list-half-gap);
            border-top: 1px solid var(--color-separator);
            padding-top: var(--list-half-gap);
          }
        </style>
        <ul class="dynamic-columns list-gap-15 list-with-separator">
        {{ range .JSON.Array "result.config.ingress" }}
          {{ if (.String "hostname") }}
          <li class="flex items-center gap-20">
              <div class="shrink-0">
                  <img class="docker-container-icon" src="https://developers.cloudflare.com/logo.svg" alt="" loading="lazy">
              </div>
              <div class="min-width-0 grow">
                <a href='https://{{ .String "hostname" }}' class="color-highlight size-title-dynamic block text-truncate" target="_blank" rel="noreferrer">{{ .String "hostname" | trimSuffix $domain_name }}</a>
                {{ if (.String "service") }}
                <div class="flex items-center gap-10" style="margin-bottom: 5px">
                  <div class="text-left">
                    <span class="color-subdue">&#8627;</span>
                  </div>
                  <div class="size-h6 flex-1 text-left">
                    <a href='{{ .String "service" | replaceAll "localhost" "192.168.0.150" }}' target="_blank" rel="noreferrer">{{ .String "service" }}</a>
                  </div>
                </div>
                {{ end}}
              </div>
          </li>
          {{ end }}
        {{ end }}
        </ul>
    - type: releases
      title: App Updates
      cache: 6h
      show-source-icon: true
      token: ${GITHUB_TOKEN}
      collapse-after: 8
      repositories:
        - glanceapp/glance
        - immich-app/immich
        - TechnitiumSoftware/DnsServer
        - goauthentik/authentik
        - longhorn/longhorn
        - argoproj/argo-cd
        - Radarr/Radarr
        - Sonarr/Sonarr
        - Readarr/Readarr
        - morpheus65535/bazarr
        - Prowlarr/Prowlarr
        - advplyr/audiobookshelf
        - Kareadita/Kavita
        - louislam/uptime-kuma
        - open-webui/open-webui
        - ollama/ollama
  - size: full
    widgets:
    - type: custom-api
      title: Cluster CPU / Memory
      title-url: https://grafana.internal.white.fm
      cache: 2m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: sort_desc(100 * container_memory_working_set_bytes{id="/"} / on(instance) group_left machine_memory_bytes)
      subrequests:
        ncpu:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: 100 * rate(container_cpu_usage_seconds_total{id="/"}[5m]) / on(instance) group_left machine_cpu_cores
        ccpu:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: 100 * sum(rate(container_cpu_usage_seconds_total{id="/"}[5m])) / sum(machine_cpu_cores)
        cmem:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: 100 * sum(container_memory_working_set_bytes{id="/"}) / sum(machine_memory_bytes)
      template: |-
        {{ $nodes := .JSON.Array "data.result" }}
        {{ $ncpu := .Subrequest "ncpu" }}
        {{ $ccpu := .Subrequest "ccpu" }}
        {{ $cmem := .Subrequest "cmem" }}
        {{ if eq (len $nodes) 0 }}
          <p class="color-negative">No node metrics reporting.</p>
        {{ else }}
        <div class="flex justify-between text-center">
          <div><div class="size-h2 color-highlight">{{ printf "%.0f" ($ccpu.JSON.Float "data.result.0.value.1") }}%</div><div class="size-h6">CLUSTER CPU</div></div>
          <div><div class="size-h2 color-highlight">{{ printf "%.0f" ($cmem.JSON.Float "data.result.0.value.1") }}%</div><div class="size-h6">CLUSTER MEM</div></div>
        </div>
        <div style="border-bottom: 1px solid; margin-block: 8px;"></div>
        <ul class="list list-gap-10">
          {{ range $nodes }}
          {{ $mem := .Float "value.1" }}
          {{ $node := .String "metric.instance" }}
          {{ $cpu := $ncpu.JSON.Float (printf "data.result.#(metric.instance==%q).value.1" $node) }}
          {{ $color := "var(--color-positive)" }}
          {{ if gt $mem 85.0 }}{{ $color = "var(--color-negative)" }}{{ else if gt $mem 70.0 }}{{ $color = "var(--color-primary)" }}{{ end }}
          <li>
            <div class="flex justify-between size-h6">
              <span class="text-truncate">{{ $node }}</span>
              <span class="shrink-0">cpu {{ printf "%.0f" $cpu }}% · mem {{ printf "%.0f" $mem }}%</span>
            </div>
            <div style="background: rgba(128,128,128,0.2); border-radius: 4px; height: 6px; margin-top: 4px; overflow: hidden;">
              <div style="width: {{ printf "%.0f" $mem }}%; background: {{ $color | safeCSS }}; height: 100%;"></div>
            </div>
          </li>
          {{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: GitHub Actions
      url: https://api.github.com/repos/RobertDWhite/whitehouse-rke2/actions/runs
      cache: 5m
      parameters:
        branch: main
        exclude_pull_requests: true
        per_page: 6
      headers:
        Authorization: Bearer ${GITHUB_TOKEN}
        Accept: application/vnd.github.v3+json
        User-Agent: Glance-Dashboard
      template: |-
        <div class="github-repos">
          <ul class="list list-gap-14 collapsible-container" data-collapse-after="2">

            {{ range .JSON.Array "workflow_runs" }}
              {{ $rzt := .String "conclusion" }}
              <li>
                <a class="size-h3 color-primary-if-not-visited" href="{{ .String "html_url" }}">{{ .String "display_title" }}</a>
                <h3><a href="" target=""></a></h3>
                <p>{{ .String "description" }}</p>
                <ul class="list-horizontal-text">
                  <li data-popover-type="html" {{ .String "updated_at" | parseTime "rfc3339" | toRelativeTime }}></li>
                  <li data-popover-type="html"><div data-popover-html="">{{ .String "actor.login" }}</div>{{ .String "name" }}</li>
                  <li data-popover-type="html"><div data-popover-html="">{{ .String "status" }}</div>
                  {{ if eq $rzt "success" }}
                    <svg width="20" height="20" fill="var(--color-positive)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M10 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16Zm3.857-9.809a.75.75 0 0 0-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 1 0-1.06 1.061l2.5 2.5a.75.75 0 0 0 1.137-.089l4-5.5Z" clip-rule="evenodd" />
                    </svg>
                  {{ else }}
                    <svg width="20" height="20" fill="var(--color-negative)" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495ZM10 5a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 5Zm0 9a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
                    </svg>
                  {{ end }}
                  </li>
                </ul>
              </li>
            {{ end }}
          </ul>
        </div>
    - type: custom-api
      title: GitHub Notifications
      url: https://api.github.com/notifications?all=true&per_page=20
      headers:
        Authorization: Bearer ${GITHUB_TOKEN}
        Accept: application/vnd.github+json
      template: |-
        <ul class="list list-gap-14 collapsible-container" data-collapse-after="6">
        {{ range .JSON.Array "" }}
          {{ $url := concat (.String "repository.html_url") "/actions" }}
          {{ if ne (.String "subject.url") "" }}
            {{
              $notification := newRequest (.String "subject.url")
                | withHeader "Authorization" "Bearer ${GITHUB_TOKEN}"
                | getResponse
            }}
            {{ if eq $notification.Response.StatusCode 200 }}
              {{ $url = $notification.JSON.String "html_url" }}
            {{ else }}
              {{ $url = (.String "subject.url") | replaceMatches "repos\\/" "" | replaceMatches "api\\." "" | replaceAll "pulls" "pull" }}
            {{ end }}
          {{ end }}
          <li>
            <a href="{{ $url }}" class="size-title-dynamic {{ if .Bool "unread" }}color-primary-if-not-visited{{ else }}negative-color{{ end }}" target="_blank" rel="noreferrer">{{ .String "subject.title" }}</a>
            <ul class="list-horizontal-text flex-nowrap">
              <li class="min-width-0" {{ .String "updated_at" | parseTime "rfc3339" | toRelativeTime }}></li>
              <li class="min-width-0"><a target="_blank" href="{{ $url }}">{{ .String "repository.full_name" }}</a></li>
            </ul>
          </li>
        {{ end }}
        </ul>
      cache: 30m
    - type: custom-api
      title: GitHub Repositories
      url: https://api.github.com/user/repos
      cache: 30m
      parameters:
        affiliation: owner
        sort: updated
        visibility: all
      headers:
        Authorization: Bearer ${GITHUB_TOKEN}
        Accept: application/vnd.github.v3+json
        User-Agent: Glance-Dashboard
      template: |-
        <div class="github-repos">
          <ul class="list list-gap-14 collapsible-container" data-collapse-after="5">
            {{ range .JSON.Array "" }}
              <li>
                <a class="size-h3 color-primary" href="{{ .String "html_url" }}">{{ .String "full_name" }}</a>
                <h3><a href="" target="_blank"></a></h3>
                <p>{{ .String "description" }}</p>
                <ul class="list-horizontal-text device-info">
                  <li data-popover-type="html"><div data-popover-html="">Last Update</div>{{ formatTime "DateOnly" ( parseTime "RFC3339" (.String "updated_at") ) }}</li>
                  <li data-popover-type="html"><div data-popover-html="">Visibility</div>{{ .String "visibility" }}</li>
                  <li data-popover-type="html"><div data-popover-html="">Stars</div>{{ .Int "stargazers_count" }}✩</li>
                  {{ if .String "language" }}
                  <li data-popover-type="html"><div data-popover-html="">Language</div>{{ .String "language" }}</li>
                  {{ end }}
                </ul>
              </li>
            {{ end }}
          </ul>
        </div>
    - type: custom-api
      title: Trending Repositories
      cache: 24h
      url: https://api.ossinsight.io/v1/trends/repos/?period=past_week&language=All
      template: |
        <ul class="list list-gap-10 collapsible-container" data-collapse-after="3">
          {{ range .JSON.Array "data.rows" }}
            <li>
              <a class="color-primary-if-not-visited" href="https://github.com/{{ .String "repo_name" }}">{{ .String "repo_name" }}</a>
              <ul class="list-horizontal-text">
                <li class="color-highlight">{{ .String "primary_language" }}</li>
                <li>{{ .Int "stars" }} &#9733;</li>
                <li>{{ .Int "forks" }} forks</li>
              </ul>
              <ul class="list">
                <li style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">{{ .String "description" }}</li>
              </ul>
            </li>
          {{ end }}
        </ul>
- name: Ops
  columns:
  - size: small
    widgets:
    - type: custom-api
      title: Velero Backups
      title-url: https://grafana.internal.white.fm
      cache: 5m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: velero_backup_last_status{schedule!=""}
      subrequests:
        fails:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: velero_backup_failure_total{schedule!=""}
        succ:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: velero_backup_success_total{schedule!=""}
      template: |-
        {{ $sch := .JSON.Array "data.result" }}
        {{ $f := .Subrequest "fails" }}
        {{ $s := .Subrequest "succ" }}
        {{ if eq (len $sch) 0 }}
          <p class="color-negative">No Velero schedules reporting.</p>
        {{ else }}
        <ul class="list list-gap-10">
          {{ range $sch }}
          {{ $name := .String "metric.schedule" }}
          {{ $ok := eq (.Int "value.1") 1 }}
          {{ $fc := $f.JSON.Int (printf "data.result.#(metric.schedule==%q).value.1" $name) }}
          {{ $sc := $s.JSON.Int (printf "data.result.#(metric.schedule==%q).value.1" $name) }}
          <li class="flex items-center justify-between gap-10">
            <span class="text-truncate">{{ $name }}</span>
            <span class="shrink-0 size-h6">
              <span class="{{ if $ok }}color-positive{{ else }}color-negative{{ end }}">{{ if $ok }}OK{{ else }}FAIL{{ end }}</span>
              · <span class="color-positive">{{ $sc }}✓</span> <span class="{{ if gt $fc 0 }}color-negative{{ end }}">{{ $fc }}✗</span>
            </span>
          </li>
          {{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: Prowlarr Indexers
      title-url: https://prowlarr.internal.white.fm
      cache: 5m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: prowlarr_indexer_unavailable == 1
      subrequests:
        total:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: prowlarr_indexer_total
      template: |-
        {{ $down := .JSON.Array "data.result" }}
        {{ $total := (.Subrequest "total").JSON.Int "data.result.0.value.1" }}
        <div class="flex justify-between text-center">
          <div>
            <div class="size-h2 color-highlight">{{ $total }}</div>
            <div class="size-h6">INDEXERS</div>
          </div>
          <div>
            <div class="size-h2 {{ if gt (len $down) 0 }}color-negative{{ else }}color-positive{{ end }}">{{ len $down }}</div>
            <div class="size-h6">UNAVAILABLE</div>
          </div>
        </div>
        {{ if gt (len $down) 0 }}
        <div style="border-bottom: 1px solid; margin-block: 10px;"></div>
        <ul class="list-horizontal-text collapsible-container" data-collapse-after="8">
          {{ range $down }}<li class="color-negative">{{ .String "metric.indexer" }}</li>{{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: Internet Speed
      title-url: https://speed.internal.white.fm
      cache: 10m
      url: ${MYSPEED_URL}/api/speedtests
      template: |-
        {{ $tests := .JSON.Array "" }}
        {{ if eq (len $tests) 0 }}
          <p class="color-subdue">No recent speedtests recorded.</p>
        {{ else }}
        {{ $t := index $tests (sub (len $tests) 1) }}
        <div class="flex justify-between text-center">
          <div><div class="size-h3 color-highlight">{{ $t.String "ping" }}</div><div class="size-h6">PING ms</div></div>
          <div><div class="size-h3 color-positive">{{ $t.String "download" }}</div><div class="size-h6">DOWN</div></div>
          <div><div class="size-h3 color-primary">{{ $t.String "upload" }}</div><div class="size-h6">UP</div></div>
        </div>
        {{ end }}
    - type: custom-api
      title: Falco
      title-url: https://falco.internal.white.fm
      cache: 2m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: sum(falcosecurity_falcosidekick_falco_events_total)
      subrequests:
        pri:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: sum by (priority_raw) (falcosecurity_falcosidekick_falco_events_total)
      template: |-
        {{ $events := .JSON.Int "data.result.0.value.1" }}
        {{ $pri := (.Subrequest "pri").JSON.Array "data.result" }}
        <div class="flex justify-between text-center">
          <div>
            <div class="size-h2 color-highlight">{{ $events }}</div>
            <div class="size-h6">EVENTS SEEN</div>
          </div>
        </div>
        {{ if gt (len $pri) 0 }}
        <div style="border-bottom: 1px solid; margin-block: 8px;"></div>
        <ul class="list-horizontal-text">
          {{ range $pri }}<li class="{{ if eq (.String "metric.priority_raw") "critical" "error" "warning" "emergency" "alert" }}color-negative{{ end }}">{{ .String "metric.priority_raw" }}: {{ .Int "value.1" }}</li>{{ end }}
        </ul>
        {{ end }}
  - size: full
    widgets:
    - type: custom-api
      title: Storage / PVC Capacity
      title-url: https://longhorn.internal.white.fm
      cache: 5m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: topk(15, 100 * kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes)
      subrequests:
        cap:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: kubelet_volume_stats_capacity_bytes
      template: |-
        {{ $pvcs := .JSON.Array "data.result" }}
        {{ $cap := .Subrequest "cap" }}
        {{ if eq (len $pvcs) 0 }}
          <p class="color-negative">No PVC stats reporting.</p>
        {{ else }}
        <ul class="list list-gap-10">
          {{ range $pvcs }}
          {{ $pct := .Float "value.1" }}
          {{ $pvc := .String "metric.persistentvolumeclaim" }}
          {{ $ns := .String "metric.namespace" }}
          {{ $capb := $cap.JSON.Float (printf "data.result.#(metric.persistentvolumeclaim==%q).value.1" $pvc) }}
          {{ $capg := printf "%.0f" (div $capb 1073741824.0) }}
          {{ $color := "var(--color-positive)" }}
          {{ if gt $pct 85.0 }}{{ $color = "var(--color-negative)" }}{{ else if gt $pct 70.0 }}{{ $color = "var(--color-primary)" }}{{ end }}
          <li>
            <div class="flex justify-between size-h6">
              <span class="text-truncate">{{ $ns }}/{{ $pvc }}</span>
              <span class="shrink-0">{{ printf "%.0f" $pct }}% · {{ $capg }}G</span>
            </div>
            <div style="background: rgba(128,128,128,0.2); border-radius: 4px; height: 6px; margin-top: 4px; overflow: hidden;">
              <div style="width: {{ printf "%.0f" $pct }}%; background: {{ $color | safeCSS }}; height: 100%;"></div>
            </div>
          </li>
          {{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: Crashlooping Pods (last 1h)
      cache: 2m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: topk(15, sum by (namespace, pod) (increase(kube_pod_container_status_restarts_total[1h])) > 0)
      template: |-
        {{ $rows := .JSON.Array "data.result" }}
        {{ if eq (len $rows) 0 }}
          <p class="color-positive">No pods restarting in the last hour.</p>
        {{ else }}
        <ul class="list list-gap-10 collapsible-container" data-collapse-after="8">
          {{ range $rows }}
          {{ $n := .Int "value.1" }}
          <li class="flex items-center justify-between gap-10">
            <div class="min-width-0">
              <span class="color-highlight text-truncate block">{{ .String "metric.pod" }}</span>
              <span class="size-h6 color-subdue">{{ .String "metric.namespace" }}</span>
            </div>
            <span class="shrink-0 {{ if gt $n 5 }}color-negative{{ else }}color-primary{{ end }}">{{ $n }} restarts</span>
          </li>
          {{ end }}
        </ul>
        {{ end }}
