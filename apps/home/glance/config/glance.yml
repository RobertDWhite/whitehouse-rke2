    - type: custom-api
      title: Home Assistant
      title-url: https://homeassistant.internal.white.fm
      cache: 1m
      url: ${HA_URL}/api/states
      headers:
        Authorization: Bearer ${HA_TOKEN}
      template: |-
        {{ $d := .JSON }}
        {{/* A row renders only if the entity exists. Each block shows
             current_temperature for climate entities, else state + unit for
             sensors. Add/swap entity_ids freely. */}}

        <div class="size-h5 color-highlight" style="margin-bottom: 5px;">Climate</div>
        <ul class="list list-gap-5">
          {{ $id := "climate.thermostat_1_nativezone" }}
          {{ $name := $d.String (printf "#(entity_id==%q).attributes.friendly_name" $id) }}
          {{ if $name }}
          <li class="flex justify-between items-center">
            <span class="text-truncate">{{ $name }}</span>
            <span class="color-highlight shrink-0">{{ $t := $d.String (printf "#(entity_id==%q).attributes.current_temperature" $id) }}{{ $u := $d.String (printf "#(entity_id==%q).attributes.unit_of_measurement" $id) }}{{ if $t }}{{ $t }}°{{ else }}{{ $d.String (printf "#(entity_id==%q).state" $id) }}{{ if $u }} {{ $u }}{{ end }}{{ end }}</span>
          </li>
          {{ end }}

          {{ $id = "climate.jacuzzi_j_475_thermostat" }}
          {{ $name = $d.String (printf "#(entity_id==%q).attributes.friendly_name" $id) }}
          {{ if $name }}
          <li class="flex justify-between items-center">
            <span class="text-truncate">{{ $name }}</span>
            <span class="color-highlight shrink-0">{{ $t := $d.String (printf "#(entity_id==%q).attributes.current_temperature" $id) }}{{ $u := $d.String (printf "#(entity_id==%q).attributes.unit_of_measurement" $id) }}{{ if $t }}{{ $t }}°{{ else }}{{ $d.String (printf "#(entity_id==%q).state" $id) }}{{ if $u }} {{ $u }}{{ end }}{{ end }}</span>
          </li>
          {{ end }}

          {{ $id = "sensor.temperature" }}
          {{ $name = $d.String (printf "#(entity_id==%q).attributes.friendly_name" $id) }}
          {{ if $name }}
          <li class="flex justify-between items-center">
            <span class="text-truncate">{{ $name }}</span>
            <span class="color-highlight shrink-0">{{ $d.String (printf "#(entity_id==%q).state" $id) }} {{ $d.String (printf "#(entity_id==%q).attributes.unit_of_measurement" $id) }}</span>
          </li>
          {{ end }}
        </ul>

        <div class="size-h5 color-highlight" style="margin: 10px 0 5px;">Energy</div>
        <ul class="list list-gap-5">
          {{ $id = "sensor.refrigerator_power" }}
          {{ $name = $d.String (printf "#(entity_id==%q).attributes.friendly_name" $id) }}
          {{ if $name }}<li class="flex justify-between items-center"><span class="text-truncate">{{ $name }}</span><span class="color-highlight shrink-0">{{ $d.String (printf "#(entity_id==%q).state" $id) }} {{ $d.String (printf "#(entity_id==%q).attributes.unit_of_measurement" $id) }}</span></li>{{ end }}
          {{ $id = "sensor.washer_power" }}
          {{ $name = $d.String (printf "#(entity_id==%q).attributes.friendly_name" $id) }}
          {{ if $name }}<li class="flex justify-between items-center"><span class="text-truncate">{{ $name }}</span><span class="color-highlight shrink-0">{{ $d.String (printf "#(entity_id==%q).state" $id) }} {{ $d.String (printf "#(entity_id==%q).attributes.unit_of_measurement" $id) }}</span></li>{{ end }}
          {{ $id = "sensor.dryer_power" }}
          {{ $name = $d.String (printf "#(entity_id==%q).attributes.friendly_name" $id) }}
          {{ if $name }}<li class="flex justify-between items-center"><span class="text-truncate">{{ $name }}</span><span class="color-highlight shrink-0">{{ $d.String (printf "#(entity_id==%q).state" $id) }} {{ $d.String (printf "#(entity_id==%q).attributes.unit_of_measurement" $id) }}</span></li>{{ end }}
        </ul>
