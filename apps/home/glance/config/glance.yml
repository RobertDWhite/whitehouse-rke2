                        {{ printf "%dh %dm" $hours $minutes }}
                      {{ else }}
                        {{ printf "%dm" $minutes }}
                      {{ end }}
                    </span> •
                    <span>
                      {{ if gt $plays 1 }}
                        {{ $plays }} Plays
                      {{ else }}
                        {{ $plays }} Play
                      {{ end }}
                    </span>
                  </div>
                </div>
                <a href="https://app.plex.tv/desktop/#!/server/{{ $serverID }}/details?key=%2Flibrary%2Fmetadata%2F{{ $ratingKey }}" target="_blank"
                   class="color-primary">▶</a>
              </li>
            {{ end }}
          </ul>
        {{ end }}
- name: Infra
  columns:
  - size: small
    widgets:
    - type: custom-api
      title: Cluster Health
      title-url: https://grafana.internal.white.fm
      cache: 1m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: sum(kube_node_status_condition{condition="Ready",status="true"})
      subrequests:
        total:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: count(kube_node_status_condition{condition="Ready",status="true"})
        notready:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: kube_node_status_condition{condition="Ready",status="true"} == 0
        alerts:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: sort_desc(count by (alertname, severity) (ALERTS{alertstate="firing"}))
      template: |-
        {{ $ready := .JSON.Int "data.result.0.value.1" }}
        {{ $total := (.Subrequest "total").JSON.Int "data.result.0.value.1" }}
        {{ $notready := (.Subrequest "notready").JSON.Array "data.result" }}
        {{ $alerts := (.Subrequest "alerts").JSON.Array "data.result" }}

        {{ $firing := 0 }}
        {{ $crit := 0 }}
        {{ range $alerts }}
          {{ $c := .Int "value.1" }}
          {{ $firing = add $firing $c }}
          {{ if eq (.String "metric.severity") "critical" }}{{ $crit = add $crit $c }}{{ end }}
        {{ end }}

        <div class="flex justify-between text-center">
          <div>
            <div class="size-h2 {{ if lt $ready $total }}color-negative{{ else }}color-positive{{ end }}">{{ $ready }}/{{ $total }}</div>
            <div class="size-h6">NODES READY</div>
          </div>
          <div>
            <div class="size-h2 {{ if gt $firing 0 }}color-negative{{ else }}color-positive{{ end }}">{{ $firing }}</div>
            <div class="size-h6">ALERTS</div>
          </div>
          <div>
            <div class="size-h2 {{ if gt $crit 0 }}color-negative{{ else }}color-highlight{{ end }}">{{ $crit }}</div>
            <div class="size-h6">CRITICAL</div>
          </div>
        </div>

        {{ if gt (len $notready) 0 }}
        <div style="margin-top: 10px;">
          <div class="size-h5 color-negative">NotReady nodes</div>
          <ul class="list-horizontal-text">
            {{ range $notready }}<li>{{ .String "metric.node" }}</li>{{ end }}
          </ul>
        </div>
        {{ end }}

        {{ if gt (len $alerts) 0 }}
        <div style="border-bottom: 1px solid; margin-block: 10px;"></div>
        <ul class="list list-gap-10 collapsible-container" data-collapse-after="5">
          {{ range $alerts }}
          <li class="flex items-center justify-between gap-10">
            <span class="text-truncate {{ if eq (.String "metric.severity") "critical" }}color-negative{{ else }}color-highlight{{ end }}">{{ .String "metric.alertname" }}</span>
            <span class="shrink-0 size-h6">{{ .String "metric.severity" }} · {{ .Int "value.1" }}</span>
          </li>
          {{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: ArgoCD
      title-url: https://argo.white.fm
      cache: 2m
      url: ${PROMETHEUS_URL}/api/v1/query
      parameters:
        query: argocd_app_info{health_status=~"Degraded|Missing"}
      subrequests:
        outofsync:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: argocd_app_info{sync_status="OutOfSync"}
        total:
          url: ${PROMETHEUS_URL}/api/v1/query
          parameters:
            query: count(argocd_app_info)
      template: |-
        {{ $unhealthy := .JSON.Array "data.result" }}
        {{ $oos := (.Subrequest "outofsync").JSON.Array "data.result" }}
        {{ $total := (.Subrequest "total").JSON.Int "data.result.0.value.1" }}

        <div class="flex justify-between text-center">
          <div>
            <div class="size-h2 color-highlight">{{ $total }}</div>
            <div class="size-h6">APPS</div>
          </div>
          <div>
            <div class="size-h2 {{ if gt (len $oos) 0 }}color-negative{{ else }}color-positive{{ end }}">{{ len $oos }}</div>
            <div class="size-h6">OUT OF SYNC</div>
          </div>
          <div>
            <div class="size-h2 {{ if gt (len $unhealthy) 0 }}color-negative{{ else }}color-positive{{ end }}">{{ len $unhealthy }}</div>
            <div class="size-h6">UNHEALTHY</div>
          </div>
        </div>

        {{ if gt (len $unhealthy) 0 }}
        <div style="border-bottom: 1px solid; margin-block: 10px;"></div>
        <ul class="list list-gap-10 collapsible-container" data-collapse-after="5">
          {{ range $unhealthy }}
          <li class="flex items-center justify-between gap-10">
            <span class="text-truncate color-highlight">{{ .String "metric.name" }}</span>
            <span class="shrink-0 color-negative size-h6">{{ .String "metric.health_status" }}</span>
          </li>
          {{ end }}
        </ul>
        {{ end }}

        {{ if gt (len $oos) 0 }}
        <div class="size-h5" style="margin-top: 10px;">Out of sync</div>
        <ul class="list-horizontal-text collapsible-container" data-collapse-after="8">
          {{ range $oos }}<li>{{ .String "metric.name" }}</li>{{ end }}
        </ul>
        {{ end }}
    - type: custom-api
      title: Technitium DNS Stats
      cache: 1h
      url: ${TECHNITIUM_URL}/api/dashboard/stats/get?token=${TECHNITIUM_TOKEN}&type=LastDay&utc=true
      subrequests:
        update-check:
          url: ${TECHNITIUM_URL}/api/user/checkForUpdate?token=${TECHNITIUM_TOKEN}
      template: |
        <ul class="list list-gap-10 collapsible-container" data-collapse-after="3">
          {{ $updateCheck := .Subrequest "update-check" }}
          <li>
            <strong class="color-highlight">Version:</strong>
            {{ $updateCheck.JSON.String "response.currentVersion" }}
            {{ if ($updateCheck.JSON.Bool "response.updateAvailable") }}
            <a href="https://github.com/TechnitiumSoftware/DnsServer/blob/master/CHANGELOG.md"><strong><span class="color-positive"> Update Available: {{ $updateCheck.JSON.String "response.updateVersion" }}</span></strong></a>
            {{ end }}
          </li>
          <li>
            <strong class="color-highlight">Total Queries:</strong>
            {{ .JSON.String "response.stats.totalQueries" }}
          </li>
          <li>
            <strong class="color-highlight">Blocked Queries:</strong>
            {{ .JSON.String "response.stats.totalBlocked" }}
          </li>
          <li>
            <h4 class="size-h5 color-highlight">Top Clients</h4>
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
              <thead>
                <tr style="border-bottom: 1px solid #ccc;">
                  <th style="text-align: left; padding: 8px;">Name</th>
                  <th style="text-align: left; padding: 8px;">Hits</th>
                </tr>
              </thead>
              <tbody>
                {{ range $index, $client := .JSON.Array "response.topClients" }}
                  <tr>
                    <td style="padding: 8px;">{{ $client.String "name" }}</td>
                    <td style="padding: 8px;">{{ $client.String "hits" }}</td>
                  </tr>
                {{ end }}
              </tbody>
            </table>
          </li>
          <li>
            <h4 class="size-h5 color-highlight">Top Domains</h4>
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px;">
              <thead>
                <tr style="border-bottom: 1px solid #ccc;">
                  <th style="text-align: left; padding: 8px;">Domain</th>
                  <th style="text-align: left; padding: 8px;">Hits</th>
                </tr>
              </thead>
              <tbody>
                {{ range $index, $domain := .JSON.Array "response.topDomains" }}
                  <tr>
                    <td style="padding: 8px;">{{ $domain.String "name" }}</td>
                    <td style="padding: 8px;">{{ $domain.String "hits" }}</td>
                  </tr>
                {{ end }}
              </tbody>
            </table>
          </li>
          <li>
            <h4 class="size-h5 color-highlight">Top Blocked Domains</h4>
            <table style="width: 100%; border-collapse: collapse;">
              <thead>
                <tr style="border-bottom: 1px solid #ccc;">
                  <th style="text-align: left; padding: 8px;">Domain</th>
                  <th style="text-align: left; padding: 8px;">Hits</th>
                </tr>
              </thead>
              <tbody>
                {{ range $index, $blocked := .JSON.Array "response.topBlockedDomains" }}
                  <tr>
                    <td style="padding: 8px;">{{ $blocked.String "name" }}</td>
                    <td style="padding: 8px;">{{ $blocked.String "hits" }}</td>
                  </tr>
                {{ end }}
              </tbody>
            </table>
          </li>
        </ul>
    - type: custom-api
      title: Unifi
      cache: 1m
      allow-insecure: true
      url: https://${UNIFI_CONSOLE_IP}/proxy/network/api/stat/sites
