  - size: small
    widgets:
    - type: rss
      title: News
      style: vertical-list
      limit: 12
      collapse-after: 5
      cache: 30m
      feeds:
        - url: https://feeds.bbci.co.uk/news/world/rss.xml
          title: BBC World
        - url: https://feeds.npr.org/1001/rss.xml
