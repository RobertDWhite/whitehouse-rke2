          <p class="color-subdue">Nothing scheduled (set SONARR_API_KEY / RADARR_API_KEY).</p>
        {{ else }}
        <ul class="list list-gap-10 collapsible-container" data-collapse-after="6">
          {{ range $eps }}
          <li class="flex justify-between gap-10">
            <span class="text-truncate"><span class="color-primary">TV</span> {{ .String "series.title" }} S{{ .Int "seasonNumber" }}E{{ .Int "episodeNumber" }}</span>
            <span class="shrink-0 size-h6">{{ .String "airDate" }}</span>
