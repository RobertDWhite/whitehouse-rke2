apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: glance

resources:
  - 00-namespace.yaml
  - deployment.yaml
  - service.yaml
  - 40-httproute.yaml
  - 41-httproute-public.yaml

generators:
  - ksops-secret.yaml

configMapGenerator:
  - name: glance-config
    files:
      - glance.yml=config/glance.yml

images:
  - name: docker.io/glanceapp/glance
    newTag: v0.8.5
