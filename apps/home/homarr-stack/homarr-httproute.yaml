apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homarr
  namespace: homarr
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-homarr-public
  hostnames:
    - homarr.white.fm
  rules:
    - backendRefs:
        - name: homarr
          port: 7575
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homarr-internal
  namespace: homarr
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-homarr-internal
  hostnames:
    - homarr.internal.white.fm
  rules:
    - backendRefs:
        - name: homarr
          port: 7575
