apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homebridge-white-fm-tls
  namespace: envoy-gateway-system
spec:
  secretName: homebridge-white-fm-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns
  dnsNames:
    - homebridge.white.fm
    - homebridge.internal.white.fm
