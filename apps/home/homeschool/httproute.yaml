apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homeschool
  namespace: homeschool
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - homeschool.white.fm
    - homeschool.internal.white.fm
  rules:
    - backendRefs:
        - name: homarr
          port: 7575
