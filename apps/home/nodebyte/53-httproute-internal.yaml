apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nodebyte-internal
  namespace: nodebyte
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - nodebyte.internal.white.fm
  rules:
    - backendRefs:
        - name: web
          port: 3000
