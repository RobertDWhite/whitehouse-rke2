apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcharr-redis
  namespace: dispatcharr
  labels:
    app: dispatcharr-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcharr-redis
  template:
    metadata:
      labels:
        app: dispatcharr-redis
    spec:
      containers:
        - name: redis
          image: redis
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
