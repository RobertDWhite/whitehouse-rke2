apiVersion: v1
kind: Service
metadata:
  name: dispatcharr-lb
  namespace: dispatcharr
  annotations:
    # .120 is claimed by convos/znc; dispatcharr uses .121 to avoid the collision.
    metallb.universe.tf/loadBalancerIPs: 10.99.5.121
spec:
  type: LoadBalancer
  selector:
    app: dispatcharr-web
  ports:
    - name: http
      port: 9191
      targetPort: 9191
      protocol: TCP
