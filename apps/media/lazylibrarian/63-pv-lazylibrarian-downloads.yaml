apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-calibre-downloads
spec:
  accessModes:
    - ReadWriteMany
  capacity:
    storage: 10Ti
  mountOptions:
    - nfsvers=4.1
  nfs:
    path: /volume5/downloads
    server: 10.100.1.20
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    name: lazylibrarian-downloads
    namespace: calibre
