apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-calibre-shelfmark-to-vpn
  namespace: media
spec:
  podSelector:
    matchLabels:
      app: vpn-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: calibre
          podSelector:
            matchLabels:
              app: shelfmark
      ports:
        - port: 1080
          protocol: TCP
        - port: 8888
          protocol: TCP
