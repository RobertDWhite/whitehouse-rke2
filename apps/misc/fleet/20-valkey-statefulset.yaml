apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: fleet
  labels:
    app: valkey
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey
          imagePullPolicy: IfNotPresent
          command:
            - valkey-server
          args:
            - --requirepass
            - $(VALKEY_PASSWORD)
            - --maxmemory
            - 512mb
            - --maxmemory-policy
            - allkeys-lru
            - --appendonly
            - "no"
            - --save
            - ""
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis
                  key: redis-password
          ports:
            - containerPort: 6379
              name: valkey
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 768Mi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli -a "$VALKEY_PASSWORD" ping | grep PONG
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - valkey-cli -a "$VALKEY_PASSWORD" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: valkey-data
