apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fleet-internal
  namespace: fleet
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - fleet.internal.white.fm
  rules:
    - backendRefs:
        - name: fleet-service
          port: 8080
