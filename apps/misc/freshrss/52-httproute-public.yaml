apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: freshrss
  namespace: freshrss
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - rss.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80
