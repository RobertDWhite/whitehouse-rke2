apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: freshrss-internal
  namespace: freshrss
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - rss.internal.white.fm
  rules:
    - backendRefs:
        - name: freshrss
          port: 80
