apiVersion: batch/v1
kind: CronJob
metadata:
  name: freshrss-daily-digest
  namespace: freshrss
spec:
  schedule: "30 8 * * *"
  timeZone: "America/New_York"
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 1800
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          terminationGracePeriodSeconds: 30
          nodeSelector:
            kubernetes.io/arch: amd64
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: NotIn
                        values:
                          - rke2-node-50
          restartPolicy: Never
          containers:
            - name: digest
              image: freshrss-daily-digest
              imagePullPolicy: IfNotPresent
              args:
                - --config
                - /config/config.yaml
              envFrom:
                - secretRef:
                    name: freshrss-digest-secrets
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: config
                  mountPath: /config
                - name: data
                  mountPath: /data
          volumes:
            - name: config
              configMap:
                name: freshrss-digest-config
            - name: data
              persistentVolumeClaim:
                claimName: freshrss-digest-data
