apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hermes-internal
  namespace: hermes
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - hermes.internal.white.fm
  rules:
    - backendRefs:
        - name: hermes
          port: 9119
