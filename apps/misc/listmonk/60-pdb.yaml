apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: listmonk
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: listmonk
  namespace: listmonk
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: listmonk
