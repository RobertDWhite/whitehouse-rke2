apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: listmonk
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-listmonk
  namespace: listmonk
spec:
  podSelector:
    matchLabels:
      app: listmonk
  policyTypes:
    - Ingress
  ingress:
    # Envoy Gateway delivers all public/recipient traffic (admin UI, unsubscribe,
    # tracking pixels, subscription pages) to the listmonk pod.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - port: 9000
          protocol: TCP
    # kube-system probes / health checks.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 9000
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-postgres
  namespace: listmonk
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # Only the listmonk app pod may reach Postgres.
    - from:
        - podSelector:
            matchLabels:
              app: listmonk
      ports:
        - port: 5432
          protocol: TCP
