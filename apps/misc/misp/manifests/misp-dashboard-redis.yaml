apiVersion: apps/v1
kind: Deployment
metadata:
  name: misp-dashboard-redis
  labels:
    app.kubernetes.io/name: misp-dashboard-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: misp-dashboard-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: misp-dashboard-redis
    spec:
      containers:
        - name: redis
          image: public.ecr.aws/docker/library/redis:8.2.1@sha256:5fa2edb1e408fa8235e6db8fab01d1afaaae96c9403ba67b70feceb8661e8621
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: misp-dashboard-redis
  labels:
    app.kubernetes.io/name: misp-dashboard-redis
spec:
  selector:
    app.kubernetes.io/name: misp-dashboard-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
