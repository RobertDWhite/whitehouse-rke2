apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: monica
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:latest@sha256:8ff36f3c66371cba71d20ceedccfc3de9669a68737607888c4ef0af93abe8e39
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: monica
            - name: POSTGRES_USER
              value: monica
            - name: POSTGRES_PASSWORD_FILE
              value: /run/secrets/postgres/password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: postgres-password
              mountPath: /run/secrets/postgres
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: [pg_isready, -U, monica]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: [pg_isready, -U, monica]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: monica-postgres-data
        - name: postgres-password
          secret:
            secretName: monica-secrets
            defaultMode: 0400
            items:
              - key: db-password
                path: password
