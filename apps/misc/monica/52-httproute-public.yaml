apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: monica-public
  namespace: monica
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - monica.white.fm
  rules:
    - backendRefs:
        - name: monica
          port: 80
