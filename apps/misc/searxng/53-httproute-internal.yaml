apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: searxng-internal
  namespace: searxng
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - searxng.internal.white.fm
  rules:
    - backendRefs:
        - name: searxng
          port: 8080
