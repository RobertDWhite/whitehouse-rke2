apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
  annotations:
    renovatebot/update-container-image: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate           # RWO data volume — never two pods at once
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - rke2-node-50
      securityContext:
        fsGroup: 65534          # wallabag runs php-fpm as nobody (65534); make the PVC group-writable
      containers:
        - name: wallabag
          image: wallabag/wallabag:2.6.14
          ports:
            - containerPort: 80
          env:
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_sqlite
            - name: SYMFONY__ENV__DATABASE_PATH
              value: /var/www/wallabag/data/db/wallabag.sqlite
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: https://wallabag.white.fm
            - name: SYMFONY__ENV__SERVER_NAME
              value: "Wallabag"
            - name: SYMFONY__ENV__FOSUSER_REGISTRATION
              value: "false"           # no open signups; auth is via Authentik + local admin
            # First boot seeds the schema + default admin (wallabag / wallabag).
            # `wallabag install` is idempotent (skips if already installed) so this is safe to leave on.
            - name: POPULATE_DATABASE
              value: "True"
          volumeMounts:
            - name: data
              mountPath: /var/www/wallabag/data
          startupProbe:                 # generous: first-boot migrations can take minutes
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: wallabag-data
