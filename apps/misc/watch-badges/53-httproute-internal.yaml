apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: watch-badges-internal
  namespace: watch-badges
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - badges.internal.white.fm
  rules:
    - backendRefs:
        - name: watch-badges
          port: 80
