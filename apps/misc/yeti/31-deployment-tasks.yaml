apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-tasks
  labels:
    app.kubernetes.io/name: yeti-tasks
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yeti-tasks
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yeti-tasks
    spec:
      initContainers:
        - name: wait-api
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z yeti-api 8000; do
                echo "waiting for api..."
                sleep 2
              done
      containers:
        - name: tasks
          image: yetiplatform/yeti
          args: ["tasks"]
          envFrom:
            - configMapRef:
                name: yeti-env
          env:
            - name: YETI_ARANGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: ARANGO_ROOT_PASSWORD
            - name: YETI_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: exports
              mountPath: /opt/yeti/exports
      volumes:
        - name: exports
          emptyDir: {}
---
