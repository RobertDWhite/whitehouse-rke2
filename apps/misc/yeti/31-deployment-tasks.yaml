apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-tasks-beat
  labels:
    app.kubernetes.io/name: yeti-tasks-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yeti-tasks-beat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yeti-tasks-beat
    spec:
      initContainers:
        - name: wait-redis
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z yeti-redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: tasks-beat
          image: yetiplatform/yeti
          args: ["tasks-beat"]
          envFrom:
            - configMapRef:
                name: yeti-env
          env:
            - name: YETI_ARANGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: ARANGO_ROOT_PASSWORD
            - name: YETI_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: SECRET_KEY
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
