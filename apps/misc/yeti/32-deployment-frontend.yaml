apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-frontend
  labels:
    app.kubernetes.io/name: yeti-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yeti-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yeti-frontend
    spec:
      containers:
        - name: frontend
          image: yetiplatform/yeti-frontend
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: yeti-frontend-nginx
