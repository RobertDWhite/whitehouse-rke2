apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openhamclock-internal
  namespace: openhamclock
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - hamclock.internal.white.fm
  rules:
    - backendRefs:
        - name: openhamclock
          port: 3000
