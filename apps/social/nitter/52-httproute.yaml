apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nitter-public
  namespace: nitter
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - nitter.white.fm
  rules:
    - backendRefs:
        - name: nitter
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nitter-internal
  namespace: nitter
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - nitter.internal.white.fm
  rules:
    - backendRefs:
        - name: nitter
          port: 8080
