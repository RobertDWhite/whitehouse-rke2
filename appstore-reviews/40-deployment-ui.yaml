apiVersion: apps/v1
kind: Deployment
metadata:
  name: appstore-ui
  namespace: appstore-reviews
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appstore-ui
  template:
    metadata:
      labels:
        app: appstore-ui
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [rke2-node-13, rke2-node-14, rke2-node-50]
      containers:
        - name: appstore-ui
          image: registry.internal.white.fm/appstore-ui
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: API_UPSTREAM
              value: http://appstore-api.appstore-reviews.svc.cluster.local:8000
            - name: NGINX_RESOLVER
              value: "10.43.0.10"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
