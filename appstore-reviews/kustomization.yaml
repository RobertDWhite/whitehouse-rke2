apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: appstore-reviews

resources:
  - 00-namespace.yaml
  - 10-configmap.yaml
  - 30-deployment-api.yaml
  - 31-service-api.yaml
  - 40-deployment-ui.yaml
  - 41-service-ui.yaml
  - 50-httproute-internal.yaml
  - 60-networkpolicy.yaml

generators:
  - ksops.yaml

images:
  - name: registry.internal.white.fm/appstore-app
    newName: registry.internal.white.fm/appstore-app
    newTag: "0.1.0"
  - name: registry.internal.white.fm/appstore-ui
    newName: registry.internal.white.fm/appstore-ui
    newTag: "0.1.0"
