apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ground-station
  namespace: argocd
spec:
  project: default

  source:
    repoURL: git@github.com:RobertDWhite/whitehouse-rke2.git
    targetRevision: main
    path: ground-station
    kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: ground-station

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
