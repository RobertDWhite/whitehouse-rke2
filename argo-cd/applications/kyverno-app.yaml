apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    # Chart 3.8.1 ships Kyverno appVersion v1.18.1 (latest stable at install time).
    # Bump deliberately — never use a moving tag on the chart itself.
    targetRevision: 3.8.1
    helm:
      releaseName: kyverno
      values: |
        # ----------------------------------------------------------------
        # Image pinning by digest
        # ----------------------------------------------------------------
        # The chart concatenates "<repository>:<tag>" — passing
        # "v1.18.1@sha256:..." as the tag yields a fully-qualified
        # digest-pinned reference (containerd accepts repo:tag@sha256:...).
        # Digests resolved via `crane digest` against ghcr.io/kyverno/*:v1.18.1.
        # ----------------------------------------------------------------
        admissionController:
          replicas: 2
          initContainer:
            image:
              registry: ghcr.io
              repository: kyverno/kyvernopre
              tag: v1.18.1
          container:
            image:
              registry: ghcr.io
              repository: kyverno/kyverno
              tag: v1.18.1
          # /metrics on port 8000 — Service is named
          # kyverno-svc-metrics.kyverno.svc.cluster.local (chart helper:
          # "{kyverno.fullname}-svc-metrics", release name is kyverno).
          metricsService:
            create: true
            port: 8000
            type: ClusterIP
          nodeSelector:
            kubernetes.io/os: linux
            kubernetes.io/arch: amd64

        backgroundController:
          replicas: 1
          image:
            registry: ghcr.io
            repository: kyverno/background-controller
            tag: v1.18.1
          metricsService:
            create: true
            port: 8000
            type: ClusterIP
          nodeSelector:
            kubernetes.io/os: linux
            kubernetes.io/arch: amd64

        cleanupController:
          replicas: 1
          image:
            registry: ghcr.io
            repository: kyverno/cleanup-controller
            tag: v1.18.1
          metricsService:
            create: true
            port: 8000
            type: ClusterIP
          nodeSelector:
            kubernetes.io/os: linux
            kubernetes.io/arch: amd64

        reportsController:
          replicas: 1
          image:
            registry: ghcr.io
            repository: kyverno/reports-controller
            tag: v1.18.1
          metricsService:
            create: true
            port: 8000
            type: ClusterIP
          nodeSelector:
            kubernetes.io/os: linux
            kubernetes.io/arch: amd64
          # The chart default (128Mi limit) OOMKills on a cluster this size —
          # the reports-controller holds a PolicyReport per resource across
          # every namespace plus the hourly background-scan working set. It
          # was crashlooping (exit 137) until this bump, which is why the
          # violation dashboard showed no data. Generous limit; reports-
          # controller memory scales with total resource count.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        # ----------------------------------------------------------------
        # Webhook failure policy
        # ----------------------------------------------------------------
        # Kyverno's webhook failurePolicy is per-policy (spec.failurePolicy
        # on each ClusterPolicy). Day-one rollout uses failurePolicy=Ignore
        # on every policy so a Kyverno outage does NOT block the API server.
        # Bump individual policies to Fail after their audit window is clean.
        # ----------------------------------------------------------------
        # Force all policies to Ignore globally for the audit period. Once
        # we're confident the install is stable and policies are tuned,
        # delete this flag and let per-policy spec.failurePolicy take over.
        features:
          forceFailurePolicyIgnore:
            enabled: true

        # Exclude system namespaces from Kyverno's own webhook objectSelector
        # so admission requests from kube-system / kyverno itself / similar
        # platform namespaces never hit policies. This is in addition to the
        # per-policy `exclude` blocks (defense in depth).
        config:
          webhooks:
            namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kube-system
                    - kyverno
          resourceFiltersExcludeNamespaces: []

        # ----------------------------------------------------------------
        # Pod security
        # ----------------------------------------------------------------
        # The upstream chart already sets runAsNonRoot=true (uid 65534) for
        # every controller. Documenting here as a guard against accidental
        # override during future bumps.

        # ----------------------------------------------------------------
        # Per-controller nodeSelector set above. Kept off node-10 (arm64,
        # transient) and off node-50 (transient RTX 5090).
        # ----------------------------------------------------------------
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
