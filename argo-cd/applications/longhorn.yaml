apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
  namespace: argocd
spec:
  project: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.10.1
    helm:
      values: |
        preUpgradeChecker:
          job:
            enabled: false
        csi:
          attacherReplicaCount: 1
          provisionerReplicaCount: 1
          resizerReplicaCount: 1
          snapshotter:
            enabled: true
        defaultSettings:
          backupTarget: nfs://10.100.1.20:/volume1/longhorn-backups
        # node-14 (control-plane) carries a kube-vip=disabled:NoSchedule taint;
        # the manager DaemonSet has no default tolerations, so it was excluded
        # from node-14 even though node-14 holds ~12TB of Longhorn disks. Tolerate
        # it so the manager runs there and node-14 is a usable replica target.
        longhornManager:
          tolerations:
            - key: kube-vip
              operator: Exists
              effect: NoSchedule
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipHooks=true