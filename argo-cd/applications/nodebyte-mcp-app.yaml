apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nodebyte-mcp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:RobertDWhite/whitehouse-rke2.git
    targetRevision: main
    path: mcp/nodebyte
  destination:
    server: https://kubernetes.default.svc
    namespace: nodebyte-mcp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
