apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onepassword-connect
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: git@github.com:RobertDWhite/whitehouse-rke2.git
      targetRevision: main
      path: 1password-connect
    - repoURL: https://1password.github.io/connect-helm-charts/
      chart: connect
      targetRevision: "2.3.0"
      helm:
        values: |
          connect:
            create: true
            credentialsName: op-connect
            credentialsKey: 1password-credentials.json
          operator:
            create: true
            token:
              name: op-connect
              key: token
            autoRestart: true
  destination:
    server: https://kubernetes.default.svc
    namespace: 1password
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
