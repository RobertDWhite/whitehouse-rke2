apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openclaw-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: ghcr.io/openclaw-rocks/charts
    chart: openclaw-operator
    # renovate: datasource=helm depName=openclaw-operator registryUrl=oci://ghcr.io/openclaw-rocks/charts
    targetRevision: 0.10.16
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
