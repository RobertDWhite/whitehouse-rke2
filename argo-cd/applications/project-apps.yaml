  # Resource whitelists stay open: this tier includes Helm charts/operators whose
  # full cluster-resource set (CRDs, webhooks, ClusterRoles) isn't visible in git.
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
