apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tautulli
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://bjw-s-labs.github.io/helm-charts/
    chart: app-template
    targetRevision: "3.5.1"
    helm:
      releaseName: tautulli
      values: |
          defaultPodOptions:
            labels:
              app: tautulli

          controllers:
            tautulli:
              strategy: RollingUpdate
              pod:
                securityContext:
                  runAsUser: 1000
                  runAsGroup: 1000
                  fsGroup: 1000
                  fsGroupChangePolicy: OnRootMismatch
              initContainers:
                install-deps:
                  image:
                    repository: python
                    tag: "3.12-slim"
                    pullPolicy: IfNotPresent
                  command:
                    - /bin/sh
                    - -c
                    - pip install --quiet --target=/pylibs prometheus_client==0.22.1
              containers:
                app:
                  image:
                    repository: lscr.io/linuxserver/tautulli
                    tag: 2.16.0
                    pullPolicy: IfNotPresent
                  env:
                    TZ: "America/New_York"
                    PUID: "1000"
                    PGID: "1000"
                  resources:
                    requests:
                      cpu: 50m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 1Gi
                  ports:
                    - name: http
                      containerPort: 8181
                      protocol: TCP
                  probes:
                    liveness:
                      enabled: true
                      port: http
                      path: /
                    readiness:
                      enabled: true
                      port: http
                      path: /
                exporter:
                  image:
                    repository: python
                    tag: "3.12-slim"
                    pullPolicy: IfNotPresent
                  command:
                    - /bin/sh
                    - -c
                    - exec python3 /scripts/exporter.py
                  env:
                    PYTHONPATH: "/pylibs"
                    TAUTULLI_URL: "http://localhost:8181"
                    TAUTULLI_API_KEY:
                      valueFrom:
                        secretKeyRef:
                          name: tautulli-api
                          key: TAUTULLI_API_KEY
                    EXPORTER_PORT: "9487"
                    POLL_INTERVAL: "15"
                  ports:
                    - name: metrics
                      containerPort: 9487
                      protocol: TCP
                  resources:
                    requests:
                      cpu: 10m
                      memory: 64Mi
                    limits:
                      cpu: 100m
                      memory: 128Mi
                  probes:
                    liveness:
                      enabled: true
                      custom: true
                      spec:
                        httpGet:
                          path: /
                          port: 9487
                        initialDelaySeconds: 10
                        periodSeconds: 30
                        failureThreshold: 3
                    readiness:
                      enabled: true
                      custom: true
                      spec:
                        httpGet:
                          path: /
                          port: 9487
                        initialDelaySeconds: 5
                        periodSeconds: 15
                        failureThreshold: 3

          configMaps:
            exporter-script:
              data:
                exporter.py: |
                  """Tautulli Prometheus Exporter — polls the Tautulli API and exposes metrics."""
                  from __future__ import annotations
                  import json, os, sys, time, urllib.error, urllib.request
                  from typing import Any
                  from prometheus_client import Gauge, Info, start_http_server
                  TAUTULLI_URL = os.environ.get("TAUTULLI_URL", "http://tautulli.tautulli.svc.cluster.local:8181").rstrip("/")
                  TAUTULLI_API_KEY = os.environ["TAUTULLI_API_KEY"]
                  LISTEN_PORT = int(os.environ.get("EXPORTER_PORT", "9487"))
                  POLL_INTERVAL = int(os.environ.get("POLL_INTERVAL", "15"))
                  UP = Gauge("tautulli_up", "1 if the Tautulli API is reachable")
                  ACTIVE_STREAMS = Gauge("tautulli_active_streams", "Total active streams")
                  STREAMS_DIRECT_PLAY = Gauge("tautulli_streams_direct_play", "Direct play streams")
                  STREAMS_DIRECT_STREAM = Gauge("tautulli_streams_direct_stream", "Direct stream count")
                  STREAMS_TRANSCODE = Gauge("tautulli_streams_transcode", "Transcode streams")
                  BANDWIDTH = Gauge("tautulli_bandwidth_kbps", "Bandwidth in kbps", ["location"])
                  LIBRARY_ITEMS = Gauge("tautulli_library_items", "Item count per library", ["library_name", "section_type"])
                  STREAM_INFO = Gauge("tautulli_stream_info", "Active stream (gauge=1 per stream)", ["user", "title", "player", "quality", "transcode_decision", "media_type", "library_name", "video_resolution", "state"])
                  TOTAL_DURATION = Gauge("tautulli_total_duration_seconds", "Total watch duration", ["stat_type"])
                  SERVER_INFO = Info("tautulli_server", "Plex/Tautulli server metadata")
                  PLAYS_PERIOD = Gauge("tautulli_plays_total", "Play count over period", ["period", "media_type"])
                  USER_PLAYS = Gauge("tautulli_user_plays_total", "Total plays per user", ["user"])
                  USER_DURATION = Gauge("tautulli_user_duration_seconds", "Watch duration per user", ["user"])
                  HISTORY_TOTAL = Gauge("tautulli_history_records_total", "Total history records in Tautulli")
                  DAILY_PLAYS = Gauge("tautulli_daily_plays", "Plays on a given date", ["date", "media_type"])
                  def _api(cmd, **p):
                      qs = "&".join(f"{k}={v}" for k, v in p.items())
                      url = f"{TAUTULLI_URL}/api/v2?apikey={TAUTULLI_API_KEY}&cmd={cmd}"
                      if qs: url += f"&{qs}"
                      try:
                          with urllib.request.urlopen(url, timeout=10) as r:
                              d = json.loads(r.read().decode())
                          if d.get("response",{}).get("result") == "success": return d["response"]["data"]
                      except Exception as e: print(f"[exporter] API error ({cmd}): {e}", flush=True)
                      return None
                  def collect_activity():
                      data = _api("get_activity")
                      if data is None: UP.set(0); return
                      UP.set(1)
                      ACTIVE_STREAMS.set(int(data.get("stream_count", 0)))
                      STREAMS_DIRECT_PLAY.set(int(data.get("stream_count_direct_play", 0)))
                      STREAMS_DIRECT_STREAM.set(int(data.get("stream_count_direct_stream", 0)))
                      STREAMS_TRANSCODE.set(int(data.get("stream_count_transcode", 0)))
                      BANDWIDTH.labels(location="total").set(int(data.get("total_bandwidth", 0)))
                      BANDWIDTH.labels(location="lan").set(int(data.get("lan_bandwidth", 0)))
                      BANDWIDTH.labels(location="wan").set(int(data.get("wan_bandwidth", 0)))
                      STREAM_INFO._metrics.clear()
                      for s in data.get("sessions", []):
                          STREAM_INFO.labels(user=s.get("friendly_name") or s.get("user","?"), title=s.get("full_title") or s.get("title","?"), player=s.get("player","?"), quality=s.get("quality_profile","?"), transcode_decision=s.get("transcode_decision","direct play"), media_type=s.get("media_type","?"), library_name=s.get("library_name","?"), video_resolution=s.get("stream_video_full_resolution") or s.get("video_full_resolution","?"), state=s.get("state","?")).set(1)
                  def collect_libraries():
                      data = _api("get_libraries")
                      if data is None: return
                      LIBRARY_ITEMS._metrics.clear()
                      for lib in data: LIBRARY_ITEMS.labels(library_name=lib.get("section_name","?"), section_type=lib.get("section_type","?")).set(int(lib.get("count", 0)))
                  def collect_home_stats():
                      data = _api("get_home_stats", stat_id="duration", stats_count="1", time_range="30")
                      if data is None: return
                      for stat in (data if isinstance(data, list) else [data]):
                          total = sum(int(r.get("total_duration", 0)) for r in stat.get("rows", []))
                          TOTAL_DURATION.labels(stat_type=stat.get("stat_id","?")).set(total)
                  def collect_server_info():
                      si, ti = _api("get_server_info"), _api("get_tautulli_info")
                      info = {}
                      if si: info["plex_version"]=si.get("pms_version","?"); info["plex_platform"]=si.get("pms_platform","?"); info["plex_name"]=si.get("pms_name","?")
                      if ti: info["tautulli_version"]=ti.get("tautulli_version","?")
                      if info: SERVER_INFO.info(info)
                  def collect_play_totals():
                      """Play count aggregates by period and media type."""
                      PLAYS_PERIOD._metrics.clear()
                      for days, label in [(7,"7d"),(30,"30d"),(365,"365d")]:
                          data = _api("get_plays_by_date", time_range=str(days))
                          if data is None: continue
                          for series in data.get("series", []):
                              name = series.get("name", "?")
                              total = sum(series.get("data", []))
                              PLAYS_PERIOD.labels(period=label, media_type=name).set(total)
                  def collect_daily_plays():
                      """Per-day play counts for the last 30 days — powers time-series graphs."""
                      DAILY_PLAYS._metrics.clear()
                      data = _api("get_plays_by_date", time_range="30")
                      if data is None: return
                      dates = data.get("categories", [])
                      for series in data.get("series", []):
                          name = series.get("name", "?")
                          for date, count in zip(dates, series.get("data", [])):
                              if count > 0: DAILY_PLAYS.labels(date=date, media_type=name).set(count)
                  def collect_user_stats():
                      """Per-user total plays and watch duration."""
                      USER_PLAYS._metrics.clear(); USER_DURATION._metrics.clear()
                      data = _api("get_home_stats", stat_id="top_users", stats_count="25", time_range="30")
                      if data is None: return
                      for stat in (data if isinstance(data, list) else [data]):
                          for row in stat.get("rows", []):
                              user = row.get("friendly_name") or row.get("user", "?")
                              USER_PLAYS.labels(user=user).set(int(row.get("total_plays", 0)))
                              USER_DURATION.labels(user=user).set(int(row.get("total_duration", 0)))
                  def collect_history_count():
                      data = _api("get_history", length="1")
                      if data: HISTORY_TOTAL.set(int(data.get("recordsTotal", 0)))
                  _slow_counter = [0]
                  def main():
                      print(f"[exporter] Tautulli Prometheus Exporter starting url={TAUTULLI_URL} port={LISTEN_PORT} interval={POLL_INTERVAL}s", flush=True)
                      start_http_server(LISTEN_PORT)
                      collect_server_info()
                      while True:
                          try:
                              collect_activity(); collect_libraries()
                              # Historical/aggregate metrics every 5 minutes (not every 15s)
                              _slow_counter[0] += 1
                              if _slow_counter[0] % 20 == 1:
                                  collect_home_stats(); collect_play_totals()
                                  collect_daily_plays(); collect_user_stats()
                                  collect_history_count(); collect_server_info()
                          except Exception as e: print(f"[exporter] error: {e}", flush=True)
                          time.sleep(POLL_INTERVAL)
                  if __name__ == "__main__": main()

          service:
            app:
              controller: tautulli
              ports:
                http:
                  port: 8181
                  protocol: TCP
            metrics:
              controller: tautulli
              ports:
                metrics:
                  port: 9487
                  protocol: TCP

          ingress:
            app:
              enabled: true
              className: nginx
              annotations:
                cert-manager.io/cluster-issuer: "letsencrypt-dns"
                nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
              hosts:
                - host: tautulli.white.fm
                  paths:
                    - path: /
                      pathType: Prefix
                      service:
                        identifier: app
                        port: 8181
                - host: tautulli.internal.white.fm
                  paths:
                    - path: /
                      pathType: Prefix
                      service:
                        identifier: app
                        port: 8181
              tls:
                - secretName: tautulli-white-fm-tls
                  hosts:
                    - tautulli.white.fm
                    - tautulli.internal.white.fm

          persistence:
            config:
              enabled: true
              type: persistentVolumeClaim
              existingClaim: tautulli-config
              advancedMounts:
                tautulli:
                  app:
                    - path: /config
            exporter-script:
              enabled: true
              type: configMap
              name: tautulli-exporter-script
              advancedMounts:
                tautulli:
                  exporter:
                    - path: /scripts
            pylibs:
              enabled: true
              type: emptyDir
              advancedMounts:
                tautulli:
                  install-deps:
                    - path: /pylibs
                  exporter:
                    - path: /pylibs

  # NOTE: The tautulli-api Secret (API key) is managed directly in the
  # cluster, not through this Helm chart. ArgoCD multi-source + ksops
  # doesn't work (plugin path not found in the repo-server). The secret
  # was created via: kubectl create secret generic tautulli-api \
  #   --from-literal=TAUTULLI_API_KEY=<key> -n tautulli
  # The SOPS-encrypted backup lives at tautulli/secret.sops.yaml.
  destination:
    server: https://kubernetes.default.svc
    namespace: tautulli
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
