# GENERATED CONTROL PLANE -- not yet wired to app-of-apps (step 1: authoring +
# parity proof only). Replaces the security project's plain-directory
# Application CRs. Each app ships an argo-cd/app-configs/security/<name>.yaml that
# this set templates into an Application. See PARITY-REPORT.md.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: security
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: git@github.com:RobertDWhite/whitehouse-rke2.git
        revision: main
        files:
          - path: "argo-cd/app-configs/security/*.yaml"
  # Base template is plain, valid YAML (only quoted string-templates + literal
  # defaults), so generic YAML tooling parses it. ALL per-app variation -- incl.
  # the typed prune/selfHeal overrides, which can't be {{}}'d in a bool
  # field -- is injected by the templatePatch block string below.
  template:
    metadata:
      name: "{{ .name }}"
      namespace: argocd
    spec:
      project: security
      source:
        repoURL: git@github.com:RobertDWhite/whitehouse-rke2.git
        targetRevision: main
        path: "{{ .srcPath }}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
  templatePatch: |
    {{- if hasKey . "syncWave" }}
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
    {{- end }}
    spec:
    {{- if hasKey . "namespace" }}
      destination:
        namespace: {{ .namespace }}
    {{- end }}
    {{- if or (hasKey . "kustomize") (hasKey . "directory") }}
      source:
      {{- if hasKey . "kustomize" }}
        kustomize: {{ .kustomize | toYaml | nindent 10 }}
      {{- end }}
      {{- if hasKey . "directory" }}
        directory: {{ .directory | toYaml | nindent 10 }}
      {{- end }}
    {{- end }}
      syncPolicy:
    {{- if or (hasKey . "prune") (hasKey . "selfHeal") }}
        automated:
      {{- if hasKey . "prune" }}
          prune: {{ .prune }}
      {{- end }}
      {{- if hasKey . "selfHeal" }}
          selfHeal: {{ .selfHeal }}
      {{- end }}
    {{- end }}
    {{- if hasKey . "syncOptions" }}
      {{- if .syncOptions }}
        syncOptions:
        {{- range .syncOptions }}
          - {{ . }}
        {{- end }}
      {{- end }}
    {{- else }}
        syncOptions:
          - CreateNamespace=true
    {{- end }}
    {{- if hasKey . "ignoreDifferences" }}
      ignoreDifferences: {{ .ignoreDifferences | toYaml | nindent 6 }}
    {{- end }}
