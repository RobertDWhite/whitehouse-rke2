apiVersion: apps/v1
kind: Deployment
metadata:
  name: astronomy-api
  namespace: astronomy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astronomy-api
  template:
    metadata:
      labels:
        app: astronomy-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: astronomy-api
          image: registry.white.fm/astronomy-api
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: NASA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: astronomy-secret
                  key: NASA_API_KEY
            - name: OBSERVER_LAT
              valueFrom:
                configMapKeyRef:
                  name: astronomy-config
                  key: OBSERVER_LAT
            - name: OBSERVER_LON
              valueFrom:
                configMapKeyRef:
                  name: astronomy-config
                  key: OBSERVER_LON
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
