apiVersion: apps/v1
kind: Deployment
metadata:
  name: astronomy-ui
  namespace: astronomy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: astronomy-ui
  template:
    metadata:
      labels:
        app: astronomy-ui
    spec:
      containers:
        - name: astronomy-ui
          image: registry.white.fm/astronomy-ui
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
