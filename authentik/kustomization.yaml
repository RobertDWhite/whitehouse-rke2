apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik

generators:
  - ksops.yaml

resources:
  - 20-service-alias-authentik.yaml
  - 21-service-authentik-server-9443.yaml

helmCharts:
  - name: authentik
    releaseName: authentik
    version: 2026.2.1
    repo: https://charts.goauthentik.io
    valuesFile: values.yaml
    includeCRDs: true
    namespace: authentik
