apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: authentik

generators:
  - ksops.yaml

resources:
  - 20-service-alias-authentik.yaml
  - 21-postgres-exporter.yaml
  - 22-redis.yaml
  - 31-referencegrant-cyberchef.yaml
  - 32-backend-tls-policy.yaml

patches:
  - path: 30-server-tls-mount-patch.yaml

images:
  - name: quay.io/prometheuscommunity/postgres-exporter
    newTag: "v0.19.1"
  - name: redis
    newTag: "7.4-alpine"

helmCharts:
  - name: authentik
    releaseName: authentik
    version: 2026.2.1
    repo: https://charts.goauthentik.io
    valuesFile: values.yaml
    includeCRDs: true
    namespace: authentik
