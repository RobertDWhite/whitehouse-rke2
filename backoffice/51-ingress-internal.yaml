apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backoffice-internal
  namespace: backoffice
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - backoffice.internal.white.fm
      secretName: backoffice-internal-white-fm-tls
  rules:
    - host: backoffice.internal.white.fm
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backoffice-web
                port:
                  number: 3000
