apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  replicas: 5
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared
          command:
            - /bin/sh
            - -ec
          args:
            - |
              if [ -f /etc/cloudflared/creds/credentials.json ]; then
                exec cloudflared tunnel --no-autoupdate --config /etc/cloudflared/config/config.yaml run
              fi
              exec cloudflared tunnel --no-autoupdate run --token "${TUNNEL_TOKEN}"
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-secret
                  key: TUNNEL_TOKEN
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config
              readOnly: true
            - name: creds
              mountPath: /etc/cloudflared/creds
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: cloudflared-config
        - name: creds
          secret:
            secretName: cloudflared-secret
            optional: true
