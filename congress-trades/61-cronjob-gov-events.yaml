apiVersion: batch/v1
kind: CronJob
metadata:
  name: congress-gov-events
  namespace: congress-trades
spec:
  schedule: "*/30 * * * *"        # SEC 8-K firehose
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels: {app: congress-ingest}
        spec:
          restartPolicy: OnFailure
          nodeSelector: {kubernetes.io/arch: amd64}
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - {key: kubernetes.io/hostname, operator: NotIn, values: [rke2-node-13, rke2-node-14, rke2-node-50]}
          securityContext: {runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000}
          containers:
            - name: ingest
              image: registry.internal.white.fm/congress-app
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "ingest.gov_events"]
              env:
                - {name: CONFIG_PATH, value: /etc/congress/config.yaml}
                - name: DATABASE_URL
                  valueFrom: {secretKeyRef: {name: congress-secrets, key: database-url}}
              volumeMounts: [{name: config, mountPath: /etc/congress, readOnly: true}]
              resources:
                requests: {cpu: 100m, memory: 256Mi}
                limits: {cpu: "500m", memory: 512Mi}
          volumes: [{name: config, configMap: {name: congress-config}}]
