# No-login public host. Unlike congress.white.fm (which is routed through the Authentik outpost),
# congresstrades.white.fm goes straight to the read-only UI — no SSO. The api behind this UI runs
# with PUBLIC_READONLY=true so the public cannot mutate watchlist/portfolio state.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: congress-public-noauth
  namespace: congress-trades
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-congresstrades-public
  hostnames:
    - congresstrades.white.fm
  rules:
    - backendRefs:
        - name: congress-ui-public
          port: 80
