apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cybether-postgres
  namespace: cybether
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybether-postgres
  serviceName: cybether-postgres
  template:
    metadata:
      labels:
        app: cybether-postgres
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
      containers:
      - env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: cybether-db-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: cybether-db-secret
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DB
              name: cybether-db-secret
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        image: postgres:16
        livenessProbe:
          exec:
            command:
            - pg_isready
          failureThreshold: 3
          initialDelaySeconds: 30
          periodSeconds: 30
        name: postgres
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command:
            - pg_isready
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: cybether-postgres-pvc
