apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybether-backend
  namespace: cybether
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybether-backend
  template:
    metadata:
      labels:
        app: cybether-backend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
      containers:
      - args:
        - "set -e\necho \"Waiting for postgres at $DB_HOST...\"\nuntil PGPASSWORD=\"\
          $POSTGRES_PASSWORD\" psql -h \"$DB_HOST\" -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"\
          \ -c '\\q' 2>/dev/null; do\n  echo \"postgres not ready; sleeping 3s\"\n\
          \  sleep 3\ndone\necho \"postgres ready; running init_db.py\"\npython init_db.py\n\
          echo \"starting flask\"\nexec python -m flask run --host=0.0.0.0 --port=5000\n"
        command:
        - /bin/bash
        - -c
        env:
        - name: DB_HOST
          value: cybether-postgres.cybether.svc.cluster.local
        - name: DB_PORT
          value: '5432'
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: cybether-db-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: cybether-db-secret
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              key: POSTGRES_DB
              name: cybether-db-secret
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              key: DATABASE_URL
              name: cybether-db-secret
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: SECRET_KEY
              name: cybether-db-secret
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: JWT_SECRET_KEY
              name: cybether-db-secret
        - name: FLASK_APP
          value: app.py
        - name: FLASK_ENV
          value: production
        image: registry.white.fm:5000/cybether/backend:1.0.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          initialDelaySeconds: 60
          periodSeconds: 30
          tcpSocket:
            port: 5000
        name: cybether-backend
        ports:
        - containerPort: 5000
        readinessProbe:
          initialDelaySeconds: 15
          periodSeconds: 15
          tcpSocket:
            port: 5000
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
