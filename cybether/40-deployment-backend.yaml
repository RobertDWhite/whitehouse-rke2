apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybether-backend
  namespace: cybether
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybether-backend
  template:
    metadata:
      labels:
        app: cybether-backend
    spec:
      containers:
        - name: cybether-backend
          # renovate: datasource=docker depName=registry.internal.white.fm/cybether/backend
          image: registry.internal.white.fm/cybether/backend:1.0.0@sha256:3d0eedc6615e728bfce01ebc82778ca550fba732a07ad59201f5a061e56e2882
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Waiting for postgres at $DB_HOST..."
              until PGPASSWORD="$POSTGRES_PASSWORD" psql -h "$DB_HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c '\q' 2>/dev/null; do
                echo "postgres not ready; sleeping 3s"
                sleep 3
              done
              echo "postgres ready; running init_db.py"
              python init_db.py
              echo "starting flask"
              exec python -m flask run --host=0.0.0.0 --port=5000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: DB_HOST
              value: "cybether-postgres.cybether.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cybether-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cybether-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: cybether-db-secret
                  key: POSTGRES_DB
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cybether-db-secret
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cybether-db-secret
                  key: SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cybether-db-secret
                  key: JWT_SECRET_KEY
            - name: FLASK_APP
              value: "app.py"
            - name: FLASK_ENV
              value: "production"
