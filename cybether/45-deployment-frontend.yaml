apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybether-frontend
  namespace: cybether
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybether-frontend
  template:
    metadata:
      labels:
        app: cybether-frontend
    spec:
      containers:
        - name: cybether-frontend
          # renovate: depName=registry.white.fm/cybether/frontend
          image: registry.white.fm:5000/cybether/frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-conf
          configMap:
            name: cybether-frontend-nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
