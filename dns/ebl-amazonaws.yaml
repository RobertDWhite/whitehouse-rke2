apiVersion: v1
kind: ConfigMap
metadata:
  name: rke2-coredns-extra
  namespace: kube-system
data:
  white-fm.conf: |

    white.fm:53 {
        errors
        cache 30
        template IN A white.fm {
            answer "{{ .Name }} 60 IN A 10.99.5.110"
        }
        template IN AAAA white.fm {
            rcode NOERROR
        }
    }
  amazonaws.conf: |
    elb.amazonaws.com:53 {
        errors
        cache 30
        forward . 1.1.1.1 8.8.8.8
    }

    amazonaws.com:53 {
        errors
        cache 30
        forward . 1.1.1.1 8.8.8.8
    }
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-coredns
  namespace: kube-system
spec:
  valuesContent: |-
    # Pull in the extra server blocks from the rke2-coredns-extra ConfigMap.
    extraConfig:
      import:
        parameters: /etc/coredns/extra/*.conf
    extraVolumes:
      - name: extra-config
        configMap:
          name: rke2-coredns-extra
          defaultMode: 420
    extraVolumeMounts:
      - name: extra-config
        mountPath: /etc/coredns/extra
        readOnly: true

    # Override the default `.:53` block so cluster pods get internal answers
    # for *.internal.white.fm via a rewrite to the envoy gateway service, and
    # forward everything else to Technitium pod-0 (which holds the
    # authoritative zones) with public-DNS fallbacks for when the
    # dnscrypt/VPN chain is degraded.
    servers:
      - zones:
          - zone: .
            use_tcp: true
        port: 53
        plugins:
          - name: errors
          - name: health
            configBlock: |-
              lameduck 10s
          - name: ready
          - name: kubernetes
            parameters: in-addr.arpa ip6.arpa
            configBlock: |-
              pods insecure
              fallthrough in-addr.arpa ip6.arpa
              ttl 30
          - name: rewrite
            parameters: name auth.internal.white.fm envoy-envoy-gateway-system-main-b3b376e9.envoy-gateway-system.svc.cluster.local
          - name: prometheus
            parameters: 0.0.0.0:9153
          - name: forward
            parameters: . 10.99.5.52 1.1.1.1 8.8.8.8
            configBlock: |-
              policy sequential
              health_check 5s
          - name: cache
            parameters: 30
          - name: loop
          - name: reload
          - name: loadbalance
