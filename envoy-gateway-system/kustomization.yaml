apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - install.yaml

patches:
  - target:
      kind: Deployment
      name: envoy-gateway
      namespace: envoy-gateway-system
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: envoy-gateway
      spec:
        template:
          spec:
            nodeSelector: null
