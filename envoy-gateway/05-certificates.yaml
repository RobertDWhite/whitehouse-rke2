apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-white-fm
  namespace: envoy-gateway-system
spec:
  secretName: wildcard-white-fm-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns
  dnsNames:
    - "*.white.fm"
    - "*.internal.white.fm"
---
