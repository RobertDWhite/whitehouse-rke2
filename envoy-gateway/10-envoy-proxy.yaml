apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: metallb-proxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        pod:
          nodeSelector:
            kubernetes.io/hostname: rke2-node-15
      envoyService:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/address-pool: lan-pool
          metallb.universe.tf/loadBalancerIPs: "10.99.5.116"
