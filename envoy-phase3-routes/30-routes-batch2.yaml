apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: synology-tls
  namespace: external-services
spec:
  endpoints:
    - fqdn:
        hostname: syn.external-services.svc.cluster.local
        port: 5001
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: misp-nginx-tls
  namespace: misp
spec:
  endpoints:
    - fqdn:
        hostname: nginx.misp.svc.cluster.local
        port: 443
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-batch2-public-a
  namespace: authentik
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - bazarr.white.fm
    - cybether.white.fm
    - filebot.white.fm
    - homebridge.white.fm
    - openclaw.white.fm
    - pihole-rke2.white.fm
    - pihole1.white.fm
    - pihole2.white.fm
    - prowlarr.white.fm
    - qbit.white.fm
    - radarr.white.fm
    - readarr.white.fm
    - rstudio.white.fm
    - sabnzbd.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
---
