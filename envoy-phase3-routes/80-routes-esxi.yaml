  hostnames:
    - esxi13.internal.white.fm
  rules:
    - backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: esxi13-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: esxi14-internal
  namespace: external-services
spec:
  parentRefs:
    - name: main
