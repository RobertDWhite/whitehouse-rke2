apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  namespace: external-dns
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cloudflare-ddns
  template:
    metadata:
      labels:
        app: cloudflare-ddns
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflare-ddns
          image: favonia/cloudflare-ddns
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
            - name: DOMAINS
              value: headscale.white.fm
            - name: PROXIED
              value: "false"
            - name: IP4_PROVIDER
              value: cloudflare.trace
            - name: IP6_PROVIDER
              value: none
            - name: TTL
              value: "60"
            - name: UPDATE_CRON
              value: "@every 5m"
            - name: UPDATE_ON_START
              value: "true"
            - name: DELETE_ON_STOP
              value: "false"
            - name: TZ
              value: America/Chicago
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
