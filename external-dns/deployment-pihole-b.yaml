apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-pihole-b
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns-pihole-b
  template:
    metadata:
      labels:
        app: external-dns-pihole-b
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.20.0
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /healthz
              port: 7979
            failureThreshold: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 7979
            periodSeconds: 30
            failureThreshold: 3
          args:
            - --source=ingress
            - --source=gateway-httproute
            - --provider=pihole
            - --pihole-server=https://10.100.0.21
            - --pihole-api-version=6
            - --pihole-password=$(EXTERNAL_DNS_PIHOLE_PASSWORD)
            - --pihole-tls-skip-verify
            - --policy=sync
            - --registry=noop
            - --ingress-class=nginx
            - --default-targets=10.99.5.110
            - --force-default-targets
            - --regex-domain-filter=^.*\.internal\.(white\.fm|w3rdw\.radio|whitematter\.tech)$
          env:
            - name: EXTERNAL_DNS_PIHOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-credentials
                  key: password
