apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-pihole
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns-pihole
  template:
    metadata:
      labels:
        app: external-dns-pihole
    spec:
      serviceAccountName: external-dns
      hostAliases:
        - ip: 10.100.0.20
          hostnames:
            - pi.hole
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.20.0
          args:
            - --source=ingress
            - --provider=pihole
            - --pihole-server=$(EXTERNAL_DNS_PIHOLE_SERVER)
            - --pihole-api-version=6
            - --pihole-password=$(EXTERNAL_DNS_PIHOLE_PASSWORD)
            - --pihole-tls-skip-verify
            - --policy=upsert-only
            - --registry=noop
            - --ingress-class=nginx
            - --domain-filter=white.fm
            - --domain-filter=w3rdw.radio
            - --domain-filter=whitematter.tech
            - --domain-filter=internal
          env:
            - name: EXTERNAL_DNS_PIHOLE_SERVER
              valueFrom:
                secretKeyRef:
                  name: pihole-credentials
                  key: server
            - name: EXTERNAL_DNS_PIHOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-credentials
                  key: password
            - name: EXTERNAL_DNS_PIHOLE_TLS_SKIP_VERIFY
              value: "true"
