apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.20.0
          args:
            - --source=ingress
            - --provider=cloudflare
            - --policy=upsert-only
            - --registry=txt
            - --txt-owner-id=whitehouse-rke2
            - --ingress-class=nginx
            - --domain-filter=white.fm
            - --domain-filter=w3rdw.radio
            - --domain-filter=whitematter.tech
            - --default-targets=23abb521-719f-4d99-b325-f02842e37876.cfargotunnel.com
            - --force-default-targets
            - --cloudflare-proxied
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
