apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: external-dns
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.20.0
          args:
            - --source=gateway-httproute
            - --provider=cloudflare
            - --policy=sync
            - --registry=txt
            - --txt-owner-id=whitehouse-rke2
            - --domain-filter=white.fm
            - --domain-filter=w3rdw.radio
            - --domain-filter=whitematter.tech
            - --exclude-domains=internal.white.fm
            - --exclude-domains=internal.w3rdw.radio
            - --exclude-domains=internal.whitematter.tech
            - --default-targets=221e59d6-9538-4e44-bdaa-a89b5020f7cf.cfargotunnel.com
            - --force-default-targets
            - --cloudflare-proxied
          env:
            - name: CF_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-api-token
                  key: api-token
