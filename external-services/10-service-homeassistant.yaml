apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: external-services
spec:
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      protocol: TCP
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: homeassistant
  namespace: external-services
subsets:
  - addresses:
      - ip: 10.100.1.30
    ports:
      - name: http
        port: 8123
        protocol: TCP
