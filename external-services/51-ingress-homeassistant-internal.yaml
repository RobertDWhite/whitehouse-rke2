apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homeassistant-internal
  namespace: external-services
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "external-services/homeassistant-headers"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - homeassistant.internal.white.fm
      secretName: homeassistant-internal-white-fm-tls
  rules:
    - host: homeassistant.internal.white.fm
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homeassistant
                port:
                  number: 8123
