apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freshrss-internal
  namespace: freshrss
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - rss.internal.white.fm
    secretName: rss-internal-white-fm-tls
  rules:
  - host: rss.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: freshrss
            port:
              number: 80
