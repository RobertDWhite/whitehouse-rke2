apiVersion: apps/v1
kind: Deployment
metadata:
  name: gibt-es-gott
  namespace: gibt-es-gott
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gibt-es-gott
  template:
    metadata:
      labels:
        app: gibt-es-gott
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: content
              mountPath: /content
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: content
          persistentVolumeClaim:
            claimName: gibt-es-gott-content
        - name: nginx-conf
          configMap:
            name: nginx-conf
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
