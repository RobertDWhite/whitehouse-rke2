# Template for the Glance widget secrets. DO NOT put real values here.
#
# Bring-up:
#   1. cp 45-secret.example.yaml 45-secret.sops.yaml
#   2. Fill in the CHANGEME values in 45-secret.sops.yaml
#   3. sops --encrypt --in-place 45-secret.sops.yaml
#   4. Commit + push. ArgoCD applies; the glance Deployment loads these via envFrom.
#
# Glance substitutes ${VAR} in config/glance.yml from these environment variables,
# so EVERY key referenced by the dashboard must exist here (even if left CHANGEME) —
# a missing variable makes Glance fail to start. Widgets whose token is still CHANGEME
# simply render an error tile until you fill them in; the rest of the dashboard works.
#
# In-cluster service URLs are pre-filled and should work as-is.
apiVersion: v1
kind: Secret
metadata:
  name: glance-secrets
  namespace: glance
type: Opaque
stringData:
  # GitHub — one classic PAT with scopes: repo, workflow, notifications
  GITHUB_TOKEN: CHANGEME

  # Immich (in-cluster). Key needs server.statistics + server.storage permissions.
  IMMICH_URL: http://immich-server.immich.svc.cluster.local:2283
  IMMICH_KEY: CHANGEME

  # Audiobookshelf (in-cluster). Key from config -> users -> your account.
  AUDIOBOOKSHELF_URL: http://audiobookshelf.audiobookshelf.svc.cluster.local
  AUDIOBOOKSHELF_KEY: CHANGEME

  # Tautulli. API key: Settings -> Web Interface -> API.
  # NOTE: uses the external hostname (not in-cluster DNS) because the widget
  # renders <img> poster URLs that are loaded by YOUR BROWSER, which can't
  # resolve *.svc.cluster.local.
  TAUTULLI_URL: https://tautulli.internal.white.fm
  TAUTULLI_API_KEY: CHANGEME
  # Plex server machine identifier, for the "open in Plex" deep-links. Optional.
  # Find it: {TAUTULLI_URL}/api/v2?apikey={KEY}&cmd=get_server_id&hostname={PLEX_IP}&port=32400
  PLEX_SERVER_ID: CHANGEME

  # Technitium DNS (in-cluster web service). Token: account icon -> Create API Token.
  TECHNITIUM_URL: http://technitium-web.technitium.svc.cluster.local:5380
  TECHNITIUM_TOKEN: CHANGEME

  # Uptime Kuma. Needs an existing PUBLIC status page; set its slug.
  # NOTE: external hostname because per-monitor links are opened by your browser.
  UPTIME_KUMA_URL: https://status.internal.white.fm
  UPTIME_KUMA_STATUS_SLUG: CHANGEME

  # Headscale (in-cluster API). Create: kubectl -n headscale exec deploy/headscale -- headscale apikeys create
  HEADSCALE_API_KEY: CHANGEME

  # UniFi gateway. API key: Site Settings -> Control Plane -> Integrations.
  UNIFI_CONSOLE_IP: CHANGEME
  UNIFI_API_KEY: CHANGEME

  # qBittorrent. host:port, NO scheme (e.g. 10.100.7.40:8080). Requires the
  # "Bypass authentication for clients in whitelisted IP subnets" option in
  # qBittorrent's Web UI settings, whitelisting the Glance pod / cluster subnet.
  QBITTORRENT_IP: CHANGEME

  # WAQI air quality. Free token: https://aqicn.org/data-platform/token/
  WAQI_TOKEN: CHANGEME
  WAQI_LAT: CHANGEME
  WAQI_LON: CHANGEME

  # NASA Astronomy Picture of the Day. DEMO_KEY works (rate-limited); free key: https://api.nasa.gov
  NASA_API_KEY: DEMO_KEY

  # Cloudflare Tunnels. API token needs Account > Cloudflare Tunnel: Read.
  CLOUDFLARE_ACCOUNT_ID: CHANGEME
  CLOUDFLARE_TUNNEL_ID: CHANGEME
  CLOUDFLARE_API_KEY: CHANGEME

  # Weather (Open-Meteo geocoding string), e.g. "New York, United States"
  WEATHER_LOCATION: CHANGEME
