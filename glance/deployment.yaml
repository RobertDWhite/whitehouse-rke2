apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: glance
  labels:
    app: glance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
    spec:
      # All widget URLs are full hostnames or IPs, so search-domain expansion is
      # pure overhead. ndots:1 avoids 5 DNS lookups per host (the ndots:5 default
      # + 4 search domains), which was causing intermittent custom-api timeouts.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: glance
          image: docker.io/glanceapp/glance
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: glance-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config/glance.yml
              subPath: glance.yml
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: config
          configMap:
            name: glance-config
