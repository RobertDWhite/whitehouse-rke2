apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
data:
  config.yaml: |
    server_url: https://headscale.white.fm
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 0.0.0.0:50443
    grpc_allow_insecure: false

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    derp:
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: true
    ephemeral_node_inactivity_timeout: 30m

    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite

    log:
      level: info
      format: text

    policy:
      mode: database

    dns:
      magic_dns: true
      base_domain: ts.white.fm
      override_local_dns: false
      nameservers:
        global:
          - 10.99.5.50
          - 10.99.5.51
        split:
          internal.white.fm:
            - 10.99.5.50
            - 10.99.5.51
      search_domains:
        - internal.white.fm

    unix_socket: /var/run/headscale/headscale.sock
    unix_socket_permission: "0770"

    # OIDC via Authentik — wire this up after initial bring-up.
    # oidc:
    #   only_start_if_oidc_is_available: true
    #   issuer: https://authentik.white.fm/application/o/headscale/
    #   client_id: headscale
    #   client_secret_path: /etc/headscale/oidc-client-secret
    #   scope: ["openid", "profile", "email"]
    #   pkce:
    #     enabled: true
