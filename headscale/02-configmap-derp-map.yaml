apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-derp-map
  namespace: headscale
data:
  derp-map.yaml: |
    regions:
      900:
        regionid: 900
        regioncode: home
        regionname: Whitehouse Home
        nodes:
          - name: derp-home-1
            regionid: 900
            hostname: derp.white.fm
            derpport: 18443
            stunport: 13478
            # Hardcode the public IP so clients never resolve via Technitium
            # (which returns the internal LB IP 10.99.5.101 — unreachable
            # from off-LAN clients, and the cluster LB doesn't listen on
            # the external port 18443 anyway). Update if WAN IP changes.
            ipv4: "131.241.71.23"
            ipv6: ""
            insecurefortests: false
