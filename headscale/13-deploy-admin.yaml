apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale-admin
  namespace: headscale
  labels:
    app: headscale-admin
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: headscale-admin
  template:
    metadata:
      labels:
        app: headscale-admin
    spec:
      containers:
        - name: admin
          image: goodieshq/headscale-admin
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /admin/
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /admin/
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETGID", "SETUID", "NET_BIND_SERVICE"]
