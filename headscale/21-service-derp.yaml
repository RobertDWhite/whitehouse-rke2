apiVersion: v1
kind: Service
metadata:
  name: derp
  namespace: headscale
  labels:
    app: derp
  annotations:
    # Pin to a specific MetalLB IP if you want predictable port-forward
    # routing. Otherwise MetalLB picks from its pool.
    # metallb.universe.tf/loadBalancerIPs: "10.99.5.60"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: derp
  ports:
    # Expose on the same port numbers the derp-map advertises (18443 /
    # 13478) so internal cluster pods that resolve derp.white.fm via
    # Technitium hit the same logical port the external UniFi forward
    # uses. derper itself listens on 8443/3478 inside the pod.
    - name: derp
      port: 18443
      targetPort: 8443
      protocol: TCP
    - name: stun
      port: 13478
      targetPort: 3478
      protocol: UDP
