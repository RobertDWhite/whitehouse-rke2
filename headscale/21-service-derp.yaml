apiVersion: v1
kind: Service
metadata:
  name: derp
  namespace: headscale
  labels:
    app: derp
  annotations:
    # Pin to a specific MetalLB IP if you want predictable port-forward
    # routing. Otherwise MetalLB picks from its pool.
    # metallb.universe.tf/loadBalancerIPs: "10.99.5.60"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: derp
  ports:
    # 18443/13478: what derp-map advertises; cluster pods resolving
    #   derp.white.fm via Technitium hit these.
    # 8443/3478: what the UniFi WAN-side port forward currently targets
    #   (fwd_port=8443/3478). Kept as additional Service ports so external
    #   clients work without on-LAN UniFi changes. Once the UniFi forward
    #   is updated to fwd_port=18443/13478, the 8443/3478 entries can be
    #   removed from this Service spec.
    # derper itself listens on 8443/3478 inside the pod.
    - name: derp
      port: 18443
      targetPort: 8443
      protocol: TCP
    - name: derp-unifi-legacy
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: stun
      port: 13478
      targetPort: 3478
      protocol: UDP
    - name: stun-unifi-legacy
      port: 3478
      targetPort: 3478
      protocol: UDP
