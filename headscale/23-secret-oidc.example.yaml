apiVersion: v1
kind: Secret
metadata:
  name: headscale-oidc
  namespace: headscale
type: Opaque
stringData:
  # Authentik OIDC client secret for the Headscale application.
  # Generated in Authentik when creating the OAuth2/OpenID Provider.
  # Mounted into the Headscale pod at /etc/headscale/oidc/client-secret
  # and referenced by config.yaml via oidc.client_secret_path.
  #
  # Workflow:
  #   1. Create OAuth2 provider + application in Authentik (see notes)
  #   2. Copy generated client secret here, then encrypt:
  #        cp 23-secret-oidc.example.yaml 23-secret-oidc.sops.yaml
  #        sops --encrypt --in-place 23-secret-oidc.sops.yaml
  #   3. Uncomment the ksops generator + resource line in kustomization.yaml
  client-secret: "REPLACE_WITH_AUTHENTIK_CLIENT_SECRET"
