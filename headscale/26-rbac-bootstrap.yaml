apiVersion: v1
kind: ServiceAccount
metadata:
  name: headscale-authentik-bootstrap
  namespace: headscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: headscale-authentik-bootstrap
  namespace: headscale
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: headscale-authentik-bootstrap
  namespace: headscale
subjects:
  - kind: ServiceAccount
    name: headscale-authentik-bootstrap
    namespace: headscale
roleRef:
  kind: Role
  name: headscale-authentik-bootstrap
  apiGroup: rbac.authorization.k8s.io
