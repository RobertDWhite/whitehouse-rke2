apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale-public
  namespace: headscale
  annotations:
    external-dns.alpha.kubernetes.io/controller: skip
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - headscale.white.fm
  rules:
    # Public route serves the headscale control plane only (client registration,
    # OIDC, node enrollment). The admin UI is intentionally NOT exposed here —
    # it lives behind the internal route at headscale.internal.white.fm/admin,
    # which requires being on the trusted network or VPN to reach.
    - backendRefs:
        - name: headscale
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale-internal
  namespace: headscale
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - headscale.internal.white.fm
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: headscale-admin
          port: 80
    - backendRefs:
        - name: headscale
          port: 8080
