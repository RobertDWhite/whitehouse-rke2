apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale-public
  namespace: headscale
  annotations:
    external-dns.alpha.kubernetes.io/controller: skip
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-headscale-public
  hostnames:
    - headscale.white.fm
  rules:
    # Admin UI (SPA) — matches /admin and everything under it
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: headscale-admin
          port: 80
    # Everything else → headscale control plane
    - backendRefs:
        - name: headscale
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale-internal
  namespace: headscale
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-headscale-internal
  hostnames:
    - headscale.internal.white.fm
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: headscale-admin
          port: 80
    - backendRefs:
        - name: headscale
          port: 8080
