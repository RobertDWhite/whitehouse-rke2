apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bring-up:
#
# Phase 1 — API-driven OIDC bootstrap (this commit):
#   1. Generate Authentik API token (Directory → Tokens & App passwords)
#   2. cp 23-secret-authentik-token.example.yaml 23-secret-authentik-token.sops.yaml
#      Paste token, then: sops --encrypt --in-place 23-secret-authentik-token.sops.yaml
#   3. Commit + push. ArgoCD applies; the bootstrap Job creates the
#      OAuth2 provider, application, and group in Authentik, fetches
#      the generated client_secret, writes it to the headscale-oidc
#      Secret, and rolls Headscale to pick it up.
#
# Phase 2 — Subnet router:
#   1. After Headscale is healthy:
#        kubectl -n headscale exec deploy/headscale -- \
#          headscale --user <oidc-user-email> preauthkeys create \
#          --reusable --expiration 99y
#   2. cp 22-secret-authkey.example.yaml 22-secret-authkey.sops.yaml
#      Paste key, then: sops --encrypt --in-place 22-secret-authkey.sops.yaml
#   3. Uncomment 11-deploy-tailscale-router and ksops-router below; push.

resources:
  - 00-namespace.yaml
  - 01-configmap-headscale.yaml
  - 02-configmap-derp-map.yaml
  - 10-deploy-headscale.yaml
  - 12-deploy-derp.yaml
  - 13-deploy-admin.yaml
  - 20-service-headscale.yaml
  - 21-service-derp.yaml
  - 22-service-admin.yaml
  - 25-configmap-bootstrap-script.yaml
  - 26-rbac-bootstrap.yaml
  - 27-job-bootstrap-authentik.yaml
  - 30-cert-derp.yaml
  - 40-httproute.yaml
  - 41-backendtrafficpolicy.yaml
  - 11-deploy-tailscale-router.yaml

generators:
  - ksops-oidc.yaml
  - ksops-router.yaml

images:
  - name: headscale/headscale
    newTag: "v0.28.0"
    digest: "sha256:51b1b9182bb6219e97374fa89af6b9320d6f87ecc739e328d5357ea4fa7a5ce3"
  - name: tailscale/tailscale
    newTag: "v1.98.3"
    digest: "sha256:854b77123b9536adae2e97f5a5fdb1790ed03438b911ab7f07780155e0af6ce2"
  - name: alpine/k8s
    newTag: "1.36.1"
    digest: "sha256:692239d739589247c4a791205ed9619c28ae85a21286e19a6211c04a62c56668"
  - name: goodieshq/headscale-admin
    newTag: "0.26.0"
    digest: "sha256:f8471106e993acf80d02b9dbb38fe3c27f17e3b4af62d4fbebb8aa89ab9e5640"
