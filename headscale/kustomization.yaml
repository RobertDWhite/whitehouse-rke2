apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bring-up is two-phased — see deployment steps below.
#
# Phase 1: Authentik OIDC provider exists; 23-secret-oidc.sops.yaml is
#          encrypted with the client secret; ksops-oidc.yaml is enabled.
#          Headscale boots with OIDC login via auth.white.fm.
#
# Phase 2: After Headscale is up, generate a preauth key via
#          `headscale --user homelab preauthkeys create --reusable`,
#          encrypt 22-secret-authkey.sops.yaml with it,
#          then uncomment tailscale-router + ksops-router below.

resources:
  - 00-namespace.yaml
  - 01-configmap-headscale.yaml
  - 10-deploy-headscale.yaml
  - 20-service-headscale.yaml
  # - 11-deploy-tailscale-router.yaml   # uncomment in phase 2

generators:
  - ksops-oidc.yaml
  # - ksops-router.yaml                 # uncomment in phase 2

images:
  - name: headscale/headscale
    newTag: "0.23.0"
  - name: tailscale/tailscale
    newTag: "v1.80.0"
