apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-api-keys
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: hermes-api-keys
    creationPolicy: Owner
    template:
      data:
        # Only ANTHROPIC_TOKEN — populating ANTHROPIC_API_KEY with an OAuth
        # token causes the SDK to send x-api-key (rejected) before hermes'
        # OAuth detector runs.
        ANTHROPIC_TOKEN: "{{ .ANTHROPIC_TOKEN }}"
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_HERMES_TOKEN }}"
  data:
    - secretKey: ANTHROPIC_TOKEN
      remoteRef:
        key: "openclaw-api-keys/ANTHROPIC_TOKEN"
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: "openclaw-api-keys/OPENAI_API_KEY"
    - secretKey: TELEGRAM_HERMES_TOKEN
      remoteRef:
        key: "openclaw-api-keys/TELEGRAM_HERMES_TOKEN"
