apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-api-keys
  namespace: hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: hermes-api-keys
    creationPolicy: Owner
    template:
      data:
        # No ANTHROPIC_TOKEN/ANTHROPIC_API_KEY in env — hermes prefers env over
        # disk and the 1Password setup-token value is dead for direct API.
        # With env unset, hermes falls through to /opt/data/.claude/.credentials.json
        # (mounted via init container from CLAUDE_CREDENTIALS_JSON in SOPS),
        # which has refresh capability.
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY }}"
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_HERMES_TOKEN }}"
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: "openclaw-api-keys/OPENAI_API_KEY"
    - secretKey: TELEGRAM_HERMES_TOKEN
      remoteRef:
        key: "openclaw-api-keys/TELEGRAM_HERMES_TOKEN"
