apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homebridge-internal
  namespace: homebridge
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - homebridge.internal.white.fm
  rules:
    - backendRefs:
        - name: homebridge
          port: 8581
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homebridge-public
  namespace: homebridge
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - homebridge.white.fm
  rules:
    - backendRefs:
        - name: homebridge
          port: 8581
