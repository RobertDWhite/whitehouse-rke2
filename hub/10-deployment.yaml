apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub-ui
  namespace: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub-ui
  template:
    metadata:
      labels:
        app: hub-ui
    spec:
      containers:
        - name: hub-ui
          image: registry.white.fm/hub-ui
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
