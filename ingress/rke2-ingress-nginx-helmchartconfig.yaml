apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: rke2-ingress-nginx
  namespace: kube-system
spec:
  valuesContent: |-
    controller:
      extraArgs:
        report-node-internal-ip-address: "false"
      publishService:
        enabled: true
      service:
        type: ClusterIP
      metrics:
        enabled: true
        service:
          enabled: true
          port: 10254
