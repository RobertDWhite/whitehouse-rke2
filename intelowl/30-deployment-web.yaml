apiVersion: apps/v1
kind: Deployment
metadata:
  name: intelowl-web
  labels:
    app.kubernetes.io/name: intelowl-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: intelowl-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intelowl-web
    spec:
      initContainers:
        - name: wait-postgres
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z intelowl-postgres 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
        - name: wait-redis
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z intelowl-redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
        - name: wait-rabbitmq
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z intelowl-rabbitmq 5672; do
                echo "waiting for rabbitmq..."
                sleep 2
              done
      containers:
        # uwsgi application server
        - name: uwsgi
          image: intelowlproject/intelowl
          command: ["./docker/entrypoints/uwsgi.sh"]
          ports:
            - name: uwsgi
              containerPort: 8001
          envFrom:
            - configMapRef:
                name: intelowl-env
          env:
            - name: DJANGO_SECRET
              valueFrom:
                secretKeyRef:
                  name: intelowl-secrets
                  key: DJANGO_SECRET
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: intelowl-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: intelowl-secrets
                  key: DB_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 60
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: logs
              mountPath: /var/log/intel_owl
            - name: static-content
              mountPath: /opt/deploy/intel_owl/static
            - name: shared-files
              mountPath: /opt/deploy/files_required
        # nginx reverse proxy + static file server
        - name: nginx
          image: intelowlproject/intelowl_nginx
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: nginx-http
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: http.conf
            - name: nginx-locations
              mountPath: /etc/nginx/locations.conf
              subPath: locations.conf
            - name: nginx-websocket
              mountPath: /etc/nginx/websocket.conf
              subPath: websocket.conf
            - name: nginx-errors
              mountPath: /etc/nginx/errors.conf
              subPath: errors.conf
            - name: static-content
              mountPath: /var/www/static
      volumes:
        - name: logs
          emptyDir: {}
        - name: static-content
          emptyDir: {}
        - name: shared-files
          emptyDir:
            sizeLimit: 5Gi
        - name: nginx-http
          configMap:
            name: intelowl-nginx-conf
            items:
              - key: http.conf
                path: http.conf
        - name: nginx-locations
          configMap:
            name: intelowl-nginx-conf
            items:
              - key: locations.conf
                path: locations.conf
        - name: nginx-websocket
          configMap:
            name: intelowl-nginx-conf
            items:
              - key: websocket.conf
                path: websocket.conf
        - name: nginx-errors
          configMap:
            name: intelowl-nginx-conf
            items:
              - key: errors.conf
                path: errors.conf
