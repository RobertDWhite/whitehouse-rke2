apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: intelowl

generators:
  - ksops.yaml

generatorOptions:
  disableNameSuffixHash: true

resources:
  - 00-namespace.yaml
  - 10-configmap-env.yaml
  - 10-configmap-nginx.yaml
  - 10-configmap-uwsgi.yaml
