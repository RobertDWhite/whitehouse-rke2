apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: intelowl

generators:
  - ksops.yaml

generatorOptions:
  disableNameSuffixHash: true

resources:
  - 00-namespace.yaml
  - 10-configmap-env.yaml
  - 10-configmap-nginx.yaml
  - 10-configmap-uwsgi.yaml
  - 20-postgres-statefulset.yaml
  - 21-redis-deployment.yaml
  - 22-rabbitmq-deployment.yaml
  - 30-deployment-web.yaml
  - 31-deployment-daphne.yaml
  - 33-deployment-celery.yaml
  - 40-services.yaml

images:
  - name: intelowlproject/intelowl
    newTag: "v6.6.0"
  - name: intelowlproject/intelowl_nginx
    newTag: "v6.6.0"
  - name: postgres
    newTag: "16-alpine"
  - name: redis
    newTag: "8.6.2-alpine"
  - name: rabbitmq
    newTag: "3.13-alpine"
  - name: busybox
    newTag: "1.37"
