apiVersion: apps/v1
kind: Deployment
metadata:
  name: jetlog-mcp
  namespace: jetlog-mcp
  annotations:
    renovatebot/update-container-image: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jetlog-mcp
  template:
    metadata:
      labels:
        app: jetlog-mcp
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: jetlog-mcp
          image: registry.internal.white.fm/jetlog-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: JETLOG_BASE_URL
              value: "http://jetlog.jetlog.svc.cluster.local:3000"
            - name: TMPDIR
              value: "/tmp"
            - name: JETLOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jetlog-mcp-env
                  key: JETLOG_API_KEY
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: jetlog-mcp-env
                  key: MCP_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
