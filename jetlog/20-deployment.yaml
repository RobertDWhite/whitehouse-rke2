apiVersion: apps/v1
kind: Deployment
metadata:
  name: jetlog
  namespace: jetlog
  annotations:
    renovatebot/update-container-image: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jetlog
  template:
    metadata:
      labels:
        app: jetlog
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # Uncomment initContainers + litestream sidecar after MinIO bucket + SOPS creds are set up
      # initContainers:
      #   - name: litestream-restore
      #     image: litestream/litestream:0.3
      #     args: ['restore', '-if-db-not-exists', '-if-replica-exists', '/data/jetlog.db']
      #     volumeMounts:
      #       - name: jetlog-data
      #         mountPath: /data
      #       - name: litestream-config
      #         mountPath: /etc/litestream.yml
      #         subPath: litestream.yml
      containers:
        - name: jetlog
          image: registry.white.fm/jetlog
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: JETLOG_PORT
              value: "3000"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jetlog-env
                  key: SECRET_KEY
            - name: AUTH_HEADER
              value: "X-Authentik-Username"
          readinessProbe:
            httpGet:
              path: /config
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /config
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: jetlog-data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
        # Uncomment after MinIO setup:
        # - name: litestream
        #   image: litestream/litestream:0.3
        #   args: ['replicate']
        #   volumeMounts:
        #     - name: jetlog-data
        #       mountPath: /data
        #     - name: litestream-config
        #       mountPath: /etc/litestream.yml
        #       subPath: litestream.yml
        #   resources:
        #     requests:
        #       cpu: 10m
        #       memory: 32Mi
        #     limits:
        #       cpu: 100m
        #       memory: 64Mi
      volumes:
        - name: jetlog-data
          persistentVolumeClaim:
            claimName: jetlog-data
        # - name: litestream-config
        #   configMap:
        #     name: litestream-config
        - name: tmp
          emptyDir: {}
