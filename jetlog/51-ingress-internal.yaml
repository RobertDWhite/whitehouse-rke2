apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jetlog-internal
  namespace: jetlog
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - jetlog.internal.white.fm
    secretName: jetlog-internal-white-fm-tls
  rules:
  - host: jetlog.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jetlog
            port:
              number: 3000
