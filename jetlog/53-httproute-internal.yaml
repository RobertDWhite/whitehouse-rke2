apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jetlog-internal
  namespace: jetlog
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - jetlog.internal.white.fm
  rules:
    - backendRefs:
        - name: jetlog
          port: 3000
