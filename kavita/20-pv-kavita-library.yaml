apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-kavita-library
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 10.100.1.20
    path: /volume1/Books/Books/Homeschool/Robinson
