apiVersion: apps/v1
kind: Deployment
metadata:
  name: keeptrack
  namespace: keeptrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keeptrack
  template:
    metadata:
      labels:
        app: keeptrack
    spec:
      containers:
        - name: keeptrack
          image: registry.white.fm/keeptrack
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
