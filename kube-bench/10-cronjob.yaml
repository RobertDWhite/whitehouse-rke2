apiVersion: batch/v1
kind: CronJob
metadata:
  name: kube-bench
  namespace: kube-bench
spec:
  schedule: "17 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: kube-bench
          hostPID: true
          restartPolicy: Never
          containers:
            - name: kube-bench
              image: aquasec/kube-bench
              command:
                - sh
                - -c
                - |
                  set -e
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  out=/results/kube-bench-${ts}.json
                  kube-bench run --benchmark rke2-cis-1.7 --json > "$out"
                  ln -sf "kube-bench-${ts}.json" /results/latest.json
                  # Prune to the most recent 30 result files.
                  ls -1t /results/kube-bench-*.json 2>/dev/null | tail -n +31 | xargs -r rm -f
                  echo "Wrote $out ($(wc -c < "$out") bytes)"
              volumeMounts:
                - name: etc
                  mountPath: /etc
                  readOnly: true
                - name: var
                  mountPath: /var
                  readOnly: true
                - name: rke2
                  mountPath: /var/lib/rancher/rke2
                  readOnly: true
                - name: usr-bin
                  mountPath: /usr/local/mount-from-host/bin
                  readOnly: true
                - name: results
                  mountPath: /results

          volumes:
            - name: etc
              hostPath:
                path: /etc
            - name: var
              hostPath:
                path: /var
            - name: rke2
              hostPath:
                path: /var/lib/rancher/rke2
            - name: usr-bin
              hostPath:
                path: /usr/bin
            - name: results
              persistentVolumeClaim:
                claimName: kube-bench-results
