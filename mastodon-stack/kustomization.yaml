apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mastodon

resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 03-pvc.yaml
  - 04-deployment-web.yaml
  - 05-deployment-streaming.yaml
  - 06-deployment-sidekiq.yaml
  - 07-service-web.yaml
  - 08-service-streaming.yaml
  - 09-postgres.yaml
  - 10-redis.yaml
  - 09b-postgres-exporter.yaml
  - 10b-redis-exporter.yaml

generators:
  - ksops.yaml

images:
  - name: ghcr.io/mastodon/mastodon
    newTag: "v4.5.8"
  - name: ghcr.io/mastodon/mastodon-streaming
    newTag: "v4.5.8"
  - name: postgres
    newTag: "15"
  - name: redis
    newTag: "8"
  - name: quay.io/prometheuscommunity/postgres-exporter
    newTag: "v0.19.1"
  - name: oliver006/redis_exporter
    newTag: "v1.82.0"
