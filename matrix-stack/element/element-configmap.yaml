apiVersion: v1
kind: ConfigMap
metadata:
  name: element-web-config
  namespace: matrix
data:
  config.json: |
    {
      "default_server_config": {
        "m.homeserver": {
          "base_url": "https://matrix.white.fm",
          "server_name": "white.fm"
        }
      },
      "integrations_ui_url": "https://hookshot.white.fm/widgetapi/v1/static/",
      "integrations_rest_url": "https://hookshot.white.fm/widgetapi/v1",
      "integrations_widgets_urls": [
        "https://hookshot.white.fm/widgetapi/v1/static/"
      ]
    }
  default.conf.template: |
    server {
      listen       80;
      server_name  _;
      root   /app;
      index  index.html;

      location / {
        try_files $uri /index.html;
      }
    }
