apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:

  # Element
  - element/element-configmap.yaml
  - element/element-deployment.yaml
  - element/element-service.yaml

  # Namespace
  - ingress/ns.yaml

  # Maubot
  - maubot/maubot-deployment.yaml
#  - maubot/maubot-pvc.yaml
  - maubot/maubot-service.yaml

  # Postgres
#  - postgres/postgres-pvc.yaml
  - postgres/postgres-service.yaml
  - postgres/postgres-statefulset.yaml
  - postgres/postgres-exporter.yaml

  # Projects - Postfix
  - projects/postfix/postfix-service.yaml
  - projects/postfix/postfix.yaml

  # Redis
#  - redis/redis-pvc.yaml
  - redis/redis-service.yaml
  - redis/redis-statefulset.yaml
  - redis/redis-exporter.yaml

  # Synapse
  - synapse/synapse-configmap.yaml
  - synapse/synapse-deployment.yaml
#  - synapse/synapse-pvc.yaml
  - synapse/synapse-service.yaml

  # Hookshot (replaces matrix-encrypted-webhooks)
  - hookshot/hookshot-configmap.yaml
  - hookshot/hookshot-deployment.yaml
  - hookshot/hookshot-pvc.yaml
  - hookshot/hookshot-service.yaml
  
  # Well-known
  - well-known/configmap.yaml
  - well-known/deployment.yaml
  - well-known/service.yaml

generators:
  - ksops-secret.yaml

images:
  # Maubot
  - name: dock.mau.dev/maubot/maubot
    newTag: "v0.6.0"
    digest: "sha256:6968ddea1e08aa7f8ac70ac7a706663fe8d7b4d6f96cd7a6bb8548637fb8cd17"

  # Element Web
  - name: vectorim/element-web
    newTag: "v1.12.18"
    digest: "sha256:c21772a1eabeededa19be591343f548995e458ec34ba8f27425ae923c10af82e"

  # Redis
  - name: redis
    newTag: "8"
    digest: "sha256:4d25e2fe601f7ffaeb4437cb6ced3518bc36edf34ebe98863c80836943d94529"

  # Postgres
  - name: postgres
    newTag: "15"
    digest: "sha256:1b92e7a80c021647bf70f5d3eb66066a998e4f5cf43c07bb9dc9f729782cf88e"

  # Synapse
  - name: matrixdotorg/synapse
    newTag: "v1.153.0"
    digest: "sha256:8ba9310909c4f255f942e504d9e5e5d9a7f20e3fa1cdf5aea8acb704b6a15098"

  # NGINX
  - name: nginx
    newTag: "1.31-alpine"
    digest: "sha256:7e8ff0a32da368869608f285124b4375b901401d88f5027865d8f88984d35d38"

  # Init containers / utilities
  - name: busybox
    newTag: "1.37"
    digest: "sha256:0d3f1e630be52ade0c06107515937607be2cab11a2ad2122099fc79e19bcc18b"
  - name: bitnami/kubectl
    newTag: "latest"
    digest: "sha256:e2b97dde9666986c61c56d49aae85a714b89b69392baa531438e74ec34096fb4"
  - name: halfshot/matrix-hookshot
    newTag: "latest"
    digest: "sha256:8e6c1f9d2a949bb1025f01bf175ab9dde7e6650d39aa8781f3837d40af5b3484"
  - name: juanluisbaptiste/postfix
    newTag: "alpine"
    digest: "sha256:a326ec5ca44790fe9d8aa7c7546bc6e29cdfcce58e229b87e43eac4b17ee1121"
  - name: quay.io/prometheuscommunity/postgres-exporter
    newTag: "v0.19.1"
    digest: "sha256:e96064f876226d94bb6ce48a4c4b3dd76edba91168ec1ab024e5c4b959310b0f"
  - name: oliver006/redis_exporter
    newTag: "v1.84.0"
    digest: "sha256:7ef8e9c26638158fa4e7ad60df8c7e53d1919986753d6c1d2d1876b6ec38d87b"
