apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: matrix-well-known
  namespace: matrix
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-dns"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - white.fm
    - federation.white.fm
    - white.internal.white.fm
    - federation.internal.white.fm
    secretName: white-fm-tls
  rules:
  - host: white.fm
    http:
      paths:
      - path: /.well-known/matrix
        pathType: Prefix
        backend:
          service:
            name: matrix-well-known
            port:
              number: 80
  - host: federation.white.fm
    http:
      paths:
      - path: /.well-known/matrix
        pathType: Prefix
        backend:
          service:
            name: matrix-well-known
            port:
              number: 80
  - host: white.internal.white.fm
    http:
      paths:
      - path: /.well-known/matrix
        pathType: Prefix
        backend:
          service:
            name: matrix-well-known
            port:
              number: 80
  - host: federation.internal.white.fm
    http:
      paths:
      - path: /.well-known/matrix
        pathType: Prefix
        backend:
          service:
            name: matrix-well-known
            port:
              number: 80
