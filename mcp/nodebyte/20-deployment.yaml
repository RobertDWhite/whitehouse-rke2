apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodebyte-mcp
  namespace: nodebyte-mcp
  annotations:
    renovatebot/update-container-image: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodebyte-mcp
  template:
    metadata:
      labels:
        app: nodebyte-mcp
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nodebyte-mcp
          image: ghcr.io/robertdwhite/nodebyte-mcp
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NODEBYTE_BASE_URL
              value: "http://backend.nodebyte.svc.cluster.local:8000"
            - name: TMPDIR
              value: "/tmp"
            - name: MCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nodebyte-mcp-env
                  key: MCP_TOKEN
            - name: NODEBYTE_EMAIL
              valueFrom:
                secretKeyRef:
                  name: nodebyte-mcp-env
                  key: NODEBYTE_EMAIL
            - name: NODEBYTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nodebyte-mcp-env
                  key: NODEBYTE_PASSWORD
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
