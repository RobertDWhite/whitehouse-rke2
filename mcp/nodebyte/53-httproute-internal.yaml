apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nodebyte-mcp-internal
  namespace: nodebyte-mcp
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - nodebyte-mcp.internal.white.fm
  rules:
    - backendRefs:
        - name: nodebyte-mcp
          port: 8080
