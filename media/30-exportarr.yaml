---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr-exporter
  namespace: media
  labels:
    app: exportarr
    app.kubernetes.io/instance: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exportarr
      app.kubernetes.io/instance: radarr
  template:
    metadata:
      labels:
        app: exportarr
        app.kubernetes.io/instance: radarr
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - rke2-node-50
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 300
      containers:
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.3.0
          args: ["radarr"]
          env:
            - name: PORT
              value: "9707"
            - name: URL
              value: http://radarr.media.svc.cluster.local:7878
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  name: exportarr-apikeys
                  key: radarr
          ports:
            - name: metrics
              containerPort: 9707
          livenessProbe:
            httpGet: {path: /healthz, port: 9707}
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet: {path: /healthz, port: 9707}
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: {cpu: 10m, memory: 32Mi}
            limits: {cpu: 100m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-exporter
  namespace: media
  labels:
    app: exportarr
    app.kubernetes.io/instance: radarr
spec:
  selector:
    app: exportarr
    app.kubernetes.io/instance: radarr
  ports:
    - name: metrics
      port: 9707
      targetPort: 9707
