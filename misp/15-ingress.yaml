apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: misp
  namespace: misp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - misp.white.fm
    - misp.internal.white.fm
    secretName: misp-white-fm-tls
  rules:
  - host: misp.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 443
  - host: misp.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx
            port:
              number: 443
