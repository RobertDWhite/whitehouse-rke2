apiVersion: apps/v1
kind: Deployment
metadata:
  name: misp-dashboard
  labels:
    app.kubernetes.io/name: misp-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: misp-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: misp-dashboard
    spec:
      containers:
        - name: misp-dashboard
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          env:
            - name: MISP_INSTANCE_NAME
              value: whitehouse-misp
            - name: MISP_ZMQ_URL
              value: tcp://misp-zmq.misp.svc.cluster.local:50000
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apt-get update && apt-get install -y --no-install-recommends git ca-certificates curl && rm -rf /var/lib/apt/lists/*
              git clone https://github.com/MISP/MISP-Dashboard.git /opt/MISP-Dashboard
              cd /opt/MISP-Dashboard
              git checkout 3c1125083aba83ea1ba049dfed625a2798a8878d
              pip install --no-cache-dir -r requirements.txt
              cp /etc/misp-dashboard/config.cfg /opt/MISP-Dashboard/config/config.cfg
              mkdir -p /opt/MISP-Dashboard/data/GeoLite2-City
              curl -fsSL https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-City.mmdb \
                -o /opt/MISP-Dashboard/data/GeoLite2-City/GeoLite2-City.mmdb
              mkdir -p /opt/MISP-Dashboard/logs
              python /opt/MISP-Dashboard/zmq_subscriber.py -n "${MISP_INSTANCE_NAME}" -u "${MISP_ZMQ_URL}" &
              python /opt/MISP-Dashboard/zmq_dispatcher.py &
              exec python /opt/MISP-Dashboard/server.py
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 360
            periodSeconds: 15
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/misp-dashboard/config.cfg
              subPath: config.cfg
      volumes:
        - name: config
          configMap:
            name: misp-dashboard-config
---
apiVersion: v1
kind: Service
metadata:
  name: misp-dashboard
  labels:
    app.kubernetes.io/name: misp-dashboard
spec:
  selector:
    app.kubernetes.io/name: misp-dashboard
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: misp-zmq
  labels:
    app.kubernetes.io/name: misp-zmq
spec:
  selector:
    app.kubernetes.io/name: misp
  ports:
    - name: zmq
      port: 50000
      targetPort: 50000
      protocol: TCP
