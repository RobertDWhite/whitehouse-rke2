apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: monica
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-14
      containers:
        - name: mysql
          image: mariadb
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_DATABASE
              value: monica
            - name: MARIADB_USER
              value: monica
            - name: MARIADB_PASSWORD_FILE
              value: /run/secrets/mariadb/password
            - name: MARIADB_ROOT_PASSWORD_FILE
              value: /run/secrets/mariadb/password
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: mariadb-password
              mountPath: /run/secrets/mariadb
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: monica-mysql-data
        - name: mariadb-password
          secret:
            secretName: monica-secrets
            defaultMode: 0400
            items:
              - key: db-password
                path: password
