apiVersion: apps/v1
kind: Deployment
metadata:
  name: myspeed
  namespace: myspeed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myspeed
  template:
    metadata:
      labels:
        app: myspeed
    spec:
      containers:
        - name: myspeed
          image: germannewsmaker/myspeed
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5216
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 5216
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 5216
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: myspeed-data
              mountPath: /myspeed/data
      volumes:
        - name: myspeed-data
          persistentVolumeClaim:
            claimName: myspeed-data