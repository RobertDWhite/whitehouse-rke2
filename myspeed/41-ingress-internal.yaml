apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myspeed-internal
  namespace: myspeed
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - speed.internal.white.fm
    secretName: speed-internal-white-fm-tls
  rules:
  - host: speed.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: myspeed
            port:
              number: 5216
