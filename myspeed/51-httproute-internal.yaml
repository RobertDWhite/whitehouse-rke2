apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: myspeed-internal
  namespace: myspeed
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-internal-white-fm
  hostnames:
    - speed.internal.white.fm
  rules:
    - backendRefs:
        - name: myspeed
          port: 5216
