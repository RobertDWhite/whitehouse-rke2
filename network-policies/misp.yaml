# =============================================================
# misp namespace — Threat intel: MISP core, MySQL, Redis, ZMQ, Raven bridge
# =============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: misp
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-egress
  namespace: misp
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - {}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: misp
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from: [{podSelector: {}}]

---
# ingress-nginx → MISP nginx frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-nginx
  namespace: misp
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: misp-nginx
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: authentik

---
# Raven namespace → raven-bridge (WebSocket proxy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-raven-to-bridge
  namespace: misp
spec:
  podSelector:
    matchLabels:
      app: raven-bridge
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: raven
      ports:
        - {protocol: TCP, port: 5678}

---
# CrowdSec → raven-bridge (threat intel webhook)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-crowdsec-to-bridge
  namespace: misp
spec:
  podSelector:
    matchLabels:
      app: raven-bridge
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: crowdsec
      ports:
        - {protocol: TCP, port: 5678}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-uptime-kuma
  namespace: misp
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: uptime-kuma
