# =============================================================
# Simple web apps — standard pattern per namespace:
#   default-deny + allow-all-egress + ingress from kube-system + uptime-kuma
# Ingress is locked down. Egress is open — these are simple leaf apps
# with no sensitive data to exfiltrate, and restricting egress ports
# just breaks things silently (DNS, k8s API, external APIs, etc.)
# =============================================================

# ======================== HOMEPAGE ========================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: default-deny, namespace: homepage}
spec: {podSelector: {}, policyTypes: [Ingress, Egress]}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-all-egress, namespace: homepage}
spec: {podSelector: {}, policyTypes: [Egress], egress: [{}]}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-ingress, namespace: homepage}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: authentik}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: uptime-kuma}}
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: observability}}

---
