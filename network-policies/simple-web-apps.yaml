kind: NetworkPolicy
metadata: {name: allow-egress-k8s-api, namespace: homarr}
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{namespaceSelector: {}}]
      ports:
        - {protocol: TCP, port: 443}
        - {protocol: TCP, port: 6443}

---
