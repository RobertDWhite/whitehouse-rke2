apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nitter-accounts
  namespace: nitter
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: nitter-accounts
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        # Nitter sessions.jsonl — auth_token and ct0 from a logged-in x.com browser session
        sessions.jsonl: '{"token": "{{ .auth_token }}", "csrf": "{{ .csrf }}"}'
  data:
    - secretKey: auth_token
      remoteRef:
        key: ndmuqjhmmcj3kzsln27kxuzzhi/auth_token
    - secretKey: csrf
      remoteRef:
        key: ndmuqjhmmcj3kzsln27kxuzzhi/ct0
