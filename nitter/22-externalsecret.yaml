apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nitter-accounts
  namespace: nitter
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: nitter-accounts
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        # Rendered into the format Nitter's guestAccountFile expects
        guest_accounts.jsonl: '{"username": "{{ .username }}", "password": "{{ .password }}", "totp": "{{ .totp }}"}'
  data:
    - secretKey: username
      remoteRef:
        key: ndmuqjhmmcj3kzsln27kxuzzhi/username
    - secretKey: password
      remoteRef:
        key: ndmuqjhmmcj3kzsln27kxuzzhi/password
    - secretKey: totp
      remoteRef:
        key: "ndmuqjhmmcj3kzsln27kxuzzhi/one-time password"
