apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-inotify-sysctl
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: node-inotify-sysctl
  template:
    metadata:
      labels:
        app: node-inotify-sysctl
    spec:
      tolerations:
        - operator: Exists
      hostPID: true
      initContainers:
        - name: set-inotify
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            - sh
            - -c
            - |
              sysctl -w fs.inotify.max_user_watches=524288
              sysctl -w fs.inotify.max_user_instances=512
          securityContext:
            privileged: true
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10@sha256:ee6521f290b2168b6e0935a181d4cff9be1ac3f505666ef0e3c98fae8199917a
          resources:
            requests:
              cpu: 1m
              memory: 1Mi
