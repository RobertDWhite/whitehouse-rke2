# Delay policy: only shut down if the UPS stays on battery longer than a brief outage.
CMDSCRIPT /etc/nut/upssched-cmd
PIPEFN /run/nut/upssched.pipe
LOCKFN /run/nut/upssched.lock

# On battery for 180s (3 min) continuously -> trigger cluster-wide forced shutdown.
AT ONBATT * START-TIMER onbatt-shutdown 180
# Power restored before the timer fires -> cancel; nothing shuts down.
AT ONLINE * CANCEL-TIMER onbatt-shutdown
