apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: all
      # Group by alertname + namespace + pod so flapping pods only contribute
      # one "active" group at a time. group_interval was 5m which meant a
      # flapping pod could trigger a notification every 5 minutes. 30m gives
      # the system time to settle and batches multiple flap cycles into one
      # notification — major spam reduction.
      group_by: [alertname, namespace, pod]
      group_wait: 1m
      group_interval: 30m
      # Re-notify on still-firing alerts after 12h (was 4h). For things you
      # already know about (e.g. a known-broken pod), this prevents the same
      # alert from re-paging every 4 hours.
      repeat_interval: 12h
      routes:
        - receiver: all
          matchers:
            - severity=~"critical|warning"

    receivers:
      - name: all
        webhook_configs:
          # send_resolved: false on BOTH receivers — flapping alerts double
          # the notification volume because every firing→resolved transition
          # generates a "✅ Resolved" message. The user can check the
          # alertmanager UI or grafana to see what's currently firing; the
          # important signal is "this STARTED firing", not "it just stopped".
          - url: "https://webhooks.white.fm/webhook/e8afc74e-26e5-4679-ab56-103d86aa6b6f"
            send_resolved: false
            http_config:
              tls_config:
                insecure_skip_verify: false
          # alertmanager-ntfy bridge sidecar (see 13a-deploy-alertmanager.yaml).
          # Translates the AlertManager webhook payload into a properly
          # formatted ntfy notification (title, priority, tags, click URL).
          - url: "http://127.0.0.1:8000/hook"
            send_resolved: false

    inhibit_rules:
      # Critical of an alertname suppresses warning of the same alertname
      # in the same namespace.
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: [alertname, namespace]
      # If alertmanager itself is crash-looping, suppress its own
      # PodCrashLooping alert about itself — we obviously can't deliver it
      # via the broken pod, and once alertmanager recovers the alert
      # disappears anyway. Prevents the absurd "alertmanager is broken,
      # alerting you about it via the broken alertmanager" loop we just
      # had for 11 hours.
      - source_matchers:
          - alertname="PodCrashLooping"
          - namespace="observability"
        target_matchers:
          - alertname="PodCrashLooping"
          - namespace="observability"
        equal: [pod]

    templates: []
