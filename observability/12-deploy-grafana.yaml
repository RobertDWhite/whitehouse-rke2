apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      nodeSelector:
        observability: "true"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - rke2-node-14
      containers:
        - name: grafana
          image: grafana/grafana
          envFrom:
            - secretRef:
                name: grafana-admin
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.white.fm"
            - name: GF_MISP_INFLUX_TOKEN
              valueFrom:
                secretKeyRef:
                  name: influxdb-unpoller
                  key: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
            - name: GF_MISP_INFLUX_ORG
              valueFrom:
                secretKeyRef:
                  name: influxdb-unpoller
                  key: DOCKER_INFLUXDB_INIT_ORG

            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Authentik"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"

            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid profile email offline_access"
            - name: GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN
              value: "true"

            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "https://auth.white.fm/application/o/authorize/"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "https://auth.white.fm/application/o/token/"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "https://auth.white.fm/application/o/userinfo/"

            - name: GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH
              value: "preferred_username || username || email"

            - name: GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH
              value: "email"

            - name: GF_AUTH_TOKEN_ROTATION_INTERVAL_MINUTES
              value: "720"
            - name: GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
              value: "false"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_RENDERING_SERVER_URL
              value: "http://localhost:8081/render"
            - name: GF_RENDERING_CALLBACK_URL
              value: "http://localhost:3000/"
            - name: GF_LOG_FILTERS
              value: "rendering:debug"
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboardproviders.yaml
              subPath: dashboardproviders.yaml
              readOnly: true
            - name: datasources-provider
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
        - name: grafana-image-renderer
          image: grafana/grafana-image-renderer:latest
          ports:
            - containerPort: 8081
          env:
            - name: ENABLE_METRICS
              value: "true"
            - name: HTTP_PORT
              value: "8081"
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: dashboards-provider
          configMap:
            name: grafana-dashboard-provider
        - name: datasources-provider
          configMap:
            name: grafana-datasources
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: observability-grafana-dashboards
              - configMap:
                  name: observability-grafana-dashboards-imported
              - configMap:
                  name: observability-grafana-dashboards-unifi-dpi
              - secret:
                  name: observability-grafana-dashboards-private
