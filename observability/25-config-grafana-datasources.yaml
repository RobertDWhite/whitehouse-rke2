apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: prometheus
        uid: ffbp5qeorery8b
        type: prometheus
        access: proxy
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: true
      - name: loki
        uid: ffbp5mct1w0lcb
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: false
      - name: influxdb2
        uid: 7utNPds7z
        type: influxdb
        access: proxy
        url: http://influxdb.observability.svc.cluster.local:8086
        isDefault: false
        jsonData:
          version: Flux
          organization: ${GF_MISP_INFLUX_ORG}
          defaultBucket: misp
        secureJsonData:
          token: ${GF_MISP_INFLUX_TOKEN}
      - name: influxdb-homeassistant
        uid: ha-influx-1
        type: influxdb
        access: proxy
        url: http://influxdb.observability.svc.cluster.local:8086
        isDefault: false
        jsonData:
          version: Flux
          organization: ${GF_MISP_INFLUX_ORG}
          defaultBucket: homeassistant
        secureJsonData:
          token: ${GF_MISP_INFLUX_TOKEN}
