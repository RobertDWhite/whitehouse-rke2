apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: appstore-connect-api
  namespace: observability
spec:
  refreshInterval: 24h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-shared
  target:
    name: appstore-connect-api
    creationPolicy: Owner
    template:
      data:
        issuer_id: "{{ .username }}"
        private_key: "{{ .password }}"
        vendor_number: "{{ .vendor_id }}"
        app_ids: "{{ .id_graflens }},{{ .id_solacoffea }}"
        key_id: "{{ .api_key_id }}"
  dataFrom:
    - extract:
        key: se4nzrvhn55ckbqxgqeaju6f44
