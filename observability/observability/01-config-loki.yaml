apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability
data:
  config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    limits_config:
      allow_structured_metadata: true
      # Default 500 is too low for high-cardinality parsed-label aggregations
      # like "topk by (domain)" over the Technitium query stream — *.white.fm
      # alone runs ~1k–3k distinct domains per hour.
      max_query_series: 10000
      otlp_config:
        resource_attributes:
          attributes_config:
            - action: index_label
              attributes:
                - service.name

    common:
      path_prefix: /loki
      replication_factor: 1
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules

    schema_config:
      configs:
        - from: 2023-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
        - from: 2026-03-08
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
      filesystem:
        directory: /loki/chunks

    compactor:
      working_directory: /loki/compactor

    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
        final_sleep: 0s

    # Loki built-in ruler: evaluates LogQL alert rules and ships them to
    # the same alertmanager Prometheus uses, so audit-log alerts flow
    # through the existing alertmanager-ntfy bridge.
    ruler:
      storage:
        type: local
        local:
          directory: /etc/loki/rules
      rule_path: /loki/rules-tmp
      alertmanager_url: http://alertmanager.observability.svc.cluster.local:9093
      enable_alertmanager_v2: true
      ring:
        kvstore:
          store: inmemory
      enable_api: true

    analytics:
      reporting_enabled: false