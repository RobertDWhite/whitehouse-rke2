# =============================================================
# Grafana REST API — direct path for token clients, bypassing Authentik
# =============================================================
# grafana.white.fm and grafana.internal.white.fm are fronted by the Authentik
# proxy-provider (embedded outpost): the catch-all HTTPRoutes `grafana-public`
# / `grafana-internal` (ns authentik) send every path to authentik-server,
# which forward-auths the browser via SSO and injects X-authentik-* headers
# that Grafana's auth.proxy consumes (GF_AUTH_PROXY_ENABLED — see
# 12-deploy-grafana.yaml).
#
# That breaks non-browser API clients (e.g. the GrafLens iOS app) that
# authenticate with a service-account token (Authorization: Bearer glsa_…):
# the outpost has no Authentik session for them and redirects to its SSO start
# page, so the token never reaches Grafana.
#
# These routes match the `/api` prefix AND the presence of a Bearer
# Authorization header, sending only those requests straight to the grafana
# Service. Gateway API precedence (more match criteria + longer prefix) means a
# token-bearing /api request takes this direct path, while EVERYTHING else —
# including the web UI's own cookie/session /api calls, which carry no
# Authorization header — still flows through the outpost. So the browser UI
# stays fully SSO-gated and unbroken; only token clients bypass it. Grafana
# still enforces auth on /api (401 on an invalid/expired token).
#
# SECURITY — header stripping is mandatory: Grafana trusts X-authentik-*
# proxy headers from any source in the pod CIDR 10.42.0.0/16
# (GF_AUTH_PROXY_WHITELIST), and the Envoy gateway pods live in that range.
# Without removing them, a client could send a junk Bearer token to hit this
# route and spoof `X-authentik-username: admin`. The RequestHeaderModifier
# filter drops every header Grafana's auth.proxy consumes, so on this route
# only the Bearer token itself can authenticate.
# =============================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-api-public
  namespace: observability
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-grafana-public
  hostnames:
    - grafana.white.fm
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
          headers:
            - type: RegularExpression
              name: Authorization
              value: "^Bearer .+"
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-authentik-username
              - X-authentik-email
              - X-authentik-name
              - X-authentik-groups
      backendRefs:
        - name: grafana
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-api-internal
  namespace: observability
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-grafana-internal
  hostnames:
    - grafana.internal.white.fm
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
          headers:
            - type: RegularExpression
              name: Authorization
              value: "^Bearer .+"
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - X-authentik-username
              - X-authentik-email
              - X-authentik-name
              - X-authentik-groups
      backendRefs:
        - name: grafana
          port: 3000
