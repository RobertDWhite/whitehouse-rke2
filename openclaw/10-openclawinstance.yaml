apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  image:
    repository: registry.white.fm/openclaw-claude
    tag: "2026.4.23-claude.1"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  env:
    - name: OLLAMA_API_KEY
      value: "ollama-local"
  config:
    raw:
      gateway:
        controlUi:
          allowedOrigins:
            - "https://openclaw.white.fm"
            - "https://openclaw.internal.white.fm"
      agents:
        defaults:
          model:
            primary: "ollama/qwen3.5:latest"
            fallbacks:
              - "anthropic/claude-sonnet-4-6"
              - "openai/gpt-4.1-mini"
          models:
            "ollama/qwen3.5:latest":
              alias: "local"
            "anthropic/claude-sonnet-4-6":
              alias: "claude"
            "anthropic/claude-opus-4-6":
              alias: "claude-opus"
            "claude-cli/claude-sonnet-4-6":
              alias: "claude-code"
            "claude-cli/claude-opus-4-6":
              alias: "claude-code-opus"
            "openai/gpt-4.1-mini":
              alias: "gpt-mini"
            "openai/gpt-5.4":
              alias: "gpt"
            # ChatGPT/Codex OAuth is a separate auth flow from OPENAI_API_KEY.
            "openai-codex/gpt-5.5":
              alias: "chatgpt"
              params:
                transport: "auto"
      channels:
        telegram:
          enabled: true
          groupPolicy: "open"
      models:
        providers:
          anthropic:
            baseUrl: "https://api.anthropic.com/v1"
            apiKey: "$ANTHROPIC_API_KEY"
            models:
              - name: "Claude Sonnet 4.6"
                id: "claude-sonnet-4-6"
              - name: "Claude Opus 4.6"
                id: "claude-opus-4-6"
          openai:
            baseUrl: "https://api.openai.com/v1"
            apiKey: "$OPENAI_API_KEY"
            models:
              - name: "gpt-4.1-mini"
                id: "gpt-4.1-mini"
              - name: "gpt-5.4"
                id: "gpt-5.4"
          # This surfaces the ChatGPT/Codex route in OpenClaw, but it still
          # needs a post-deploy OAuth/device login inside the running instance.
          openai-codex:
            baseUrl: "https://api.openai.com/v1"
            models:
              - name: "ChatGPT / Codex GPT-5.5"
                id: "gpt-5.5"
                contextTokens: 160000
          ollama:
            baseUrl: "http://ollama.ai-stack.svc.cluster.local:11434"
            models:
              - name: "qwen3.5:latest"
                id: "qwen3.5:latest"
                api: "ollama"
  availability:
    nodeSelector:
      kubernetes.io/arch: amd64
  storage:
    persistence:
      enabled: true
      size: 10Gi
  security:
    networkPolicy:
      additionalEgress:
        - to:
            - ipBlock:
                cidr: 10.42.0.0/16
          ports:
            - protocol: TCP
              port: 11434
