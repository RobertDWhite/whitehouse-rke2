apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  env:
    - name: OLLAMA_API_KEY
      value: "ollama-local"
  config:
    raw:
      gateway:
        controlUi:
          allowedOrigins:
            - "https://openclaw.white.fm"
            - "https://openclaw.internal.white.fm"
      agents:
        defaults:
          model:
            primary: "ollama/qwen3.5:latest"
      channels:
        telegram:
          enabled: true
          groupPolicy: "open"
      models:
        providers:
          openai:
            baseUrl: "https://api.openai.com/v1"
            apiKey: "$OPENAI_API_KEY"
            models:
              - name: "gpt-4.1-mini"
                id: "gpt-4.1-mini"
          ollama:
            baseUrl: "http://ollama.ai-stack.svc.cluster.local:11434"
            models:
              - name: "qwen3.5:latest"
                id: "qwen3.5:latest"
                api: "ollama"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  security:
    networkPolicy:
      additionalEgress:
        - to:
            - ipBlock:
                cidr: 10.42.0.0/16
          ports:
            - protocol: TCP
              port: 11434
