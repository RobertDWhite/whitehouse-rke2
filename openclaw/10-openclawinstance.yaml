apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  image:
    repository: registry.white.fm/openclaw-claude
    tag: "2026.4.23-claude.2"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
    - secretRef:
        name: openclaw-matrix-secrets
  env:
    - name: OLLAMA_API_KEY
      value: "ollama-local"
    - name: KUBECONFIG
      value: "/home/openclaw/.openclaw/kube-config.yaml"
    - name: CLAUDE_CONFIG_DIR
      value: "/home/openclaw/.openclaw/.claude"
    # Empty out the unusable OpenAI API key so the memory subsystem
    # doesn't try (and fail) to call OpenAI embeddings on every message.
    - name: OPENAI_API_KEY
      value: ""
  config:
    raw:
      gateway:
        trustedProxies:
          - "127.0.0.0/8"
          - "10.42.0.0/16"
        controlUi:
          allowedOrigins:
            - "https://openclaw.white.fm"
            - "https://openclaw.internal.white.fm"
      agents:
        defaults:
          model:
            # qwen3:30b is a 30B MoE thinking model — strong reasoning,
            # 3B active params at a time so inference stays fast on the 5090.
            primary: "claude-cli/claude-sonnet-4-6"
            fallbacks:
              - "ollama/qwen3:30b"
          models:
            "ollama/qwen3:30b":
              alias: "local"
            "anthropic/claude-sonnet-4-6":
              alias: "claude"
            "anthropic/claude-opus-4-6":
              alias: "claude-opus"
            "claude-cli/claude-sonnet-4-6":
              alias: "claude-code"
            "claude-cli/claude-opus-4-6":
              alias: "claude-code-opus"
            # ChatGPT/Codex OAuth is the only OpenAI route; the API-key path
            # was removed because the account is over quota.
            "openai-codex/gpt-5.5":
              alias: "chatgpt"
              params:
                transport: "auto"
      channels:
        telegram:
          enabled: true
          groupPolicy: "open"
        matrix:
          enabled: true
          homeserver: "https://matrix.white.fm"
          userId: "@jarvis:white.fm"
          encryption: true
          autoJoin: "allowlist"
          autoJoinAllowlist:
            - "!EoEWzxuqJYcAtVUQsh:white.fm"
          groupPolicy: "allowlist"
          groups:
            "!EoEWzxuqJYcAtVUQsh:white.fm":
              requireMention: true
          replyToMode: "first"
          historyLimit: 50
          threadReplies: "off"
          dm:
            policy: "disabled"
      models:
        providers:
          anthropic:
            baseUrl: "https://api.anthropic.com/v1"
            apiKey: "$ANTHROPIC_API_KEY"
            models:
              - name: "Claude Sonnet 4.6"
                id: "claude-sonnet-4-6"
              - name: "Claude Opus 4.6"
                id: "claude-opus-4-6"
          # This surfaces the ChatGPT/Codex route in OpenClaw, but it still
          # needs a post-deploy OAuth/device login inside the running instance.
          openai-codex:
            baseUrl: "https://api.openai.com/v1"
            models:
              - name: "ChatGPT / Codex GPT-5.5"
                id: "gpt-5.5"
                contextTokens: 160000
          ollama:
            baseUrl: "http://ollama-router.ai-stack.svc.cluster.local:11434"
            models:
              - name: "qwen3:30b"
                id: "qwen3:30b"
                api: "ollama"
  probes:
    startup:
      failureThreshold: 120
      periodSeconds: 5
    liveness:
      initialDelaySeconds: 300
      failureThreshold: 6
      periodSeconds: 30
      timeoutSeconds: 10
  availability:
    nodeSelector:
      kubernetes.io/arch: amd64
  storage:
    persistence:
      enabled: true
      size: 10Gi
  security:
    podSecurityContext:
      fsGroupChangePolicy: OnRootMismatch
    networkPolicy:
      additionalEgress:
        - to:
            - ipBlock:
                cidr: 10.42.0.0/16
          ports:
            - protocol: TCP
              port: 11434
        - to:
            - ipBlock:
                cidr: 10.43.0.1/32
          ports:
            - protocol: TCP
              port: 443
