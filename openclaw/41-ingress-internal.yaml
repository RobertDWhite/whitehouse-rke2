apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-internal
  namespace: openclaw
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - openclaw.internal.white.fm
    secretName: openclaw-internal-white-fm-tls
  rules:
  - host: openclaw.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openclaw
            port:
              number: 18789
