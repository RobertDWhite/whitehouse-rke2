apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhamclock
  namespace: openhamclock
  labels:
    app: openhamclock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openhamclock
  template:
    metadata:
      labels:
        app: openhamclock
    spec:
      containers:
        - name: openhamclock
          image: ggilman/openhamclock
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          env:
            - name: TZ
              value: "UTC"
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: openhamclock-config
