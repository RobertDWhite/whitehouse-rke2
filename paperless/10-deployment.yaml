apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: paperless
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paperless
  template:
    metadata:
      labels:
        app: paperless
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: paperless-secrets
            - secretRef:
                name: paperless-db
            - secretRef:
                name: paperless-oidc

          env:
            - name: PAPERLESS_CONSUMER_POLLING
              value: "1"

            - name: PAPERLESS_CONSUMER_RECURSIVE
              value: "1"
            - name: PAPERLESS_REDIS
              value: redis://redis.paperless.svc.cluster.local:6379
            - name: PAPERLESS_DBHOST
              value: postgres.paperless.svc.cluster.local
            - name: PAPERLESS_DBNAME
              value: paperless
            - name: PAPERLESS_URL
              value: https://paperless.white.fm
            - name: PAPERLESS_TIME_ZONE
              value: UTC
            - name: PAPERLESS_OCR_LANGUAGE
              value: eng
            - name: PAPERLESS_DBUSER
              valueFrom:
                secretKeyRef:
                  name: paperless-db
                  key: username

            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: paperless-db
                  key: password
          volumeMounts:
            - name: data
              mountPath: /usr/src/paperless/data
            - name: media
              mountPath: /usr/src/paperless/media
            - name: consume
              mountPath: /usr/src/paperless/consume
              readOnly: true

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: consume
          persistentVolumeClaim:
            claimName: paperless-consume