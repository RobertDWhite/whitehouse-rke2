# Two DaemonSets install + configure host NUT (Network UPS Tools) via nsenter.
# NUT itself runs on host systemd; these pods only reconcile config/state so the
# UPS graceful-shutdown path stays independent of cluster health.
#
#   nut-installer-server  -> rke2-node-12 only (the node with the UPS on USB)
#   nut-installer-client  -> every other node (upsmon secondary)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nut-installer-server
  namespace: nut
  labels:
    app.kubernetes.io/name: nut
    app.kubernetes.io/component: server
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nut
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nut
        app.kubernetes.io/component: server
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: [rke2-node-12]
      containers:
        - name: reconcile
          image: busybox:1.36
          command: [sh, /nut-config/reconcile.sh]
          env:
            - name: ROLE
              value: server
            - name: ADMIN_PW
              valueFrom: { secretKeyRef: { name: nut-secrets, key: ADMIN_PW } }
            - name: UPSMON_REMOTE_PW
              valueFrom: { secretKeyRef: { name: nut-secrets, key: UPSMON_REMOTE_PW } }
            - name: MONUSER_PW
              valueFrom: { secretKeyRef: { name: nut-secrets, key: MONUSER_PW } }
          securityContext:
            privileged: true
          volumeMounts:
            - name: nut-config
              mountPath: /nut-config
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: nut-config
          configMap:
            name: nut-config
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nut-installer-client
  namespace: nut
  labels:
    app.kubernetes.io/name: nut
    app.kubernetes.io/component: client
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nut
      app.kubernetes.io/component: client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nut
        app.kubernetes.io/component: client
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: [rke2-node-12]
      containers:
        - name: reconcile
          image: busybox:1.36
          command: [sh, /nut-config/reconcile.sh]
          env:
            - name: ROLE
              value: client
            - name: UPSMON_REMOTE_PW
              valueFrom: { secretKeyRef: { name: nut-secrets, key: UPSMON_REMOTE_PW } }
          securityContext:
            privileged: true
          volumeMounts:
            - name: nut-config
              mountPath: /nut-config
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
      volumes:
        - name: nut-config
          configMap:
            name: nut-config
