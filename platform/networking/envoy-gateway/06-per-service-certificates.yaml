# Per-service Certificates for sensitive workloads.
# Memory rule: new services get their own Certificate (envoy-gateway-system,
# both .white.fm + .internal.white.fm SANs). Wildcards remain as fallback
# while we migrate routes off them.
#
# All certs use the same letsencrypt-dns ClusterIssuer as the wildcards
# (Cloudflare DNS-01). Provisioning takes a few minutes per cert after
# ArgoCD syncs.

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: envoy-gateway-system
spec:
  secretName: argocd-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns
  dnsNames:
    - argo.white.fm
    - argo.internal.white.fm

