# congresstrades.white.fm — public, no-SSO read-only host (public-only; the SSO/full app is
# congress.white.fm + congress.internal.white.fm). Own cert so it no longer rides the wildcard.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: congresstrades-tls
  namespace: envoy-gateway-system
spec:
  secretName: congresstrades-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns
  dnsNames:
    - congresstrades.white.fm

---
# appstore.internal.white.fm — internal-only App Store review responder (Authentik SSO).
# Both SANs per the per-service-cert convention even though only the internal listener exists.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: appstore-tls
  namespace: envoy-gateway-system
spec:
  secretName: appstore-tls
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns
  dnsNames:
    - appstore.white.fm
    - appstore.internal.white.fm
