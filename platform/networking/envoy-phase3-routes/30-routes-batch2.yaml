apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: synology-tls
  namespace: external-services
spec:
  endpoints:
    - fqdn:
        hostname: syn.external-services.svc.cluster.local
        port: 5001
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: misp-nginx-tls
  namespace: misp
spec:
  endpoints:
    - fqdn:
        hostname: nginx.misp.svc.cluster.local
        port: 443
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-batch2-public-a
  namespace: authentik
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - openclaw.white.fm
    - rstudio.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-batch2-public-b
  namespace: authentik
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - znc.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
---
# plex-public HTTPRoute REMOVED — plex.white.fm is now a DNS-only A record
# managed by UniFi DDNS (Cloudflare API), resolving to WAN IP.
# External access: WAN:32400 → port forward → Synology 10.100.1.20:32400.
# TLS on the direct path is handled by Plex's own *.plex.direct certificate.
# Internal access remains via plex-internal route (plex.internal.white.fm)
# in 50-routes-batch3-internal.yaml.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: federation-public
  namespace: matrix
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - federation.white.fm
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/matrix
      backendRefs:
        - name: matrix-well-known
          port: 80
---
