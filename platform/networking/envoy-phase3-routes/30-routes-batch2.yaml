apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: synology-tls
  namespace: external-services
spec:
  endpoints:
    - fqdn:
        hostname: syn.external-services.svc.cluster.local
        port: 5001
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: misp-nginx-tls
  namespace: misp
spec:
  endpoints:
    - fqdn:
        hostname: nginx.misp.svc.cluster.local
        port: 443
  tls:
    insecureSkipVerify: true
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-batch2-public-a
  namespace: authentik
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - openclaw.white.fm
    - rstudio.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-batch2-public-b
  namespace: authentik
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - znc.white.fm
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
---
# plex.white.fm — public access via Envoy TLS termination.
# DNS-only A record (UniFi DDNS via Cloudflare API) -> WAN IP; grey-cloud, not proxied.
# External path: WAN:443 -> port forward -> Envoy 10.99.5.110 (terminates TLS with the
# *.white.fm wildcard cert) -> Synology Plex 10.100.1.20:32400.
# Internal access also via plex-internal route (plex.internal.white.fm)
# in 50-routes-batch3-internal.yaml.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: plex-public
  namespace: external-services
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - plex.white.fm
  rules:
    - backendRefs:
        - name: plex
          port: 32400
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: federation-public
  namespace: matrix
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: https-white-fm
  hostnames:
    - federation.white.fm
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /.well-known/matrix
      backendRefs:
        - name: matrix-well-known
          port: 80
---
