# EndpointSlice for the headless minio-s3 Service in this namespace.
# Replaces the legacy Endpoints resource (deprecated in k8s 1.33+ and
# globally excluded by ArgoCD). The IP is the on-prem MinIO host.
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: minio-s3
  namespace: external-services
  labels:
    kubernetes.io/service-name: minio-s3
addressType: IPv4
ports:
  - name: http
    port: 9000
    protocol: TCP
endpoints:
  - addresses:
      - 10.100.1.20
    conditions:
      ready: true
