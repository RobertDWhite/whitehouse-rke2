apiVersion: v1
kind: Secret
metadata:
  name: tailscale-router-authkey
  namespace: headscale
type: Opaque
stringData:
  # Generate after Headscale boots:
  #   kubectl -n headscale exec deploy/headscale -- headscale users create homelab
  #   kubectl -n headscale exec deploy/headscale -- \
  #     headscale --user homelab preauthkeys create --reusable --expiration 99y
  # Then put the resulting key here and encrypt with:
  #   sops --encrypt --in-place 22-secret-authkey.sops.yaml
  authkey: "REPLACE_WITH_HEADSCALE_PREAUTH_KEY"
