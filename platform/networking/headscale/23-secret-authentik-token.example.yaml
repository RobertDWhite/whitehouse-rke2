apiVersion: v1
kind: Secret
metadata:
  name: authentik-bootstrap-token
  namespace: headscale
type: Opaque
stringData:
  # Authentik API token with admin scope (or at least permission to
  # create OAuth2 providers, applications, and groups).
  #
  # Generate in Authentik:
  #   Directory → Tokens & App passwords → Create → Intent: API Token
  #   User: akadmin (or a service account)
  #   Description: headscale-bootstrap
  #   Copy the resulting key here, then encrypt:
  #     cp 23-secret-authentik-token.example.yaml 23-secret-authentik-token.sops.yaml
  #     sops --encrypt --in-place 23-secret-authentik-token.sops.yaml
  token: "REPLACE_WITH_AUTHENTIK_API_TOKEN"
