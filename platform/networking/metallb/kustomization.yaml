apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: metallb-system

resources:
  - ipaddresspool.yaml
  - ipaddresspool-dns.yaml
  - l2advertisement.yaml

helmCharts:
  - name: metallb
    repo: https://metallb.github.io/metallb
    version: 0.16.1
    releaseName: metallb
    namespace: metallb-system
    valuesFile: values.yaml