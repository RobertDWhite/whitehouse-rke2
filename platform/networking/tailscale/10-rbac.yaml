apiVersion: v1
kind: ServiceAccount
metadata:
  name: subnet-router
  namespace: tailscale
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: subnet-router
  namespace: tailscale
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["subnet-router-state"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: subnet-router
  namespace: tailscale
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: subnet-router
subjects:
  - kind: ServiceAccount
    name: subnet-router
    namespace: tailscale
