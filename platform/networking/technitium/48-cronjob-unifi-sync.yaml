apiVersion: batch/v1
kind: CronJob
metadata:
  name: unifi-sync
  namespace: technitium
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 1800
      template:
        metadata:
          labels:
            app: unifi-sync
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: registry.internal.white.fm/technitium-sidecar
              # Deps (requests/urllib3) baked into the image — no runtime pip.
              # Reaches only the internal UniFi controller + Technitium API, so
              # no egress / proxy env is needed.
              command: ["python", "/scripts/sync.py"]
              env:
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: UNIFI_URL
                  valueFrom: { secretKeyRef: { name: unifi-creds, key: url } }
                - name: UNIFI_USER
                  valueFrom: { secretKeyRef: { name: unifi-creds, key: username } }
                - name: UNIFI_PASS
                  valueFrom: { secretKeyRef: { name: unifi-creds, key: password } }
                - name: TECH_PASS
                  valueFrom: { secretKeyRef: { name: technitium-credentials, key: admin-password } }
                - name: FORWARD_ZONE
                  value: "lan.internal.white.fm"
              resources:
                requests: { cpu: 25m, memory: 64Mi }
                limits:   { cpu: 250m, memory: 192Mi }
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: script
              configMap:
                name: technitium-unifi-sync
                defaultMode: 0555
