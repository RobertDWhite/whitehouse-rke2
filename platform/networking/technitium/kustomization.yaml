apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - 00-namespace.yaml
  - 10-statefulset.yaml
  - 20-service-dns.yaml
  - 21-service-web.yaml
  - 22-service-headless.yaml
  - 23-services-per-pod.yaml
  - 24-services-web-per-pod.yaml
  - 40-httproute-internal.yaml
  - 41-httproute-per-pod.yaml
  - 47-configmap-unifi-sync.yaml
  - 48-cronjob-unifi-sync.yaml
  - 50-configmap-import-script.yaml
  - 55-configmap-metrics-exporter.yaml
  - 61-deployment-dnscrypt-proxy.yaml
  - 62-service-dnscrypt-proxy.yaml
  - 80-configmap-dns-watchdog.yaml
  - 81-cronjob-dns-watchdog.yaml
  # Emergency-only Pi-hole runtime sync. Uncomment, push, then:
  #   kubectl -n technitium create job --from=cronjob/pihole-sync sync-now
  # Re-comment when done; ArgoCD prunes the CronJob + ConfigMap.
  # - 90-emergency-pihole-sync.yaml

generators:
  - ksops.yaml

images:
  - name: technitium/dns-server
    newTag: "15.4.0"
  # Custom sidecar (requests/urllib3/PyYAML baked in) for zone-importer +
  # metrics-exporter — replaces the old python:alpine + runtime pip. Built
  # multi-arch (amd64+arm64) from ./sidecar, pushed to the internal registry.
  # Not Renovate-managed (internal registry); rebuild + repin digest manually.
  - name: registry.internal.white.fm/technitium-sidecar
    digest: sha256:4e75aa6ead666702eae45e3ccf5d8859e4b9ac7cea30271c7d3d5cb3aa212a6f
  - name: klutchell/dnscrypt-proxy
    newTag: "2.1.16"
