# =============================================================
# Allow the Homepage dashboard to reach service APIs for its widgets.
# Homepage (like uptime-kuma) is a dashboard that reaches into many
# namespaces to pull live stats. Each target namespace runs default-deny
# ingress, so it needs an explicit allow for the homepage namespace.
# NetworkPolicies are additive, so these live in one file rather than
# editing each namespace's existing policy set.
# =============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homepage
  namespace: media
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homepage
---
