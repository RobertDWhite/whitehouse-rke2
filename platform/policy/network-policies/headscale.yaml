# =============================================================
# headscale namespace — ingress policy
# =============================================================
# Selecting the headscale pod for Ingress makes this policy the
# allow-list for ALL inbound ports, so every port the pod serves
# must be enumerated explicitly:
#
#   :8080  control plane (client registration, OIDC, node
#          enrollment, ts2021 noise/control protocol) — fronted by
#          the Envoy Gateway at headscale.white.fm and
#          headscale.internal.white.fm, so it must accept ingress
#          from the gateway namespace.
#   :50443 gRPC admin API — kept private to the headscale namespace.
#   :9090  Prometheus metrics — scraped from the observability ns.
# =============================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-grpc
  namespace: headscale
spec:
  podSelector:
    matchLabels:
      app: headscale
  policyTypes: [Ingress]
  ingress:
    # Control plane — Envoy Gateway (public + internal) and in-namespace
    # callers (admin UI / CLI).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: headscale
      ports:
        - protocol: TCP
          port: 8080
    # gRPC admin API — only pods inside the headscale namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: headscale
      ports:
        - protocol: TCP
          port: 50443
    # Metrics — Prometheus in the observability namespace.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090
