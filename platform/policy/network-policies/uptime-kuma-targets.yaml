# =============================================================
# allow-uptime-kuma — let Uptime Kuma probe namespaces whose
# netpols live in their own app dirs (data apps, MCP servers, the
# media *arr stack, raven) and therefore didn't already allow the
# uptime-kuma namespace. NetworkPolicies are additive, so this only
# ADDS uptime-kuma as an allowed ingress source; default-deny and the
# app's other allow rules are untouched.
# Mirrors the allow-uptime-kuma policy in immich.yaml / simple-web-apps.yaml.
# =============================================================

# data apps (default-deny + allow-ingress-to-ui/api in their app dirs)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: allow-uptime-kuma, namespace: weather}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: uptime-kuma}}
---
