                  docker.elastic.co/* |
                  dock.mau.dev/* |
                  registry.gitlab.com/gitlab-ci-utils/*
            =(ephemeralContainers):
              - image: >-
                  registry.internal.white.fm/* |
                  ghcr.io/* |
