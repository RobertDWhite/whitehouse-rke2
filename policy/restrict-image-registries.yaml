                  matrixdotorg/* | docker.io/matrixdotorg/* |
                  halfshot/* | docker.io/halfshot/* |
                  vectorim/* | docker.io/vectorim/* |
                  jceloria/* | docker.io/jceloria/* |
                  cloudflare/* | docker.io/cloudflare/* |
                  technitium/* | docker.io/technitium/* |
                  valkey/* | docker.io/valkey/* |
                  homebridge/* | docker.io/homebridge/* |
                  koush/* | docker.io/koush/* |
                  intelowlproject/* | docker.io/intelowlproject/* |
                  yetiplatform/* | docker.io/yetiplatform/* |
                  klutchell/* | docker.io/klutchell/* |
                  juanluisbaptiste/* | docker.io/juanluisbaptiste/* |
