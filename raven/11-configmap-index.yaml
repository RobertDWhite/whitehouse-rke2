apiVersion: v1
kind: ConfigMap
metadata:
  name: raven-index
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
      <meta content="utf-8" http-equiv="encoding">
      <title>Raven Threat Map</title>
      <style type="text/css">
        html,
        body {
          height: 100%;
          margin: 0;
          padding: 0;
          border: none;
          overflow: hidden;
          background: #212222;
        }

        iframe {
          height: 100%;
          width: 100%;
          margin: 0;
          padding: 0;
          display: block;
          border: none;
        }
      </style>
    </head>
    <body>
      <iframe id="raven-iframe" src="src/raven.html" frameborder="0" width="100%" height="100%" scrolling="auto"></iframe>
      <script type="text/javascript">
        document.getElementById('raven-iframe').addEventListener('load', function() {
          var wsScheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
          var wsHost = window.location.hostname.endsWith('.internal.white.fm')
            ? 'intel.internal.white.fm'
            : 'intel.white.fm';
          var ravenOptions = {
            world_type: null,
            selected_countries: [],
            remove_countries: ['aq'],
            height: window.innerHeight,
            width: window.innerWidth,
            backup_background_color: '#212222',
            orginal_country_color: '#737373',
            clicked_country_color: '#6c4242',
            selected_country_color: '#ff726f',
            global_timeout: 2000,
            global_stats_limit: 10,
            db_length: 1000,
            live_attacks_limit: 50,
            location: 'scripts',
            panels: ['multi-output', 'single-output', 'taskbar', 'logo'],
            disable: ['tooltip', 'random', 'insert', 'move_to_country'],
            websocket: {
              server: wsScheme + '://' + wsHost + '/raven-ws',
              request_timeout: 3000
            },
            verbose: false
          };

          window.raven = document.getElementById('raven-iframe').contentWindow.raven;
          window.raven.init_all(ravenOptions);
          window.raven.init_world();
          window.raven.fetch_data_from_server();
        });
      </script>
    </body>
    </html>
