apiVersion: apps/v1
kind: Deployment
metadata:
  name: raven
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raven
  template:
    metadata:
      labels:
        app: raven
    spec:
      initContainers:
        - name: fetch-raven
          image: alpine
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache git
              git clone --depth 1 https://github.com/qeeqbox/raven.git /site
              rm -rf /site/.git
          volumeMounts:
            - name: site
              mountPath: /site
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      containers:
        - name: nginx
          image: nginx
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: site
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
        - name: simulator
          image: python
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              pip install --no-cache-dir websockets==12.0
              python /site/simulation.py table
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - name: ws
              containerPort: 5678
          readinessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ws
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: site
              mountPath: /site
      volumes:
        - name: site
          emptyDir: {}
        - name: nginx-conf
          configMap:
            name: raven-nginx-conf
        - name: index
          configMap:
            name: raven-index
