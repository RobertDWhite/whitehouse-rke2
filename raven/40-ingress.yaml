apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raven
  namespace: raven
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - raven.white.fm
    - raven.internal.white.fm
    secretName: raven-white-fm-tls
  rules:
  - host: raven.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: raven
            port:
              number: 80
  - host: raven.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: raven
            port:
              number: 80
