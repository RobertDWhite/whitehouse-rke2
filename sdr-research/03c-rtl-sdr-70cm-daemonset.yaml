# Second RTL-SDR dongle for 70cm (432 MHz band)
# Requires a second USB RTL-SDR dongle with serial "00000002" on rke2-node-13.
# To set the serial on the dongle: rtl_eeprom -d <index> -s 00000002
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rtl-sdr-tcp-70cm
  namespace: sdr-research
spec:
  selector:
    matchLabels:
      app: rtl-sdr-tcp-70cm
  template:
    metadata:
      labels:
        app: rtl-sdr-tcp-70cm
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      containers:
        - name: rtl-tcp-70cm
          image: legacycode/rtlsdr
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          ports:
            - containerPort: 1235
              name: rtl-tcp-70cm
          env:
            - name: RTL_DEVICE_SERIAL
              value: "00000002"
            - name: RTL_SAMPLE_RATE
              value: "2400000"
            - name: RTL_GAIN
              value: "auto"
          readinessProbe:
            tcpSocket:
              port: 1235
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 1235
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
          command:
            - /bin/sh
            - -c
            - |
              echo 0 > /sys/module/usbcore/parameters/usbfs_memory_mb || true
              echo "usbfs_memory_mb=$(cat /sys/module/usbcore/parameters/usbfs_memory_mb || echo unknown)"

              # Unbind dvb_usb_rtl28xxu from all RTL-SDR devices — the kernel
              # DVB driver claims generic RTL2838 dongles, blocking librtlsdr.
              DVB_DRV=/sys/bus/usb/drivers/dvb_usb_rtl28xxu
              if [ -d "$DVB_DRV" ]; then
                for dev in "$DVB_DRV"/*/; do
                  devid=$(basename "$dev")
                  case "$devid" in
                    *:*) echo -n "$devid" > "$DVB_DRV/unbind" 2>/dev/null && \
                         echo "Unbound $devid from dvb_usb_rtl28xxu" || true ;;
                  esac
                done
              fi

              echo "Starting rtl_tcp for 70cm UHF band (serial ${RTL_DEVICE_SERIAL})"
              # Resolve serial to device index (rtl_tcp -d treats numeric
              # strings as device indices, not serial lookups).
              DEV_INDEX=""
              for i in 0 1 2 3; do
                INFO=$(rtl_eeprom -d $i 2>&1) || continue
                if echo "$INFO" | grep -q "Serial number:.*${RTL_DEVICE_SERIAL}"; then
                  DEV_INDEX=$i
                  break
                fi
              done
              if [ -z "$DEV_INDEX" ]; then
                echo "WARN: Serial ${RTL_DEVICE_SERIAL} not found, defaulting to 1"
                DEV_INDEX=1
              fi
              echo "Resolved serial ${RTL_DEVICE_SERIAL} to device index ${DEV_INDEX}"
              rtl_tcp \
                -d ${DEV_INDEX} \
                -a 0.0.0.0 \
                -p 1235 \
                -s ${RTL_SAMPLE_RATE} \
                -n 32
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb
