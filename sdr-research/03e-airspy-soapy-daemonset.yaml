# Airspy Mini SoapySDR remote server.
# Exposes the Airspy Mini USB device to the cluster via the SoapyRemote
# protocol (TCP port 55132) so that unified-sdr-2m can connect with:
#   soapy=0,driver=remote,remote=tcp://airspy-soapy.sdr-research.svc.cluster.local:55132,remote:driver=airspy
#
# Build the image (arm64 — runs on bare-metal node-10):
#   docker buildx build --platform linux/arm64 --load \
#     -t registry.white.fm/soapy-airspy-server:1.0.4-arm64 \
#     -f sdr-research/Dockerfile.soapy-airspy sdr-research/
#   docker push registry.white.fm/soapy-airspy-server:1.0.4-arm64
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: airspy-soapy
  namespace: sdr-research
spec:
  selector:
    matchLabels:
      app: airspy-soapy
  template:
    metadata:
      labels:
        app: airspy-soapy
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-10
      containers:
        - name: airspy-soapy
          image: registry.white.fm/soapy-airspy-server
          command:
            - /bin/sh
            - -lc
            - |
              set -eu
              for key in wmem_max rmem_max wmem_default rmem_default; do
                echo 44040192 > "/host-proc-sys/net/core/${key}"
              done
              exec SoapySDRServer --bind 0.0.0.0:55132
          securityContext:
            privileged: true
          ports:
            - containerPort: 55132
              name: soapy
          readinessProbe:
            tcpSocket:
              port: 55132
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 55132
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
            - name: host-proc-sys
              mountPath: /host-proc-sys
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb
        - name: host-proc-sys
          hostPath:
            path: /proc/sys
