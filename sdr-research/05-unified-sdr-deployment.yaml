apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-sdr
  namespace: sdr-research
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unified-sdr
  template:
    metadata:
      labels:
        app: unified-sdr
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-02-26T04:00:00Z"
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      containers:
        - name: unified-sdr
          image: librespace/gnuradio
          command: ["/bin/bash", "-c", "python3 -u /scripts/unified_sdr.py"]
          env:
            # Airspy Mini via SoapyRemote — overrides rtl_tcp default device string.
            # Airspy Mini: 24 MHz–1.8 GHz, 6 MHz real-time BW covers full 2m band.
            - name: OSMOSDR_ARGS
              value: "soapy=0,driver=remote,remote=tcp://airspy-soapy.sdr-research.svc.cluster.local:55132,remote:driver=airspy"
            - name: CAPTURE_ID
              value: "2m"
            - name: FIXED_MONITOR_HZ
              # ISS voice downlink (145.800 MHz) — always monitored
              value: "145800000"
            - name: SAMPLE_RATE
              # Airspy Mini supports 3 MSPS or 6 MSPS; 6 MSPS covers full 2m band (143–149 MHz)
              value: "6000000"
            - name: DWELL_CENTER_HZ
              # Center of 2m amateur band; 6 MHz BW covers 143–149 MHz without scanning within 2m
              value: "146000000"
            - name: SCAN_CENTERS
              # Scanning disabled — retune causes double-free crash in SoapyRemote/osmosdr.
              # Re-enable when a dedicated SDR covers airband/pager/weather.
              # Was: [130000000, 153000000, 162500000]
              value: "[]"
            - name: DWELL_SEC
              # Longer dwell: 6 MHz BW captures all 2m activity simultaneously
              value: "60"
            - name: SCAN_SEC
              value: "5"
            - name: NUM_DYN_FM
              # More slots to handle wider 6 MHz capture window
              value: "12"
            - name: NUM_DYN_CW
              value: "4"
            - name: NUM_DYN_ACARS
              # More ACARS slots — full 128–132 MHz ACARS band fits in one tune
              value: "8"
            - name: SLOT_RECYCLE_SEC
              value: "300"
            - name: CLEAR_SLOTS_ON_RETUNE
              value: "false"
            - name: SQUELCH_OPEN_DB
              value: "-55"
            - name: SQUELCH_CLOSE_DB
              value: "-60"
            - name: RF_SQUELCH_DB
              value: "-55"
            - name: TAIL_SEC
              value: "1.5"
            - name: MIN_REC_SEC
              value: "0.5"
            - name: MAX_REC_SEC
              value: "120"
            - name: FFT_SIZE
              value: "4096"
            - name: FFT_INTERVAL
              value: "1.0"
            - name: ENERGY_THRESH_DB
              value: "10"
            - name: RF_GAIN
              # Airspy Mini gain index (0–21); start at 18 and tune down if overloaded
              value: "18"
            - name: PPM_CORRECTION
              # Airspy Mini has factory-calibrated TCXO; PPM correction not needed
              value: "0"
          resources:
            requests:
              cpu: 750m
              memory: 512Mi
            limits:
              cpu: 3000m
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -lc
                - >-
                  python3 -c "import json,os,time,sys; p=f'/data/detections/sdr_heartbeat_{os.getenv(\"CAPTURE_ID\",\"default\")}.json'; ts=float(json.load(open(p)).get('timestamp', 0)); sys.exit(0 if time.time()-ts < 90 else 1)"
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -lc
                - >-
                  python3 -c "import json,os,time,sys; p=f'/data/detections/sdr_heartbeat_{os.getenv(\"CAPTURE_ID\",\"default\")}.json'; ts=float(json.load(open(p)).get('timestamp', 0)); sys.exit(0 if time.time()-ts < 90 else 1)"
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: artifacts
              mountPath: /data
            - name: scripts
              mountPath: /scripts
            - name: dshm
              mountPath: /dev/shm
      terminationGracePeriodSeconds: 10
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: scripts
          configMap:
            name: unified-sdr-scripts
            defaultMode: 0755
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
