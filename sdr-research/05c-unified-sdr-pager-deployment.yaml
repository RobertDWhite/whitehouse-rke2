# Third unified-sdr instance for VHF public safety / pager frequencies.
# Connects to the rtl-tcp service (RTL-SDR serial 00000001, port 1234).
# Always-on at 155 MHz center covering 153.8–156.2 MHz (police/fire/EMS/pager).
# No scanning — continuous monitoring.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unified-sdr-pager
  namespace: sdr-research
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unified-sdr-pager
  template:
    metadata:
      labels:
        app: unified-sdr-pager
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      containers:
        - name: unified-sdr-pager
          image: librespace/gnuradio
          securityContext:
            allowPrivilegeEscalation: false
          command: ["/bin/bash", "-c", "python3 -u /scripts/unified_sdr.py"]
          env:
            - name: RTL_TCP_HOST
              value: "rtl-tcp.sdr-research.svc.cluster.local"
            - name: RTL_TCP_PORT
              value: "1234"
            - name: CAPTURE_ID
              value: "pager"
            - name: FIXED_MONITOR_HZ
              # 152.480 MHz — common POCSAG pager frequency within 153 MHz capture band
              value: "152480000"
            - name: SAMPLE_RATE
              value: "2400000"
            - name: DWELL_CENTER_HZ
              # 155 MHz center covers 153.8–156.2 MHz (VHF public safety + pager)
              value: "155000000"
            - name: SCAN_CENTERS
              # No scanning — always-on continuous monitoring
              value: "[]"
            - name: DWELL_SEC
              value: "45"
            - name: SCAN_SEC
              value: "5"
            - name: NUM_DYN_FM
              value: "8"
            - name: NUM_DYN_CW
              value: "2"
            - name: SLOT_RECYCLE_SEC
              value: "300"
            - name: CLEAR_SLOTS_ON_RETUNE
              value: "false"
            - name: SQUELCH_OPEN_DB
              # Raised from -55: public safety channels have constant carrier;
              # need higher threshold to only trigger on voice modulation
              value: "-35"
            - name: SQUELCH_CLOSE_DB
              value: "-40"
            - name: RF_SQUELCH_DB
              value: "-35"
            - name: TAIL_SEC
              value: "1.5"
            - name: MIN_REC_SEC
              value: "0.5"
            - name: MAX_REC_SEC
              value: "120"
            - name: FFT_SIZE
              value: "4096"
            - name: FFT_INTERVAL
              value: "1.0"
            - name: ENERGY_THRESH_DB
              value: "10"
            - name: RF_GAIN
              value: "40"
            - name: PPM_CORRECTION
              value: "0"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -lc
                - >-
                  python3 -c "import json,os,time,sys; p=f'/data/detections/sdr_heartbeat_{os.getenv(\"CAPTURE_ID\",\"default\")}.json'; ts=float(json.load(open(p)).get('timestamp', 0)); sys.exit(0 if time.time()-ts < 90 else 1)"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -lc
                - >-
                  python3 -c "import json,os,time,sys; p=f'/data/detections/sdr_heartbeat_{os.getenv(\"CAPTURE_ID\",\"default\")}.json'; ts=float(json.load(open(p)).get('timestamp', 0)); sys.exit(0 if time.time()-ts < 90 else 1)"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: artifacts
              mountPath: /data
            - name: scripts
              mountPath: /scripts
            - name: dshm
              mountPath: /dev/shm
      terminationGracePeriodSeconds: 10
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: scripts
          configMap:
            name: unified-sdr-scripts
            defaultMode: 0755
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
