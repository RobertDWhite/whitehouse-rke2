apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sdr-research
spec:
  ports:
    - port: 5432
  selector:
    app: postgres

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sdr-research
spec:
  selector:
    matchLabels:
      app: postgres
  serviceName: "postgres"
  replicas: 1
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          args:
            - -c
            - shared_buffers=1GB
            - -c
            - work_mem=32MB
            - -c
            - maintenance_work_mem=256MB
            - -c
            - effective_cache_size=3GB
            - -c
            - random_page_cost=1.1
            - -c
            - effective_io_concurrency=200
            - -c
            - max_connections=300
          env:
            - name: POSTGRES_DB
              value: "sdr_viewer"
            - name: POSTGRES_USER
              value: "sdr_viewer"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 6Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sdr_viewer"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sdr_viewer"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 50Gi
