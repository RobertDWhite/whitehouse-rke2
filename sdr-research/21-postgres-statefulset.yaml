apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sdr-research
spec:
  ports:
    - port: 5432
  selector:
    app: postgres

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sdr-research
spec:
  selector:
    matchLabels:
      app: postgres
  serviceName: "postgres"
  replicas: 1
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          args:
            - -c
            - shared_buffers=512MB
            - -c
            - work_mem=16MB
            - -c
            - effective_cache_size=2GB
            - -c
            - max_connections=200
          env:
            - name: POSTGRES_DB
              value: "sdr_viewer"
            - name: POSTGRES_USER
              value: "sdr_viewer"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: db-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "sdr_viewer"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "sdr_viewer"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 50Gi
