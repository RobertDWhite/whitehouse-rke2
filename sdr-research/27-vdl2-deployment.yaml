apiVersion: apps/v1
kind: Deployment
metadata:
  name: vdl2-decoder
  namespace: sdr-research
spec:
  replicas: 0   # shares Airspy SoapyRemote with unified-sdr-2m — can't run simultaneously
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vdl2-decoder
  template:
    metadata:
      labels:
        app: vdl2-decoder
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      containers:
      - name: vdl2-decoder
        image: registry.white.fm/vdl2-decoder
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        env:
        - name: SOAPY_REMOTE
          value: "airspy-soapy.sdr-research.svc.cluster.local:55132"
        - name: VDL2_OUTPUT_DIR
          value: "/data/text/vdl2"
        - name: VDL2_FREQUENCIES
          # Primary VDL2 channels (Hz) — dumpvdl2 expects Hz for --soapysdr mode
          value: "136725000 136775000 136800000 136875000 136975000"
        - name: VDL2_GAIN
          value: "18"
        volumeMounts:
        - name: sdr-data
          mountPath: /data
      volumes:
      - name: sdr-data
        persistentVolumeClaim:
          claimName: sdr-artifacts-rwx
