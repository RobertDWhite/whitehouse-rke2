# RX888 MkII SoapySDR remote server.
# Exposes the RX888 (Cypress WestBridge / FX3) USB device to the cluster via
# SoapyRemote protocol on port 55132. OpenWebRX+ connects as type=soapy_remote
# with remote_driver=sddc.
#
# Build and push the image before deploying:
#   docker buildx build --platform linux/amd64 --load \
#     -t registry.white.fm:5000/soapy-rx888-server:1.0.0 \
#     -f sdr-research/Dockerfile.soapy-rx888 sdr-research/
#   docker push registry.white.fm:5000/soapy-rx888-server:1.0.0
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rx888-soapy
  namespace: sdr-research
spec:
  selector:
    matchLabels:
      app: rx888-soapy
  template:
    metadata:
      labels:
        app: rx888-soapy
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-10
      containers:
        - name: rx888-soapy
          image: registry.white.fm/soapy-rx888-server:1.0.2-arm64
          securityContext:
            privileged: true
          env:
            - name: SDR_USB_PROBE_REGEX
              value: "RX888|RX-888|RX999|RXLucy|HF103|BBRF103|FX3|Cypress|SDDC"
          ports:
            - containerPort: 55132
              name: soapy
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  found_proc=0
                  for f in /proc/[0-9]*/comm; do
                    [ "$(cat "$f")" = "SoapySDRServer" ] && found_proc=1 && break
                  done
                  [ "$found_proc" -eq 1 ] || exit 1
                  for d in /sys/bus/usb/devices/*; do
                    [ -f "$d/idVendor" ] || continue
                    dev="$(cat "$d/manufacturer" 2>/dev/null) $(cat "$d/product" 2>/dev/null) $(cat "$d/idVendor" 2>/dev/null):$(cat "$d/idProduct" 2>/dev/null)"
                    printf '%s\n' "$dev" | grep -Eiq "${SDR_USB_PROBE_REGEX}" && exit 0
                  done
                  exit 1
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "for f in /proc/[0-9]*/comm; do [ \"$(cat \"$f\")\" = \"SoapySDRServer\" ] && exit 0; done; exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb
