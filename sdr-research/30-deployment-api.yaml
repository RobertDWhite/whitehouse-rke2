apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdr-viewer-api
  namespace: sdr-research
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sdr-viewer-api
  template:
    metadata:
      labels:
        app: sdr-viewer-api
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-02-26T04:00:00Z"
    spec:
      serviceAccountName: sdr-viewer-api
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      containers:
        - name: api
          image: registry.white.fm/sdr-viewer-api:1.7.11
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: database-url
            - name: CALLSIGN_HINTS
              value: "w3rdw"
            - name: AUTO_DELETE_NO_SPEECH
              value: "true"
            - name: RETENTION_DAYS
              value: "90"
            - name: RETENTION_MODE_DAYS
              value: "pager:30,eas:365,aprs:180,hfdl:30,vdl2:30,acars:30"
            - name: OLLAMA_ENABLED
              value: "true"
            - name: OLLAMA_URL
              value: "http://ollama.ai-stack.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "dolphin-mistral:latest"
            - name: OLLAMA_TIMEOUT_SECONDS
              value: "120"
            - name: OLLAMA_MAX_TAGS
              value: "8"
            - name: OLLAMA_MAX_PER_CYCLE
              value: "200"
            - name: INDEX_INITIAL_LOOKBACK_SECONDS
              # Scan only last 24h on startup; older files already indexed
              value: "86400"
            - name: SDR_POD_HEALTH_FALLBACK
              value: "true"
            - name: HAMDB_ENABLED
              value: "true"
            - name: HAMDB_MAX_PER_CYCLE
              value: "50"
            - name: HAMDB_CACHE_DAYS
              value: "30"
            - name: AUDIO_BASE_PATH
              value: /data/audio
            - name: TEXT_BASE_PATH
              value: /data/text
            - name: CACHE_PATH
              value: /tmp/sdr-viewer-cache
            - name: REPEATERBOOK_ENABLED
              value: "true"
            - name: REPEATERBOOK_EMAIL
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: repeaterbook-email
            - name: REPEATERBOOK_LATITUDE
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: repeaterbook-latitude
            - name: REPEATERBOOK_LONGITUDE
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: repeaterbook-longitude
            - name: REPEATERBOOK_RADIUS_MILES
              value: "75"
            - name: REPEATERBOOK_STATES
              value: "OH,IN,KY"
            - name: REPEATERBOOK_SYNC_HOURS
              value: "24"
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: alert-webhook-url
            - name: ALERT_CALLSIGNS
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: alert-callsigns
            - name: ALERT_KEYWORDS
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: alert-keywords
            - name: APRS_IS_ENABLED
              value: "true"
            - name: APRS_IS_CALLSIGN
              value: "W3RDW"
            - name: APRS_IS_FILTER
              value: "r/39.0/-84.0/100"
          volumeMounts:
            - name: sdr-artifacts
              mountPath: /data
            - name: cache
              mountPath: /cache
            - name: api-overrides
              mountPath: /app/app/services/audio.py
              subPath: audio.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/files.py
              subPath: files.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/search.py
              subPath: search.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/services/tagging.py
              subPath: tagging.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/services/known_freqs.py
              subPath: known_freqs.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/repeaters.py
              subPath: repeaters.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/services/indexer.py
              subPath: indexer.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/aprs.py
              subPath: aprs.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/admin.py
              subPath: admin.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/stats.py
              subPath: stats.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/services/alerting.py
              subPath: alerting.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/services/metrics.py
              subPath: metrics.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/spots.py
              subPath: spots.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/events.py
              subPath: events.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/routers/waveform.py
              subPath: waveform.py
              readOnly: true
            - name: api-overrides
              mountPath: /app/app/services/aprs_is.py
              subPath: aprs_is.py
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 6Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: sdr-artifacts
          # Emergency degraded-mode fallback while Longhorn RWX reattachment is
          # wedged. This restores the DB-backed API routes that drive the app's
          # dashboard/radio status without waiting on a fresh shared-volume mount.
          # File-serving endpoints remain degraded until the RWX path is repaired.
          emptyDir: {}
        - name: cache
          persistentVolumeClaim:
            claimName: sdr-viewer-cache
        - name: api-overrides
          configMap:
            name: sdr-viewer-api-overrides
            defaultMode: 0444
