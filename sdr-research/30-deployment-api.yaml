apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdr-viewer-api
  namespace: sdr-research
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sdr-viewer-api
  template:
    metadata:
      labels:
        app: sdr-viewer-api
      annotations:
        kubectl.kubernetes.io/restartedAt: "2026-05-03T19:00:00Z"
    spec:
      serviceAccountName: sdr-viewer-api
      terminationGracePeriodSeconds: 60
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      containers:
        - name: api
          image: registry.white.fm/sdr-viewer-api:1.7.11
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: database-url
            - name: CALLSIGN_HINTS
              value: "w3rdw"
            - name: AUTO_DELETE_NO_SPEECH
              value: "true"
            - name: RETENTION_DAYS
              value: "90"
            - name: RETENTION_MODE_DAYS
              value: "pager:30,eas:365,aprs:180,hfdl:30,vdl2:30,acars:30"
            - name: OLLAMA_ENABLED
              value: "true"
            - name: OLLAMA_URL
              value: "http://ollama-router.ai-stack.svc.cluster.local:11434"
            - name: OLLAMA_MODEL
              value: "deepseek-r1:14b"
            - name: OLLAMA_TIMEOUT_SECONDS
              value: "120"
            - name: OLLAMA_MAX_TAGS
              value: "8"
            - name: OLLAMA_MAX_PER_CYCLE
              value: "200"
            - name: INDEX_INITIAL_LOOKBACK_SECONDS
              # Scan only last 24h on startup; older files already indexed
              value: "86400"
            - name: SDR_POD_HEALTH_FALLBACK
              value: "true"
            - name: HAMDB_ENABLED
              value: "true"
            - name: HAMDB_MAX_PER_CYCLE
              value: "50"
            - name: HAMDB_CACHE_DAYS
              value: "30"
            - name: AUDIO_BASE_PATH
              value: /data/audio
            - name: TEXT_BASE_PATH
              value: /data/text
            - name: HF_TEXT_BASE_PATH
              value: /data/hf/text
            - name: CACHE_PATH
              value: /tmp/sdr-viewer-cache
            - name: REPEATERBOOK_ENABLED
              value: "true"
            - name: REPEATERBOOK_EMAIL
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: repeaterbook-email
            - name: REPEATERBOOK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: repeaterbook-token
                  key: repeaterbook-api-key
            - name: REPEATERBOOK_USER_AGENT
              value: "sdr-research/1.0 (robert@w3rdw.radio)"
            - name: REPEATERBOOK_LATITUDE
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: repeaterbook-latitude
            - name: REPEATERBOOK_LONGITUDE
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: repeaterbook-longitude
            - name: REPEATERBOOK_RADIUS_MILES
              value: "75"
            - name: REPEATERBOOK_STATES
              value: "OH,IN,KY"
            - name: REPEATERBOOK_SYNC_HOURS
              value: "24"
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: alert-webhook-url
            - name: ALERT_CALLSIGNS
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: alert-callsigns
            - name: ALERT_KEYWORDS
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: alert-keywords
            - name: APRS_IS_ENABLED
              value: "true"
            - name: APRS_IS_CALLSIGN
              value: "W3RDW"
            - name: APRS_IS_FILTER
              value: "r/39.0/-84.0/100"
          volumeMounts:
            - name: sdr-artifacts
              mountPath: /data
            - name: sdr-artifacts-hf
              mountPath: /data/hf
            - name: cache
              mountPath: /cache
            - name: api-overrides
              mountPath: /app/app/services/indexer.py
              subPath: indexer.py
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 6Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: sdr-artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: sdr-artifacts-hf
          persistentVolumeClaim:
            claimName: sdr-artifacts-hf
        - name: cache
          persistentVolumeClaim:
            claimName: sdr-viewer-cache
        - name: api-overrides
          configMap:
            name: sdr-viewer-api-overrides
