            .filter(Recording.ai_tags.isnot(None))
            .yield_per(2000)
        )
        counts: dict = {}
        for (raw,) in rows:
            for tag in parse_ai_tags(raw):
                counts[tag] = counts.get(tag, 0) + 1
        sorted_tags = sorted(counts.items(), key=lambda x: x[1], reverse=True)[:limit]
