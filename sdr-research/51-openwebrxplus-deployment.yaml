# OpenWebRX+ — web-based HF receiver with multi-mode decoders.
# Connects to the RX888 MkII via SoapyRemote (rx888-soapy DaemonSet on node-14).
# Supported decoders: FT8, FT4, WSPR, JS8Call, HFDL, WEFAX, ALE, CW, SSB, AM, FreeDV
#
# The init container pre-populates /var/lib/openwebrx/settings.json with HF band
# profiles on first run only (skipped if SDR devices are already configured).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebrxplus
  namespace: sdr-research
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openwebrxplus
  template:
    metadata:
      labels:
        app: openwebrxplus
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-13
      initContainers:
        - name: init-settings
          image: python:3.11-slim
          command: ["python3", "/init/init_settings.py"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/openwebrx
            - name: init-scripts
              mountPath: /init
      containers:
        - name: openwebrxplus
          image: slechev/openwebrxplus
          securityContext:
            privileged: true
          ports:
            - containerPort: 8073
              name: http
          env:
            - name: OPENWEBRX_ADMIN_USER
              value: "admin"
            - name: OPENWEBRX_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: db-password
          volumeMounts:
            - name: usb
              mountPath: /dev/bus/usb
            - name: data
              mountPath: /var/lib/openwebrx
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 4000m
              memory: 4Gi
      terminationGracePeriodSeconds: 15
      volumes:
        - name: usb
          hostPath:
            path: /dev/bus/usb
        - name: data
          persistentVolumeClaim:
            claimName: openwebrxplus-data
        - name: init-scripts
          configMap:
            name: openwebrxplus-init
            defaultMode: 0755
