# Public — routes openwebrx.white.fm through Authentik (same pattern as sdr.white.fm).
# After deploying, add an Application Proxy in Authentik admin:
#   Provider type: Proxy
#   Mode: Forward single application
#   External host: https://openwebrx.white.fm
#   Internal host: http://openwebrxplus.sdr-research.svc.cluster.local:8073
#   Then assign to the existing outpost used by sdr.white.fm.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebrxplus
  namespace: sdr-research
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
    nginx.ingress.kubernetes.io/proxy-ssl-name: "authentik.authentik.svc.cluster.local"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - openwebrx.white.fm
    secretName: openwebrx-white-fm-tls
  rules:
  - host: openwebrx.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: authentik
            port:
              number: 9443
---
# Internal — direct access, no auth.
# proxy-http-version 1.1 is required for WebSocket upgrade (waterfall + audio streaming).
# nginx ingress handles the Upgrade/Connection headers natively at HTTP/1.1;
# no configuration-snippet needed (and snippets may be blocked by the controller).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openwebrxplus-internal
  namespace: sdr-research
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - openwebrx.internal.white.fm
    secretName: openwebrx-internal-white-fm-tls
  rules:
  - host: openwebrx.internal.white.fm
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: openwebrxplus
            port:
              number: 8073
