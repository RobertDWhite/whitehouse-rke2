# HF SSTV decoder — prefers direct RX888 access on rke2-node-12 and falls
# back to rx888-soapy if needed.
#
# IMPORTANT: The RX888 can only be opened by one workload at a time.
# Scale other RX888 consumers to 0 before enabling this pod:
#   kubectl scale deploy sstv-hf-decoder -n sdr-research --replicas=1
#
# HF SSTV frequencies (USB): 14.230, 21.340, 28.680, 7.171 MHz
# Each frequency is monitored for HF_DWELL_SEC seconds in rotation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sstv-hf-decoder
  namespace: sdr-research
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sstv-hf-decoder
  template:
    metadata:
      labels:
        app: sstv-hf-decoder
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-12
      containers:
        - name: sstv-hf-decoder
          image: registry.white.fm/sstv-decoder
          securityContext:
            allowPrivilegeEscalation: false
          command: ["python3", "/sstv-hf-entrypoint.py"]
          env:
            - name: SDL_VIDEODRIVER
              value: "offscreen"
            - name: SDL_AUDIODRIVER
              value: "dummy"
            - name: SOAPY_REMOTE_RX888
              value: "rx888-soapy.sdr-research.svc.cluster.local:55132"
            - name: SOAPY_DEVICE_STRING
              value: "driver=SDDC"
            - name: SSTV_OUTPUT_DIR
              value: "/data/images/sstv"
            - name: HF_SAMPLE_RATE
              value: "2048000"
            - name: HF_AUDIO_RATE
              value: "16000"
            - name: HF_DWELL_SEC
              # Seconds per frequency — longest SSTV mode (Scottie DX) takes ~270s;
              # 120s will catch most common modes (Robot 36 = 36s, Scottie 1 = 110s)
              value: "120"
            - name: HF_GAIN
              value: "20"
            - name: HF_SSTV_FREQS
              value: "14230000,21340000,28680000,7171000"
          volumeMounts:
            - name: artifacts
              mountPath: /data
            - name: usb
              mountPath: /dev/bus/usb
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: usb
          hostPath:
            path: /dev/bus/usb
