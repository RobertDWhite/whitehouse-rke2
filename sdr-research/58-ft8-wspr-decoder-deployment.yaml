# FT8/WSPR decoder — captures HF audio via SoapyRemote from RX888 MkII,
# decodes FT8/FT4/WSPR digital modes using jt9 + wsprd (WSJT-X),
# writes one JSON file per decoded spot to /data/text/ft8/.
# The API indexer picks these up and inserts into the spots table.
#
# IMPORTANT: The RX888 SoapyRemote server only serves one client at a time.
# Scale openwebrxplus AND hfdl-decoder to 0 while running this decoder.
#   kubectl scale deploy openwebrxplus -n sdr-research --replicas=0
#   kubectl scale deploy hfdl-decoder  -n sdr-research --replicas=0
#   kubectl scale deploy ft8-wspr-decoder -n sdr-research --replicas=1
#
# Build the image first:
#   docker buildx build --platform linux/amd64,linux/arm64 --push \
#     -t registry.white.fm/ft8-wspr-decoder:1.0.8 \
#     -f sdr-research/Dockerfile.ft8-wspr sdr-research/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ft8-wspr-decoder
  namespace: sdr-research
spec:
  replicas: 1   # default HF workload on the directly attached RX888 node
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ft8-wspr-decoder
  template:
    metadata:
      labels:
        app: ft8-wspr-decoder
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-12
      initContainers:
        - name: install-rx888-plugin
          image: registry.white.fm/soapy-rx888-server:1.0.7-amd64
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /plugins
              cp /usr/local/lib/SoapySDR/modules0.8/libSDDCSupport.so /plugins/
          volumeMounts:
            - name: soapy-plugins
              mountPath: /plugins
      containers:
        - name: ft8-wspr-decoder
          image: registry.white.fm/unified-hf-decoder
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp /app/ft8-wspr-entrypoint.py /tmp/ft8-wspr-entrypoint.py
              python3 - <<'PY'
              from pathlib import Path

              path = Path("/tmp/ft8-wspr-entrypoint.py")
              text = path.read_text()

              def replace_once(old: str, new: str) -> None:
                  global text
                  if old not in text:
                      raise SystemExit(f"missing patch target: {old[:80]!r}")
                  text = text.replace(old, new, 1)

              if 'SOAPY_DEVICE_STRING = os.getenv("SOAPY_DEVICE_STRING", "").strip()' not in text:
                  replace_once(
                      'SOAPY_DEVICE_ARGS = os.getenv("SOAPY_DEVICE_ARGS", "")\n',
                      'SOAPY_DEVICE_ARGS = os.getenv("SOAPY_DEVICE_ARGS", "")\n'
                      'SOAPY_DEVICE_STRING = os.getenv("SOAPY_DEVICE_STRING", "").strip()\n'
                      'SOAPY_GAIN = float(os.getenv("SOAPY_GAIN", "20"))\n',
                  )
              if 'FT8_CAPTURE_BACKEND = os.getenv("FT8_CAPTURE_BACKEND", "auto").strip().lower()' not in text:
                  replace_once(
                      'CAPTURE_RETRY_DELAY_SEC = float(os.getenv("CAPTURE_RETRY_DELAY_SEC", "2"))\n',
                      'CAPTURE_RETRY_DELAY_SEC = float(os.getenv("CAPTURE_RETRY_DELAY_SEC", "2"))\n'
                      'FT8_CAPTURE_BACKEND = os.getenv("FT8_CAPTURE_BACKEND", "auto").strip().lower()\n',
                  )

              replace_once(
                  'def _soapysdr_device_string() -> str:\n'
                  '    device = f"driver=remote,remote=tcp://{SOAPY_REMOTE},remote:format=CF32"\n'
                  '    if SOAPY_DEVICE_ARGS.strip():\n'
                  '        device += "," + SOAPY_DEVICE_ARGS.strip().lstrip(",")\n'
                  '    return device\n',
                  'def _soapysdr_device_string() -> str:\n'
                  '    if SOAPY_DEVICE_STRING:\n'
                  '        return SOAPY_DEVICE_STRING\n'
                  '    remote = SOAPY_REMOTE.strip()\n'
                  '    if remote.startswith("tcp://"):\n'
                  '        remote = remote[len("tcp://"):]\n'
                  '    device = f"driver=remote,remote={remote},remote:driver=SDDC,remote:format=CF32"\n'
                  '    if SOAPY_DEVICE_ARGS.strip():\n'
                  '        device += "," + SOAPY_DEVICE_ARGS.strip().lstrip(",")\n'
                  '    return device\n',
              )
              replace_once(
                  '        self.device.setGain(SoapySDR.SOAPY_SDR_RX, 0, 0)\n',
                  '        self.device.setGainMode(SoapySDR.SOAPY_SDR_RX, 0, False)\n'
                  '        self.device.setGain(SoapySDR.SOAPY_SDR_RX, 0, SOAPY_GAIN)\n',
              )
              replace_once(
                  '            "-g", "0",\n',
                  '            "-g", str(SOAPY_GAIN),\n',
              )
              replace_once(
                  'def capture_audio(freq_hz: int, duration_sec: int, wav_path: str) -> bool:\n'
                  '    if SoapySDR is None:\n',
                  'def capture_audio(freq_hz: int, duration_sec: int, wav_path: str) -> bool:\n'
                  '    if FT8_CAPTURE_BACKEND == "rx_sdr" or SoapySDR is None:\n',
              )
              replace_once(
                  '        # rx_sdr -n counts complex samples for CF32\n'
                  '        n_samples = CAPTURE_RATE * duration_sec\n'
                  '        cmd = [\n'
                  '            "rx_sdr",\n'
                  '            "-d", _soapysdr_device_string(),\n'
                  '            "-f", str(freq_hz + 1500),  # center on USB passband\n'
                  '            "-s", str(CAPTURE_RATE),\n'
                  '            "-g", str(SOAPY_GAIN),\n'
                  '            "-n", str(n_samples),\n'
                  '            "-I", "CF32",  # SDDC only supports CF32 input\n'
                  '            "-F", "CF32",\n'
                  '            raw_path,\n'
                  '        ]\n',
                  '        cmd = [\n'
                  '            "timeout",\n'
                  '            "-s", "INT",\n'
                  '            "-k", "2",\n'
                  '            str(duration_sec + 5),\n'
                  '            "rx_sdr",\n'
                  '            "-d", _soapysdr_device_string(),\n'
                  '            "-f", str(freq_hz + 1500),  # center on USB passband\n'
                  '            "-s", str(CAPTURE_RATE),\n'
                  '            "-g", str(SOAPY_GAIN),\n'
                  '            "-I", "CF32",  # SDDC only supports CF32 input\n'
                  '            "-F", "CF32",\n'
                  '            raw_path,\n'
                  '        ]\n',
              )
              replace_once(
                  '            if proc.returncode == 0:\n',
                  '            if proc.returncode in (0, 124, 130, 137) and os.path.exists(raw_path):\n',
              )
              replace_once(
                  '        if proc is None or proc.returncode != 0:\n',
                  '        if proc is None or proc.returncode not in (0, 124, 130, 137):\n',
              )
              replace_once(
                  '        audio = np.concatenate(all_audio)\n',
                  '        audio = np.concatenate(all_audio)\n'
                  '        audio = np.nan_to_num(audio, nan=0.0, posinf=0.0, neginf=0.0)\n'
                  '        target_audio_samples = duration_sec * TARGET_AUDIO_RATE\n'
                  '        if len(audio) > target_audio_samples:\n'
                  '            audio = audio[:target_audio_samples]\n'
                  '        elif len(audio) < target_audio_samples:\n'
                  '            audio = np.pad(audio, (0, target_audio_samples - len(audio)))\n',
              )
              replace_once(
                  '        self.buffer = np.empty(CAPTURE_RATE, np.complex64)\n',
                  '        self.buffer = np.empty(65536, np.complex64)\n',
              )
              replace_once(
                  '                if status.ret == SoapySDR.SOAPY_SDR_TIMEOUT and time.time() < deadline:\n'
                  '                    continue\n'
                  '\n'
                  '                raise RuntimeError(f"readStream failed: {status.ret}")\n',
                  '                if status.ret == SoapySDR.SOAPY_SDR_TIMEOUT and time.time() < deadline:\n'
                  '                    continue\n'
                  '\n'
                  '                if status.ret < 0 and time.time() < deadline:\n'
                  '                    print(f"[CAPTURE] Transient Soapy read error {status.ret}, restarting stream", flush=True)\n'
                  '                    try:\n'
                  '                        self.device.deactivateStream(self.stream)\n'
                  '                    except Exception:\n'
                  '                        pass\n'
                  '                    self._active = False\n'
                  '                    time.sleep(0.25)\n'
                  '                    self.device.activateStream(self.stream)\n'
                  '                    self._active = True\n'
                  '                    self._flush_after_retune()\n'
                  '                    continue\n'
                  '\n'
                  '                raise RuntimeError(f"readStream failed: {status.ret}")\n',
              )

              # Add shutil import for SSTV file copy, threading for HFDL
              replace_once(
                  'import wave\n',
                  'import wave\nimport shutil\nimport threading\n',
              )

              # --- SSTV capture integration ---
              # Add SSTV frequency rotation to the main loop.
              # Captures 60s WAVs on HF SSTV frequencies, saves to /data/audio/voice/
              # for the sstv-decoder pod to process.
              replace_once(
                  'STATION_GRID = os.getenv("STATION_GRID", "EM79")  # default ~Ohio/KY area\n',
                  'STATION_GRID = os.getenv("STATION_GRID", "EM79")  # default ~Ohio/KY area\n'
                  '\n'
                  '# SSTV capture — interleaved with FT8/WSPR\n'
                  'SSTV_FREQS = [int(f) for f in os.getenv("SSTV_FREQUENCIES", "").split() if f.strip()]\n'
                  'SSTV_EVERY_N = int(os.getenv("SSTV_EVERY_N", "12"))\n'
                  'SSTV_DWELL_SEC = int(os.getenv("SSTV_DWELL_SEC", "60"))\n'
                  'SSTV_OUTPUT_DIR = os.getenv("SSTV_OUTPUT_DIR", "/data/audio/voice")\n'
                  '\n'
                  '# HFDL — runs dumphfdl subprocess (releases radio during capture)\n'
                  'HFDL_ENABLED = os.getenv("HFDL_ENABLED", "false").lower() in ("true", "1", "yes")\n'
                  'HFDL_FREQS = os.getenv("HFDL_FREQUENCIES", "10081 11384").split()\n'
                  'HFDL_DWELL_SEC = int(os.getenv("HFDL_DWELL_SEC", "120"))\n'
                  'HFDL_EVERY_N = int(os.getenv("HFDL_EVERY_N", "18"))\n'
                  'HFDL_OUTPUT_DIR = os.getenv("HFDL_OUTPUT_DIR", "/data/text/hfdl")\n'
                  'HFDL_SAMPLE_RATE = os.getenv("HFDL_SAMPLE_RATE", "2000000")\n'
                  'HFDL_CENTERFREQ = os.getenv("HFDL_CENTERFREQ", "10732.5")\n'
                  'HFDL_GAIN = os.getenv("HFDL_GAIN", "20")\n',
              )
              replace_once(
                  '    ft8_idx = 0\n'
                  '    wspr_idx = 0\n'
                  '    cycle_count = 0\n',
                  '    ft8_idx = 0\n'
                  '    wspr_idx = 0\n'
                  '    sstv_idx = 0\n'
                  '    cycle_count = 0\n',
              )
              replace_once(
                  '                # Decide: FT8 or WSPR this cycle\n'
                  '                do_wspr = (cycle_count > 0 and cycle_count % WSPR_EVERY_N == 0\n'
                  '                           and len(WSPR_FREQS) > 0)\n'
                  '\n'
                  '                if do_wspr:\n',
                  '                # Decide: FT8, WSPR, SSTV, or HFDL this cycle\n'
                  '                do_wspr = (cycle_count > 0 and cycle_count % WSPR_EVERY_N == 0\n'
                  '                           and len(WSPR_FREQS) > 0)\n'
                  '                do_sstv = (not do_wspr and cycle_count > 0\n'
                  '                           and cycle_count % SSTV_EVERY_N == 0\n'
                  '                           and len(SSTV_FREQS) > 0)\n'
                  '                do_hfdl = (not do_wspr and not do_sstv and cycle_count > 0\n'
                  '                           and cycle_count % HFDL_EVERY_N == 0\n'
                  '                           and HFDL_ENABLED and len(HFDL_FREQS) > 0)\n'
                  '\n'
                  '                if do_hfdl:\n'
                  '                    # Release radio, run dumphfdl subprocess\n'
                  '                    _close_capture_session()\n'
                  '                    os.makedirs(HFDL_OUTPUT_DIR, exist_ok=True)\n'
                  '                    hfdl_cmd = [\n'
                  '                        "dumphfdl",\n'
                  '                        "--soapysdr", _soapysdr_device_string(),\n'
                  '                        "--sample-rate", HFDL_SAMPLE_RATE,\n'
                  '                        "--gain", HFDL_GAIN,\n'
                  '                    ]\n'
                  '                    if HFDL_CENTERFREQ:\n'
                  '                        hfdl_cmd += ["--centerfreq", HFDL_CENTERFREQ]\n'
                  '                    hfdl_cmd += ["--output", "decoded:json:file:path=-"] + HFDL_FREQS\n'
                  '                    print(f"[HFDL] Running dumphfdl for {HFDL_DWELL_SEC}s on {HFDL_FREQS}",\n'
                  '                          flush=True)\n'
                  '                    try:\n'
                  '                        hfdl_proc = subprocess.Popen(\n'
                  '                            hfdl_cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE,\n'
                  '                            text=True, bufsize=1)\n'
                  '                        hfdl_end = time.time() + HFDL_DWELL_SEC\n'
                  '                        hfdl_frames = 0\n'
                  '                        while time.time() < hfdl_end and not SHUTDOWN:\n'
                  '                            import select\n'
                  '                            if select.select([hfdl_proc.stdout], [], [], 1.0)[0]:\n'
                  '                                line = hfdl_proc.stdout.readline().strip()\n'
                  '                                if not line:\n'
                  '                                    if hfdl_proc.poll() is not None:\n'
                  '                                        break\n'
                  '                                    continue\n'
                  '                                try:\n'
                  '                                    frame = json.loads(line)\n'
                  '                                    t = frame.get("t", {})\n'
                  '                                    freq_k = int(frame.get("freq", 0))\n'
                  '                                    ts_sec = t.get("sec", int(time.time()))\n'
                  '                                    ts_ms = ts_sec * 1000 + (t.get("usec", 0) // 1000)\n'
                  '                                    fname = f"hfdl_{freq_k}_{ts_ms}.json"\n'
                  '                                    with open(os.path.join(HFDL_OUTPUT_DIR, fname), "w") as hf:\n'
                  '                                        json.dump(frame, hf)\n'
                  '                                    hfdl_frames += 1\n'
                  '                                    print(f"[HFDL] {fname}", flush=True)\n'
                  '                                except Exception as he:\n'
                  '                                    print(f"[HFDL] Parse error: {he}", flush=True)\n'
                  '                        hfdl_proc.terminate()\n'
                  '                        hfdl_proc.wait(timeout=5)\n'
                  '                        print(f"[HFDL] Done — {hfdl_frames} frames decoded", flush=True)\n'
                  '                    except FileNotFoundError:\n'
                  '                        print("[HFDL] dumphfdl not found — skipping (rebuild image with Dockerfile.unified-hf)",\n'
                  '                              flush=True)\n'
                  '                    except Exception as he:\n'
                  '                        print(f"[HFDL] Error: {he}", flush=True)\n'
                  '                    cycle_count += 1\n'
                  '                    continue\n'
                  '\n'
                  '                if do_sstv:\n'
                  '                    freq = SSTV_FREQS[sstv_idx % len(SSTV_FREQS)]\n'
                  '                    sstv_idx += 1\n'
                  '                    mode = "sstv"\n'
                  '                    duration = SSTV_DWELL_SEC\n'
                  '                    print(f"[SSTV] Capturing {freq} Hz ({freq_to_band(freq)}) for {duration}s…",\n'
                  '                          flush=True)\n'
                  '                elif do_wspr:\n',
              )
              replace_once(
                  '                # Decode\n'
                  '                if mode == "wspr":\n'
                  '                    spots = decode_wspr(wav_path, freq)\n'
                  '                else:\n'
                  '                    spots = decode_ft8(wav_path, freq)\n',
                  '                # Decode\n'
                  '                if mode == "sstv":\n'
                  '                    # Save WAV for sstv-decoder; use voice dir naming convention\n'
                  '                    os.makedirs(SSTV_OUTPUT_DIR, exist_ok=True)\n'
                  '                    dst = os.path.join(SSTV_OUTPUT_DIR, f"{freq}_{int(time.time())}.wav")\n'
                  '                    shutil.copy2(wav_path, dst)\n'
                  '                    print(f"[SSTV] Saved {os.path.basename(dst)} for decode", flush=True)\n'
                  '                    spots = []\n'
                  '                elif mode == "wspr":\n'
                  '                    spots = decode_wspr(wav_path, freq)\n'
                  '                else:\n'
                  '                    spots = decode_ft8(wav_path, freq)\n',
              )

              path.write_text(text)
              PY
              exec python3 /tmp/ft8-wspr-entrypoint.py
          env:
            - name: SOAPY_REMOTE
              value: "rx888-soapy.sdr-research.svc.cluster.local:55132"
            - name: SOAPY_DEVICE_STRING
              value: "driver=SDDC"
            - name: SOAPY_SDR_PLUGIN_PATH
              value: "/opt/soapy-modules"
            - name: SOAPY_GAIN
              value: "20"
            - name: FT8_CAPTURE_BACKEND
              value: "auto"
            - name: FT8_OUTPUT_DIR
              value: "/data/text/ft8"
            # Standard FT8 dial frequencies (Hz) — most active HF bands
            - name: FT8_FREQUENCIES
              value: "3573000 7074000 10136000 14074000 18100000 21074000 24915000 28074000"
            # WSPR beacon frequencies (Hz)
            - name: WSPR_FREQUENCIES
              value: "7038600 10138700 14095600 21094600 28124600"
            # Capture one WSPR window (2 min) every N FT8 cycles
            - name: WSPR_EVERY_N
              value: "6"
            # HF SSTV calling frequencies (Hz) — captured and saved for sstv-decoder
            - name: SSTV_FREQUENCIES
              value: "14230000 21340000 28680000 7171000"
            # Capture SSTV every N FT8 cycles (interleaved with WSPR)
            - name: SSTV_EVERY_N
              value: "12"
            - name: SSTV_DWELL_SEC
              value: "60"
            # HFDL — run dumphfdl periodically (releases radio, runs subprocess)
            - name: HFDL_ENABLED
              value: "true"
            - name: HFDL_OUTPUT_DIR
              value: "/data/text/hfdl"
            # dumphfdl expects kHz, not Hz
            - name: HFDL_FREQUENCIES
              value: "10081 11384"
            - name: HFDL_DWELL_SEC
              value: "120"
            - name: HFDL_EVERY_N
              value: "18"
            - name: HFDL_SAMPLE_RATE
              value: "2000000"
            - name: HFDL_CENTERFREQ
              value: "10732.5"
            - name: HFDL_GAIN
              value: "20"
            # Station Maidenhead grid (for distance calculations)
            - name: STATION_GRID
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: station-grid
                  optional: true
            - name: CAPTURE_SAMPLE_RATE
              # RX888 MkII minimum supported rate; decimated to 12 kHz in software
              value: "2000000"
            - name: DECODE_DEPTH
              value: "3"
          volumeMounts:
            - name: sdr-artifacts
              mountPath: /data
            - name: soapy-plugins
              mountPath: /opt/soapy-modules
            - name: usb
              mountPath: /dev/bus/usb
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "tr '\\000' ' ' </proc/1/cmdline | grep -q ft8-wspr-entrypoint"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "tr '\\000' ' ' </proc/1/cmdline | grep -q ft8-wspr-entrypoint"
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 3000m
              # 2 MSPS * 15s * 8 bytes = 240 MB raw + scipy decimation overhead
              memory: 2Gi
      volumes:
        - name: sdr-artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: soapy-plugins
          emptyDir: {}
        - name: usb
          hostPath:
            path: /dev/bus/usb
