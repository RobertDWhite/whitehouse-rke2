# FT8/WSPR decoder — captures HF audio via SoapyRemote from RX888 MkII,
# decodes FT8/FT4/WSPR digital modes using jt9 + wsprd (WSJT-X),
# writes one JSON file per decoded spot to /data/text/ft8/.
# The API indexer picks these up and inserts into the spots table.
#
# IMPORTANT: The RX888 SoapyRemote server only serves one client at a time.
# Scale openwebrxplus AND hfdl-decoder to 0 while running this decoder.
#   kubectl scale deploy openwebrxplus -n sdr-research --replicas=0
#   kubectl scale deploy hfdl-decoder  -n sdr-research --replicas=0
#   kubectl scale deploy ft8-wspr-decoder -n sdr-research --replicas=1
#
# Build the image first:
#   docker buildx build --platform linux/amd64,linux/arm64 --push \
#     -t registry.white.fm/ft8-wspr-decoder:1.0.8 \
#     -f sdr-research/Dockerfile.ft8-wspr sdr-research/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ft8-wspr-decoder
  namespace: sdr-research
spec:
  replicas: 1   # default HF workload on the directly attached RX888 node
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ft8-wspr-decoder
  template:
    metadata:
      labels:
        app: ft8-wspr-decoder
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-12
      initContainers:
        - name: install-rx888-plugin
          image: registry.white.fm/soapy-rx888-server:1.0.5-amd64
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /plugins
              cp /usr/local/lib/SoapySDR/modules0.8/libSDDCSupport.so /plugins/
          volumeMounts:
            - name: soapy-plugins
              mountPath: /plugins
      containers:
        - name: ft8-wspr-decoder
          image: registry.white.fm/ft8-wspr-decoder:1.0.8
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp /app/ft8-wspr-entrypoint.py /tmp/ft8-wspr-entrypoint.py
              python3 - <<'PY'
              from pathlib import Path

              path = Path("/tmp/ft8-wspr-entrypoint.py")
              text = path.read_text()

              def replace_once(old: str, new: str) -> None:
                  global text
                  if old not in text:
                      raise SystemExit(f"missing patch target: {old[:80]!r}")
                  text = text.replace(old, new, 1)

              if 'SOAPY_DEVICE_STRING = os.getenv("SOAPY_DEVICE_STRING", "").strip()' not in text:
                  replace_once(
                      'SOAPY_DEVICE_ARGS = os.getenv("SOAPY_DEVICE_ARGS", "")\n',
                      'SOAPY_DEVICE_ARGS = os.getenv("SOAPY_DEVICE_ARGS", "")\n'
                      'SOAPY_DEVICE_STRING = os.getenv("SOAPY_DEVICE_STRING", "").strip()\n'
                      'SOAPY_GAIN = float(os.getenv("SOAPY_GAIN", "20"))\n',
                  )

              replace_once(
                  'def _soapysdr_device_string() -> str:\n'
                  '    device = f"driver=remote,remote=tcp://{SOAPY_REMOTE},remote:format=CF32"\n'
                  '    if SOAPY_DEVICE_ARGS.strip():\n'
                  '        device += "," + SOAPY_DEVICE_ARGS.strip().lstrip(",")\n'
                  '    return device\n',
                  'def _soapysdr_device_string() -> str:\n'
                  '    if SOAPY_DEVICE_STRING:\n'
                  '        return SOAPY_DEVICE_STRING\n'
                  '    remote = SOAPY_REMOTE.strip()\n'
                  '    if remote.startswith("tcp://"):\n'
                  '        remote = remote[len("tcp://"):]\n'
                  '    device = f"driver=remote,remote={remote},remote:driver=SDDC,remote:format=CF32"\n'
                  '    if SOAPY_DEVICE_ARGS.strip():\n'
                  '        device += "," + SOAPY_DEVICE_ARGS.strip().lstrip(",")\n'
                  '    return device\n',
              )
              replace_once(
                  '        self.device.setGain(SoapySDR.SOAPY_SDR_RX, 0, 0)\n',
                  '        self.device.setGain(SoapySDR.SOAPY_SDR_RX, 0, SOAPY_GAIN)\n',
              )
              replace_once(
                  '            "-g", "0",\n',
                  '            "-g", str(SOAPY_GAIN),\n',
              )

              path.write_text(text)
              PY
              exec python3 /tmp/ft8-wspr-entrypoint.py
          env:
            - name: SOAPY_REMOTE
              value: "rx888-soapy.sdr-research.svc.cluster.local:55132"
            - name: SOAPY_DEVICE_STRING
              value: "driver=SDDC"
            - name: SOAPY_SDR_PLUGIN_PATH
              value: "/opt/soapy-modules"
            - name: SOAPY_GAIN
              value: "20"
            - name: FT8_OUTPUT_DIR
              value: "/data/text/ft8"
            # Standard FT8 dial frequencies (Hz) — most active HF bands
            - name: FT8_FREQUENCIES
              value: "3573000 7074000 10136000 14074000 18100000 21074000 24915000 28074000"
            # WSPR beacon frequencies (Hz)
            - name: WSPR_FREQUENCIES
              value: "7038600 10138700 14095600 21094600 28124600"
            # Capture one WSPR window (2 min) every N FT8 cycles
            - name: WSPR_EVERY_N
              value: "6"
            # Station Maidenhead grid (for distance calculations)
            - name: STATION_GRID
              valueFrom:
                secretKeyRef:
                  name: sdr-viewer-secrets
                  key: station-grid
                  optional: true
            - name: CAPTURE_SAMPLE_RATE
              # RX888 MkII minimum supported rate; decimated to 12 kHz in software
              value: "2000000"
            - name: DECODE_DEPTH
              value: "3"
          volumeMounts:
            - name: sdr-artifacts
              mountPath: /data
            - name: soapy-plugins
              mountPath: /opt/soapy-modules
            - name: usb
              mountPath: /dev/bus/usb
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "tr '\\000' ' ' </proc/1/cmdline | grep -q ft8-wspr-entrypoint"
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import os, sys, SoapySDR
                  args = os.environ.get("SOAPY_DEVICE_STRING", "driver=SDDC")
                  sys.exit(0 if SoapySDR.Device.enumerate(args) else 1)
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 3000m
              # 2 MSPS * 15s * 8 bytes = 240 MB raw + scipy decimation overhead
              memory: 2Gi
      volumes:
        - name: sdr-artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: soapy-plugins
          emptyDir: {}
        - name: usb
          hostPath:
            path: /dev/bus/usb
