# Combined HF decoder — time-shares the RX888 on rke2-node-12 between HFDL
# and SSTV, with rx888-soapy available as a fallback if needed.
# Alternates: HFDL dwell (dumphfdl, 5 min) → SSTV dwell (slowrx-cli, 2 min/freq) → repeat.
#
# Replaces running 55-hfdl-decoder and 57-sstv-hf-decoder as separate pods.
#
# IMPORTANT: Scale other RX888 consumers to 0 while this pod is running.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hf-combined-decoder
  namespace: sdr-research
spec:
  replicas: 1   # shares the same RX888 with ft8-wspr — can't run simultaneously
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hf-combined-decoder
  template:
    metadata:
      labels:
        app: hf-combined-decoder
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-12
      initContainers:
        - name: install-rx888-plugin
          image: registry.white.fm/soapy-rx888-server:1.0.5-amd64
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /plugins
              cp /usr/local/lib/SoapySDR/modules0.8/libSDDCSupport.so /plugins/
          volumeMounts:
            - name: soapy-plugins
              mountPath: /plugins
      containers:
        - name: hf-combined-decoder
          image: registry.white.fm/hf-combined-decoder
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp /hf-combined-entrypoint.py /tmp/hf-combined-entrypoint.py
              python3 - <<'PY'
              from pathlib import Path

              path = Path("/tmp/hf-combined-entrypoint.py")
              text = path.read_text()

              def replace_once(old: str, new: str) -> None:
                  global text
                  if old not in text:
                      raise SystemExit(f"missing patch target: {old[:80]!r}")
                  text = text.replace(old, new, 1)

              replace_once(
                  'HFDL_DWELL_SEC = int(os.getenv("HFDL_DWELL_SEC", "300"))  # 5 min default\n',
                  'HFDL_DWELL_SEC = int(os.getenv("HFDL_DWELL_SEC", "300"))  # 5 min default\n'
                  'HFDL_SAMPLE_RATE = int(os.getenv("HFDL_SAMPLE_RATE", "8000000"))\n'
                  'HFDL_CENTERFREQ = os.getenv("HFDL_CENTERFREQ", "").strip()\n'
                  'HFDL_GAIN = float(os.getenv("HFDL_GAIN", "20"))\n',
              )
              replace_once(
                  '    cmd = [\n'
                  '        "dumphfdl",\n'
                  '        "--soapysdr", _soapysdr_device_string(),\n'
                  '        "--output", "decoded:json:file:path=-",\n'
                  '    ] + HFDL_FREQUENCIES\n',
                  '    cmd = [\n'
                  '        "dumphfdl",\n'
                  '        "--soapysdr", _soapysdr_device_string(),\n'
                  '        "--sample-rate", str(HFDL_SAMPLE_RATE),\n'
                  '        "--gain", str(HFDL_GAIN),\n'
                  '    ]\n'
                  '    if HFDL_CENTERFREQ:\n'
                  '        cmd += ["--centerfreq", HFDL_CENTERFREQ]\n'
                  '    cmd += [\n'
                  '        "--output", "decoded:json:file:path=-",\n'
                  '    ] + HFDL_FREQUENCIES\n',
              )

              path.write_text(text)
              PY
              exec python3 /tmp/hf-combined-entrypoint.py
          env:
            # Shared
            - name: SOAPY_REMOTE
              value: "rx888-soapy.sdr-research.svc.cluster.local:55132"
            - name: SOAPY_DEVICE_STRING
              value: "driver=SDDC"
            - name: SOAPY_SDR_PLUGIN_PATH
              value: "/opt/soapy-modules"
            # HFDL
            - name: HFDL_OUTPUT_DIR
              value: "/data/text/hfdl"
            - name: HFDL_FREQUENCIES
              # New York + San Francisco HFDL ground stations (kHz — dumphfdl expects kHz)
              value: "8912 8927 10081 11384 13303"
            - name: HFDL_DWELL_SEC
              value: "300"
            - name: HFDL_SAMPLE_RATE
              value: "8000000"
            - name: HFDL_CENTERFREQ
              value: "11107.5"
            - name: HFDL_GAIN
              value: "20"
            # SSTV
            - name: SDL_VIDEODRIVER
              value: "offscreen"
            - name: SDL_AUDIODRIVER
              value: "dummy"
            - name: SSTV_OUTPUT_DIR
              value: "/data/images/sstv"
            - name: HF_SSTV_FREQS
              value: "14230000,21340000,28680000,7171000"
            - name: HF_SAMPLE_RATE
              value: "2048000"
            - name: HF_AUDIO_RATE
              value: "16000"
            - name: HF_DWELL_SEC
              # Per-frequency dwell — longest SSTV mode (Scottie DX) ~270s;
              # 120s catches most common modes (Robot 36 = 36s, Scottie 1 = 110s)
              value: "120"
            - name: HF_GAIN
              value: "20"
          volumeMounts:
            - name: sdr-artifacts
              mountPath: /data
            - name: soapy-plugins
              mountPath: /opt/soapy-modules
            - name: usb
              mountPath: /dev/bus/usb
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        - name: sdr-artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: soapy-plugins
          emptyDir: {}
        - name: usb
          hostPath:
            path: /dev/bus/usb
