# Combined HF decoder — time-shares the RX888 on rke2-node-12 between HFDL
# and SSTV, with rx888-soapy available as a fallback if needed.
# Alternates: HFDL dwell (dumphfdl, 5 min) → SSTV dwell (slowrx-cli, 2 min/freq) → repeat.
#
# Replaces running 55-hfdl-decoder and 57-sstv-hf-decoder as separate pods.
#
# IMPORTANT: Scale other RX888 consumers to 0 while this pod is running.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hf-combined-decoder
  namespace: sdr-research
spec:
  replicas: 0   # shares the same RX888 with ft8-wspr — can't run simultaneously
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hf-combined-decoder
  template:
    metadata:
      labels:
        app: hf-combined-decoder
    spec:
      nodeSelector:
        kubernetes.io/hostname: rke2-node-12
      containers:
        - name: hf-combined-decoder
          image: registry.white.fm/hf-combined-decoder
          securityContext:
            allowPrivilegeEscalation: false
          env:
            # Shared
            - name: SOAPY_REMOTE
              value: "rx888-soapy.sdr-research.svc.cluster.local:55132"
            - name: SOAPY_DEVICE_STRING
              value: "driver=SDDC"
            # HFDL
            - name: HFDL_OUTPUT_DIR
              value: "/data/text/hfdl"
            - name: HFDL_FREQUENCIES
              # New York + San Francisco HFDL ground stations (kHz — dumphfdl expects kHz)
              value: "8912 8927 10081 11384 13303"
            - name: HFDL_DWELL_SEC
              value: "300"
            # SSTV
            - name: SDL_VIDEODRIVER
              value: "offscreen"
            - name: SDL_AUDIODRIVER
              value: "dummy"
            - name: SSTV_OUTPUT_DIR
              value: "/data/images/sstv"
            - name: HF_SSTV_FREQS
              value: "14230000,21340000,28680000,7171000"
            - name: HF_SAMPLE_RATE
              value: "2048000"
            - name: HF_AUDIO_RATE
              value: "16000"
            - name: HF_DWELL_SEC
              # Per-frequency dwell — longest SSTV mode (Scottie DX) ~270s;
              # 120s catches most common modes (Robot 36 = 36s, Scottie 1 = 110s)
              value: "120"
            - name: HF_GAIN
              value: "20"
          volumeMounts:
            - name: sdr-artifacts
              mountPath: /data
            - name: usb
              mountPath: /dev/bus/usb
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        - name: sdr-artifacts
          persistentVolumeClaim:
            claimName: sdr-artifacts-rwx
        - name: usb
          hostPath:
            path: /dev/bus/usb
