apiVersion: v1
kind: ServiceAccount
metadata:
  name: sdr-watchdog
  namespace: sdr-research
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sdr-watchdog
  namespace: sdr-research
rules:
  # Read deployments + daemonsets to verify desired replica counts.
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Patch deployments only — that's how rollout restart works.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch", "update"]
  # Read pod state for diagnostics.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  # Read/write the watchdog's own state ConfigMap.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sdr-watchdog
  namespace: sdr-research
subjects:
  - kind: ServiceAccount
    name: sdr-watchdog
    namespace: sdr-research
roleRef:
  kind: Role
  name: sdr-watchdog
  apiGroup: rbac.authorization.k8s.io
