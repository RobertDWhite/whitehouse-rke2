apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-bench-exporter
  namespace: kube-bench
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kube-bench-exporter
  template:
    metadata:
      labels:
        app: kube-bench-exporter
    spec:
      containers:
        - name: exporter
          image: python:3.13-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          command: ["python3", "-u", "/scripts/exporter.py"]
          ports:
            - name: metrics
              containerPort: 9100
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: results
              mountPath: /results
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: kube-bench-results
        - name: scripts
          configMap:
            name: kube-bench-exporter
            defaultMode: 0755
