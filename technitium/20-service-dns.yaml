apiVersion: v1
kind: Service
metadata:
  name: technitium-dns
  namespace: technitium
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.99.5.50
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: technitium
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
---
# Secondary VIP — backs any healthy technitium pod.

apiVersion: v1
kind: Service
metadata:
  name: technitium-dns-secondary
  namespace: technitium
  annotations:
    metallb.universe.tf/loadBalancerIPs: 10.99.5.51
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: technitium
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
