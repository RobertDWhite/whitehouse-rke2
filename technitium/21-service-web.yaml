apiVersion: v1
kind: Service
metadata:
  name: technitium-web
  namespace: technitium
spec:
  type: ClusterIP
  # Technitium sessions are in-memory per pod — without affinity,
  # round-robined requests bounce between pods and the session cookie
  # is rejected (login redirect loop).
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app: technitium
  ports:
    - name: http
      port: 5380
      protocol: TCP
      targetPort: 5380
