apiVersion: v1
kind: Secret
metadata:
  name: technitium-credentials
  namespace: technitium
type: Opaque
stringData:
  # Admin password Technitium rotates to on first sync run.
  # Local-fallback credential — used via port-forward when Authentik is down.
  admin-password: "REPLACE_ME_TECHNITIUM_ADMIN_PASSWORD"

  # Pi-hole web UI password (same one external-dns uses against pihole-credentials).
  # Used by bin/pull-from-pihole.py when re-seeding zones.
  pihole-password: "REPLACE_ME_PIHOLE_PASSWORD"

  # Authentik OIDC client credentials. Set via /api/admin/sso/set after
  # the OAuth2 provider is created in Authentik. See bin/setup-authentik-sso.md.
  sso-authority: "https://auth.white.fm/application/o/technitium-sso/"
  sso-client-id: "REPLACE_ME_AUTHENTIK_CLIENT_ID"
  sso-client-secret: "REPLACE_ME_AUTHENTIK_CLIENT_SECRET"
