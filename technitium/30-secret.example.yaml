apiVersion: v1
kind: Secret
metadata:
  name: technitium-credentials
  namespace: technitium
type: Opaque
stringData:
  # Admin password Technitium will rotate to on first sync run.
  # Pick something strong; the StatefulSet exports this as DNS_SERVER_ADMIN_PASSWORD too.
  admin-password: "REPLACE_ME_TECHNITIUM_ADMIN_PASSWORD"

  # Pi-hole web UI password (same one external-dns uses against pihole-credentials).
  # Reused so the sync CronJob can hit the Pi-hole v6 API.
  pihole-password: "REPLACE_ME_PIHOLE_PASSWORD"
