apiVersion: v1
kind: Service
metadata:
  name: dnscrypt-proxy
  namespace: technitium
spec:
  type: ClusterIP
  # Pinned ClusterIP so the Technitium forwarder can use a stable address
  # without depending on cluster DNS (Technitium would otherwise need its
  # own forwarder to resolve this name — the very chicken-and-egg loop).
  clusterIP: 10.43.6.253
  selector:
    app: dnscrypt-proxy
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
