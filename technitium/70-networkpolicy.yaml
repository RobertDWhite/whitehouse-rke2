# technitium namespace — deny-by-default + narrow allows
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: technitium
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# intra-namespace traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: technitium
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress: [{from: [{podSelector: {}}]}]
  egress:  [{to:   [{podSelector: {}}]}]
---
# egress to CoreDNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-coredns
  namespace: technitium
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}}]
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
# egress to kube-apiserver
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-kube-apiserver
  namespace: technitium
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to: [{ipBlock: {cidr: 10.99.5.50/32}}]
      ports: [{protocol: TCP, port: 6443}]
    - to: [{ipBlock: {cidr: 10.43.0.1/32}}]
      ports: [{protocol: TCP, port: 443}]
---
# egress to authentik (OIDC) and envoy gateway pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-authentik
  namespace: technitium
spec:
  podSelector: {matchLabels: {app: technitium}}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: authentik}}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
              app.kubernetes.io/component: server
      ports:
        - {protocol: TCP, port: 80}
        - {protocol: TCP, port: 9443}
    - to:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: envoy-gateway-system}}
          podSelector: {matchLabels: {app.kubernetes.io/name: envoy}}
      ports:
        - {protocol: TCP, port: 10080}
        - {protocol: TCP, port: 10443}
---
# egress: dnscrypt-proxy → vpn-proxy only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dnscrypt-to-vpn-proxy
  namespace: technitium
spec:
  podSelector: {matchLabels: {app: dnscrypt-proxy}}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: media}}
          podSelector: {matchLabels: {app: vpn-proxy}}
      ports: [{protocol: TCP, port: 1080}]
---
# ingress to DNS (any cluster pod, LAN clients, post-SNAT pod CIDR)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-dns
  namespace: technitium
spec:
  podSelector: {matchLabels: {app: technitium}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {}
        - ipBlock: {cidr: 10.99.5.0/24}
        - ipBlock: {cidr: 10.42.0.0/16}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
        - {protocol: TCP, port: 443}
        - {protocol: TCP, port: 853}
---
# ingress: envoy gateway → web UI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-envoy
  namespace: technitium
spec:
  podSelector: {matchLabels: {app: technitium}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: envoy-gateway-system}}
      ports: [{protocol: TCP, port: 5380}]
---
# ingress: authentik → web UI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-authentik
  namespace: technitium
spec:
  podSelector: {matchLabels: {app: technitium}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: authentik}}
      ports: [{protocol: TCP, port: 5380}]
---
# ingress: prometheus scrape → metrics-exporter
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: technitium
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: observability}}
          podSelector: {matchLabels: {app: prometheus}}
      ports: [{protocol: TCP, port: 9180}]
---
# ingress: uptime-kuma probes
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-uptime-kuma
  namespace: technitium
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: uptime-kuma}}
