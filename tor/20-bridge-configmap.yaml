apiVersion: v1
kind: ConfigMap
metadata:
  name: bridge-torrc
  namespace: tor
data:
  torrc: |
    # whitehouse-rke2 obfs4 bridge
    # Non-exit, unpublished bridge — IP distributed via BridgeDB only.

    Nickname whitehouseBridge
    BridgeRelay 1
    ExitRelay 0
    PublishServerDescriptor bridge

    # Identity / data — backed by the PVC mounted at /var/lib/tor.
    DataDirectory /var/lib/tor

    # ORPort: where other Tor nodes reach this bridge. Advertised IP
    # is the LoadBalancer external IP; the listener binds inside the pod.
    # AssumeReachable lets the bridge start before it self-confirms reachability.
    ORPort 9001

    # obfs4 pluggable transport — lyrebird runs standalone (not as a managed
    # proxy) to avoid the PT proxy negotiation deadlock. See entrypoint in
    # 21-bridge-statefulset.yaml. ExtORPort is fixed so lyrebird can connect
    # without needing the auth cookie at startup.
    ExtORPort 9100

    # Log to file so the image's get-bridge-line helper can extract the cert.
    Log notice file /var/log/tor/log

    # Prometheus metrics. Bind 0.0.0.0 so the in-cluster prometheus can reach
    # it; MetricsPortPolicy restricts which source IPs may scrape.
    MetricsPort 0.0.0.0:9035 prometheus
    MetricsPortPolicy accept 10.0.0.0/8
    MetricsPortPolicy accept 127.0.0.1
    MetricsPortPolicy reject *

    # Bandwidth caps. The home WAN is 3 Gbps symmetric; 800 Mbps
    # sustained / 1.6 Gbps burst is a meaningful donation while still
    # leaving plenty of headroom for everything else on the network.
    RelayBandwidthRate 100 MBytes
    RelayBandwidthBurst 200 MBytes

    # Tor sizes MaxMemInQueues from detected *system* memory (the node, ~8GB)
    # not the cgroup limit, so without this it blows past the container
    # memory limit and the kernel OOM-kills it mid-bootstrap (exit 137).
    # Keep this comfortably below the container memory limit — lzma
    # decompression of the directory consensus alone uses ~1.5GB.
    MaxMemInQueues 1024 MB

    # Route Tor's outbound through the cluster VPN proxy to bypass the
    # router's threat-intel blocklist which blocks known Tor relay IPs.
    # socks5-proxy.pl (started in entrypoint) bridges local SOCKS5→HTTP CONNECT.
    # Using SOCKS5 (not HTTPSProxy) so TOR_PT_PROXY=socks5://... is set for
    # lyrebird — socks5 is a proxy type lyrebird accepts, so it sends PROXY DONE.
    Socks5Proxy 127.0.0.1:19150

    # Logging — stdout so kubectl logs works.
    Log notice stdout

    # ContactInfo is injected from the SOPS secret as an env var and
    # appended via the entrypoint (see 21-bridge-statefulset.yaml).
  lyrebird-start.sh: |
    #!/bin/sh
    # Start lyrebird standalone (not via Tor managed proxy) so it bypasses
    # the PT proxy negotiation protocol entirely.
    export TOR_PT_SERVER_TRANSPORTS=obfs4
    export TOR_PT_SERVER_BINDADDR=obfs4-0.0.0.0:9443
    export TOR_PT_STATE_LOCATION=/var/lib/tor/pt_state
    export TOR_PT_MANAGED_TRANSPORT_VER=1
    export TOR_PT_EXTENDED_SERVER_PORT=127.0.0.1:9100
    export TOR_PT_AUTH_COOKIE_FILE=/var/lib/tor/extended_orport_auth_cookie
    export TOR_PT_EXIT_ON_STDIN_CLOSE=0
    exec /usr/bin/lyrebird
  socks5-proxy.pl: |
    #!/usr/bin/perl -w
    # Minimal SOCKS5 → HTTP CONNECT bridge.
    # Listens on 127.0.0.1:19150, proxies through gluetun HTTP CONNECT on :8888.
    use strict;
    use IO::Socket::INET;
    use IO::Select;
    use POSIX qw(WNOHANG);
    my($LP,$UH,$UP)=(19150,'vpn-proxy.media.svc.cluster.local',8888);
    $SIG{CHLD}=sub{while(waitpid(-1,WNOHANG)>0){}};
    $SIG{PIPE}='IGNORE';
    my $srv=IO::Socket::INET->new(LocalHost=>'127.0.0.1',LocalPort=>$LP,
      Listen=>128,ReuseAddr=>1,Timeout=>0) or die "listen: $!";
    while(1){
      my $c=$srv->accept or next;
      defined(my $p=fork) or next;
      if($p){$c->close;next}
      $srv->close;
      # SOCKS5 greeting
      read($c,my$b,2);my($v,$n)=unpack('CC',$b);
      read($c,my$m,$n);
      print $c pack('CC',5,0);      # no-auth
      # SOCKS5 request
      read($c,my$h,4);my($v2,$cmd,$r,$at)=unpack('CCCC',$h);
      my $host;
      if($at==1){read($c,my$i,4);$host=join('.',unpack('CCCC',$i))}
      elsif($at==3){read($c,my$l,1);$l=unpack('C',$l);read($c,$host,$l)}
      elsif($at==4){read($c,my$i,16);$host='['.join(':',unpack('(H4)8',$i)).']'}
      read($c,my$pb,2);my$port=unpack('n',$pb);
      my $u=IO::Socket::INET->new(PeerHost=>$UH,PeerPort=>$UP,Timeout=>15)
        or do{print $c pack('CCCCNCC',5,5,0,1,0,0,0);exit};
      print $u "CONNECT $host:$port HTTP/1.1\r\nHost: $host:$port\r\n\r\n";
      my$rsp='';while(sysread($u,my$b,1)){$rsp.=$b;last if $rsp=~/\r\n\r\n/}
      unless($rsp=~/2\d\d/){print $c pack('CCCCNCC',5,5,0,1,0,0,0);exit}
      print $c pack('CCCCNCC',5,0,0,1,0,0,0);
      my$sel=IO::Select->new($c,$u);
      while(my@r=$sel->can_read(300)){
        for my$fh(@r){
          my$o=($fh==$c)?$u:$c;
          my$n=sysread($fh,my$d,65536);
          last unless $n;syswrite($o,$d);
        }
      }
      exit;
    }
