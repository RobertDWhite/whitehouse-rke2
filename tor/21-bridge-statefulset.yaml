apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: obfs4-bridge
  namespace: tor
  labels:
    app: obfs4-bridge
spec:
  serviceName: obfs4-bridge-metrics
  replicas: 1
  selector:
    matchLabels:
      app: obfs4-bridge
  template:
    metadata:
      labels:
        app: obfs4-bridge
    spec:
      securityContext:
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      # Transient (RTX 5090 box)
                      - rke2-node-50
                      # Kubelet/containerd stuck-name bug — see
                      # 9fcdad68 sdr-research api/ui anti-affinity
                      - rke2-node-13
                      - rke2-node-14
      initContainers:
        # fsGroup only chowns the group; tor checks owning user as well.
        # Force uid:gid 101:101 on the PVC root so tor can write DataDirectory.
        - name: chown-data
          image: busybox:1.37
          command: ["sh", "-c", "chown -R 101:101 /var/lib/tor"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/tor
      containers:
        - name: tor
          image: thetorproject/obfs4-bridge:0.24
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          # Render the final torrc by appending ContactInfo + AddressDisableIPv6
          # from the secret-mounted env, then exec tor.
          args:
            - |
              set -eu
              mkdir -p /var/log/tor
              cp /etc/torrc.d/torrc /tmp/torrc
              echo "ContactInfo ${CONTACT_INFO}" >> /tmp/torrc
              # Advertise the LoadBalancer public IP to BridgeDB.
              if [ -n "${ADDRESS:-}" ]; then
                echo "Address ${ADDRESS}" >> /tmp/torrc
              fi
              exec tor -f /tmp/torrc
          env:
            - name: CONTACT_INFO
              valueFrom:
                secretKeyRef:
                  name: bridge-contact
                  key: contact-info
            - name: ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bridge-contact
                  key: address
                  optional: true
          ports:
            - name: orport
              containerPort: 9001
              protocol: TCP
            - name: obfs4
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 9035
              protocol: TCP
          volumeMounts:
            - name: torrc
              mountPath: /etc/torrc.d
              readOnly: true
            - name: data
              mountPath: /var/lib/tor
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: torrc
          configMap:
            name: bridge-torrc
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 1Gi
