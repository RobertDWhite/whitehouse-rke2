apiVersion: v1
kind: Service
metadata:
  name: obfs4-bridge-public
  namespace: tor
  labels:
    app: obfs4-bridge
  annotations:
    # MetalLB will allocate from the configured pool. If you want a stable
    # IP, set metallb.universe.tf/loadBalancerIPs to a specific address.
    metallb.universe.tf/allow-shared-ip: "tor-bridge"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: obfs4-bridge
  ports:
    - name: orport
      port: 9001
      targetPort: orport
      protocol: TCP
    - name: obfs4
      port: 9443
      targetPort: obfs4
      protocol: TCP
