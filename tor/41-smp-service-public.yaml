apiVersion: v1
kind: Service
metadata:
  name: smp-server-public
  namespace: tor
  labels:
    app: smp-server
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.99.5.103"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: smp-server
  ports:
    - name: smp
      port: 5223
      targetPort: smp
      protocol: TCP
