apiVersion: batch/v1
kind: CronJob
metadata:
  name: smp-ddns
  namespace: tor
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 120
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: ddns
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  apk add --no-cache --quiet curl jq >/dev/null
                  exec /scripts/update.sh
              env:
                - name: RECORD
                  value: "smp.white.fm"
                - name: ZONE
                  value: "white.fm"
                - name: CF_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: smp-ddns
                      key: api-token
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: "10m"
                  memory: "32Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: script
              configMap:
                name: smp-ddns-script
                defaultMode: 0555
