apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tor

generators:
  - ksops.yaml

resources:
  - 00-namespace.yaml
  - 10-snowflake-deployment.yaml
  - 20-bridge-configmap.yaml
  - 21-bridge-statefulset.yaml
  - 22-bridge-service-metrics.yaml
  - 23-bridge-service-lb.yaml
  - 24-bridge-pdb.yaml
  - 40-smp-statefulset.yaml
  - 41-smp-service-public.yaml
  - 42-smp-pdb.yaml
  - 50-ddns-configmap.yaml
  - 51-ddns-cronjob.yaml

images:
  - name: thetorproject/snowflake-proxy
    newTag: "v2.13.1"
  - name: thetorproject/obfs4-bridge
    newTag: "0.24"
  - name: simplexchat/smp-server
    newTag: "v6.5.0"
