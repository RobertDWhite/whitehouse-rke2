apiVersion: v1
kind: ConfigMap
metadata:
  name: worldmonitor-nginx-conf
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        proxy_pass https://worldmonitor.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host worldmonitor.app;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      }
    }
