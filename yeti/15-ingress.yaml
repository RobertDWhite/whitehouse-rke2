apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yeti
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yeti.white.fm
        - yeti.internal.white.fm
      secretName: yeti-white-fm-tls
  rules:
    - host: yeti.white.fm
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yeti-frontend
                port:
                  number: 80
    - host: yeti.internal.white.fm
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yeti-frontend
                port:
                  number: 80
