apiVersion: apps/v1
kind: Deployment
metadata:
  name: yeti-api
  labels:
    app.kubernetes.io/name: yeti-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yeti-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yeti-api
    spec:
      initContainers:
        - name: wait-arangodb
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z yeti-arangodb 8529; do
                echo "waiting for arangodb..."
                sleep 2
              done
        - name: wait-redis
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              until nc -z yeti-redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: api
          image: yetiplatform/yeti
          args: ["webserver"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: yeti-env
          env:
            - name: YETI_ARANGODB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: ARANGO_ROOT_PASSWORD
            - name: YETI_AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: yeti-secrets
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/v2/system/config
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v2/system/config
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: exports
              mountPath: /opt/yeti/exports
      volumes:
        - name: exports
          emptyDir: {}
