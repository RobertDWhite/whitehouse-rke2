apiVersion: v1
kind: Service
metadata:
  name: yeti-arangodb
  labels:
    app.kubernetes.io/name: yeti-arangodb
spec:
  selector:
    app.kubernetes.io/name: yeti-arangodb
  ports:
    - name: http
      port: 8529
      targetPort: 8529
---
apiVersion: v1
kind: Service
metadata:
  name: yeti-redis
  labels:
    app.kubernetes.io/name: yeti-redis
spec:
  selector:
    app.kubernetes.io/name: yeti-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: yeti-api
  labels:
    app.kubernetes.io/name: yeti-api
spec:
  selector:
    app.kubernetes.io/name: yeti-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: yeti-frontend
  labels:
    app.kubernetes.io/name: yeti-frontend
spec:
  selector:
    app.kubernetes.io/name: yeti-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
